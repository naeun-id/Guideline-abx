<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>나은병원 항생제 사용 지침서</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap');

  :root {
    --bg: #f0f4f8;
    --surface: #ffffff;
    --surface2: #f8fafc;
    --sidebar-bg: #0f2340;
    --sidebar-hover: #1a3a5c;
    --accent: #0a6ebd;
    --accent2: #00a896;
    --accent-light: #e8f4fd;
    --text: #1e293b;
    --text-dim: #64748b;
    --text-muted: #94a3b8;
    --border: #e2e8f0;
    --highlight: #fef9c3;
    --highlight-border: #fbbf24;
    --tag-bg: #e0f2fe;
    --tag-color: #0369a1;
    --radius: 10px;
    --shadow: 0 2px 12px rgba(0,0,0,0.08);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    overflow: hidden;
  }

  /* ── Sidebar ── */
  .sidebar {
    width: 260px;
    background: var(--sidebar-bg);
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
    overflow: hidden;
  }

  .sidebar-header {
    padding: 20px 18px 16px;
    border-bottom: 1px solid rgba(255,255,255,0.08);
  }

  .sidebar-logo {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 4px;
  }

  .sidebar-logo .ico {
    width: 36px; height: 36px;
    background: linear-gradient(135deg, #00a896, #0a6ebd);
    border-radius: 9px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
  }

  .sidebar-logo h1 {
    font-size: 13px;
    font-weight: 700;
    color: #fff;
    line-height: 1.3;
  }

  .sidebar-sub {
    font-size: 10px;
    color: rgba(255,255,255,0.45);
    margin-top: 6px;
    line-height: 1.5;
  }

  .sidebar-nav {
    flex: 1;
    overflow-y: auto;
    padding: 10px 10px;
    scrollbar-width: thin;
    scrollbar-color: rgba(255,255,255,0.1) transparent;
  }

  .nav-item {
    display: flex;
    align-items: center;
    gap: 9px;
    padding: 9px 10px;
    border-radius: 8px;
    cursor: pointer;
    color: rgba(255,255,255,0.65);
    font-size: 12.5px;
    transition: all 0.18s;
    margin-bottom: 2px;
  }

  .nav-item:hover { background: var(--sidebar-hover); color: #fff; }
  .nav-item.active { background: var(--accent); color: #fff; font-weight: 600; }

  .nav-item .nav-icon { font-size: 15px; flex-shrink: 0; }
  .nav-item .nav-title { line-height: 1.35; }

  /* ── Main ── */
  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    min-width: 0;
  }

  /* Search bar */
  .topbar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 14px 24px;
    display: flex;
    gap: 12px;
    align-items: center;
    flex-shrink: 0;
  }

  .search-wrap {
    flex: 1;
    position: relative;
  }

  .search-icon {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-muted);
    font-size: 16px;
    pointer-events: none;
  }

  #searchInput {
    width: 100%;
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    padding: 10px 14px 10px 38px;
    font-size: 13.5px;
    color: var(--text);
    font-family: inherit;
    outline: none;
    transition: border-color 0.2s;
  }

  #searchInput:focus { border-color: var(--accent); }
  #searchInput::placeholder { color: var(--text-muted); }

  .search-clear {
    position: absolute;
    right: 10px;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    color: var(--text-muted);
    cursor: pointer;
    font-size: 16px;
    display: none;
    padding: 2px;
  }

  .result-count {
    font-size: 12px;
    color: var(--text-muted);
    white-space: nowrap;
    min-width: 80px;
    text-align: right;
  }

  /* Content area */
  .content {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
    scrollbar-width: thin;
    scrollbar-color: #cbd5e1 transparent;
  }

  /* Doc card */
  .doc-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    margin-bottom: 20px;
    box-shadow: var(--shadow);
    overflow: hidden;
    transition: box-shadow 0.2s;
  }

  .doc-card:hover { box-shadow: 0 4px 20px rgba(0,0,0,0.12); }

  .doc-header {
    padding: 16px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
    cursor: pointer;
    border-bottom: 1px solid var(--border);
    user-select: none;
  }

  .doc-header-icon {
    font-size: 22px;
    flex-shrink: 0;
  }

  .doc-header-text { flex: 1; }

  .doc-title {
    font-size: 14.5px;
    font-weight: 700;
    color: var(--text);
  }

  .doc-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    margin-top: 6px;
  }

  .tag {
    background: var(--tag-bg);
    color: var(--tag-color);
    border-radius: 4px;
    padding: 2px 7px;
    font-size: 10.5px;
    font-weight: 500;
  }

  .doc-toggle {
    color: var(--text-muted);
    font-size: 18px;
    transition: transform 0.25s;
    flex-shrink: 0;
  }

  .doc-card.expanded .doc-toggle { transform: rotate(180deg); }

  .doc-body {
    display: none;
    padding: 0 20px 20px;
  }

  .doc-card.expanded .doc-body { display: block; }

  /* Section inside doc */
  .section-block {
    margin-top: 16px;
    border-left: 3px solid var(--border);
    padding-left: 14px;
    transition: border-color 0.2s;
  }

  .section-block.has-match { border-left-color: var(--accent2); }

  .section-heading {
    font-size: 12.5px;
    font-weight: 700;
    color: var(--accent);
    margin-bottom: 6px;
  }

  .section-content {
    font-size: 12.5px;
    color: var(--text-dim);
    line-height: 1.8;
    white-space: pre-wrap;
  }

  mark {
    background: var(--highlight);
    color: #92400e;
    border-radius: 2px;
    padding: 0 2px;
    font-weight: 600;
  }

  /* Search results view */
  .result-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
    margin-bottom: 12px;
    box-shadow: var(--shadow);
    transition: border-color 0.2s;
  }

  .result-item:hover { border-color: var(--accent); }

  .result-source {
    font-size: 11px;
    color: var(--text-muted);
    margin-bottom: 5px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .result-source-badge {
    background: var(--accent-light);
    color: var(--accent);
    border-radius: 4px;
    padding: 1px 6px;
    font-size: 10px;
    font-weight: 600;
  }

  .result-heading {
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 5px;
  }

  .result-snippet {
    font-size: 12.5px;
    color: var(--text-dim);
    line-height: 1.7;
  }

  .no-result {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-muted);
  }

  .no-result .no-icon { font-size: 40px; margin-bottom: 12px; }
  .no-result p { font-size: 14px; }

  /* Home view cards */
  .home-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 12px;
    margin-bottom: 24px;
  }

  .home-title {
    font-size: 11px;
    font-weight: 700;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.8px;
    margin-bottom: 12px;
  }

  .quick-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px;
    cursor: pointer;
    transition: all 0.2s;
    text-decoration: none;
    display: block;
  }

  .quick-card:hover { border-color: var(--accent); box-shadow: 0 4px 14px rgba(10,110,189,0.1); }
  .quick-card .qc-icon { font-size: 22px; margin-bottom: 8px; }
  .quick-card .qc-title { font-size: 12.5px; font-weight: 700; color: var(--text); margin-bottom: 4px; }
  .quick-card .qc-desc { font-size: 11px; color: var(--text-muted); line-height: 1.5; }

  /* Quick search chips */
  .quick-searches {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 24px;
  }

  .qs-chip {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 5px 12px;
    font-size: 12px;
    color: var(--text-dim);
    cursor: pointer;
    font-family: inherit;
    transition: all 0.18s;
  }

  .qs-chip:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-light); }

  .disclaimer {
    background: #fef2f2;
    border: 1px solid #fecaca;
    border-radius: var(--radius);
    padding: 10px 14px;
    font-size: 11.5px;
    color: #b91c1c;
    margin-top: 8px;
    margin-bottom: 20px;
  }

  .view { display: none; }
  .view.active { display: block; }

  /* responsive */
  @media (max-width: 700px) {
    .sidebar { width: 56px; }
    .nav-title, .sidebar-logo h1, .sidebar-sub, .doc-tags { display: none; }
    .content { padding: 14px; }
    .topbar { padding: 10px 14px; }
    .home-grid { grid-template-columns: 1fr 1fr; }
  }

  /* ── 모바일 반응형 ── */
  @media (max-width: 768px) {
    body { flex-direction: column; }
    .sidebar {
      width: 100%;
      height: auto;
      max-height: 50px;
      overflow: hidden;
      transition: max-height 0.3s ease;
      position: relative;
    }
    .sidebar.open { max-height: 100vh; overflow-y: auto; }
    .sidebar-toggle {
      display: flex !important;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      cursor: pointer;
      background: var(--primary);
      color: white;
      font-weight: 600;
      font-size: 14px;
    }
    .sidebar-nav { padding-bottom: 12px; }
    .main { padding: 12px; }
    .search-bar input { font-size: 14px; }
    .doc-grid { grid-template-columns: 1fr 1fr; gap: 10px; }
    .doc-card { padding: 14px; }
    .doc-card-icon { font-size: 28px; }
    .doc-card-title { font-size: 13px; }
    .qchip { font-size: 11px; padding: 4px 10px; }
    .doc-header { flex-direction: column; gap: 8px; }
    .doc-header-icon { font-size: 36px; }
  }
  @media (max-width: 480px) {
    .doc-grid { grid-template-columns: 1fr; }
    .sidebar-brand h1 { font-size: 16px; }
  }

  </style>
</head>
<body>

<!-- Sidebar -->
<div class="sidebar">
  <div class="sidebar-header">
    <div class="sidebar-logo">
      <div class="ico">💊</div>
      <h1>나은병원<br>항생제 지침서</h1>
    </div>
    <div class="sidebar-sub">인천나은병원 항생제관리팀<br>2026.02.20 기준</div>
  </div>
  <div class="sidebar-nav" id="sidebarNav"></div>
</div>

<!-- Main -->
<div class="main">
  <div class="topbar">
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input type="text" id="searchInput" placeholder="항생제명, 균종, 감염 부위 등 검색..." oninput="onSearch(this.value)" />
      <button class="search-clear" id="clearBtn" onclick="clearSearch()">✕</button>
    </div>
    <div class="result-count" id="resultCount"></div>
  </div>

  <div class="content" id="content">

    <!-- Home view -->
    <div class="view active" id="homeView">
      <div class="disclaimer">⚠️ 본 지침서는 임상 의사결정 자료입니다. 실제 처방 시 궁금하신 내용은 감염내과(서관 230)에 연락해 주시기 바랍니다.</div>

      <div class="home-title">빠른 검색</div>
      <div class="quick-searches" id="quickSearches"></div>

      <div class="home-title">지침서 목록</div>
      <div class="home-grid" id="homeGrid"></div>
    </div>

    <!-- Doc view -->
    <div class="view" id="docView"></div>

    <!-- Search view -->
    <div class="view" id="searchView"></div>

  </div>
</div>

<script>
const DOCS = [{"id": "00_다제내성그람음성균감염지침", "title": "다제내성 그람음성균(MDR-GNB) 감염", "icon": "🦠", "tags": ["MDR", "ESBL", "CRE", "CRAB", "DTR", "Pseudomonas", "Acinetobacter", "Stenotrophomonas", "Carbapenem", "Ceftazidime-Avibactam", "Colistin", "Tigecycline"], "fullText": "다제내성 그람음성균(MDR-GNB)\n감염 임상 지침 및 항생제 사용 보고서\n인천나은병원 항생제관리팀\n26.2.20\n1. 개요 및 일반 원칙\n본 보고서는 항생제 내성을 보이는 그람음성균(Gram-Negative Bacteria) 감염 환자의 치료 성적을 개선하고, 항생제 스튜어드십(Antimicrobial Stewardship)을 준수하기 위해 IDSA 2024 가이드라인과 국내 임상 진료 지침을 바탕으로 작성되었습니다.\n1.1 초기 평가 및 원칙\n위험 평가: 패혈성 쇼크(Septic shock)나 패혈증(Sepsis)이 의심되는 경우, 최근 3개월 이내 항생제 사용력, 입원력, 이전 배양 검사 결과 등을 토대로 다제내성균(Multidrug-Resistant Organism, MDRO) 감염 위험을 평가해야 합니다.\n배양 검사: 항생제 투여 전 반드시 혈액 및 감염 의심 부위 배양 검사를 시행합니다. 패혈증이나 패혈성 쇼크가 의심되는 경우 배양 검사를 위해 항생제 투여를 45분 이상 지연시켜서는 안 됩니다.\n경험적 치료(Empirical Therapy): 원인균 확인 전에는 환자의 중증도와 지역 내성 현황을 고려하여 광범위 항생제를 사용하되, 배양 결과 확인 후 즉시 조정합니다.\n확정적 치료(Definitive Therapy): 원인균이 확인되면 항생제 감수성 검사(Antimicrobial Susceptibility Testing, AST) 결과에 따라 가장 효과적이고 좁은 스펙트럼의 약제로 변경(De-escalation)합니다.\n2. 주요 다제내성 원인균별 치료 지침 (IDSA 2024 기반)\n2.1 Extended-Spectrum Beta-Lactamase (ESBL) 생성균\n주요 균종: Escherichia coli, Klebsiella pneumoniae, Klebsiella oxytoca, Proteus mirabilis\n정의: Penicillin, Cephalosporin, Aztreonam을 분해하지만 Carbapenem에는 감수성이 있는 효소를 생성하는 장내세균입니다.\n단순 방광염 (Uncomplicated Cystitis)\n권장: Nitrofurantoin, Trimethoprim-Sulfamethoxazole (TMP-SMX).\n대체: Aminoglycoside 단회 요법, 경구 Fosfomycin (E. coli에 한함). Fluoroquinolone (Ciprofloxacin, Levofloxacin)이나 Carbapenem은 효과적이나 내성 관리 및 부작용 우려로 우선 권장되지 않습니다.\n신우신염 및 복잡성 요로감염 (cUTI)\n권장: TMP-SMX, Ciprofloxacin, Levofloxacin, Carbapenem (Ertapenem, Meropenem, Imipenem-Cilastatin).\n주의: Piperacillin-Tazobactam과 Cefepime은 체외 감수성이 있더라도 치료 실패 위험이 있어 Carbapenem이나 Fluoroquinolone보다 선호되지 않습니다.\n요로 외 감염 (Bloodstream Infection 등)\n1차 권고: Carbapenem (Meropenem, Imipenem-Cilastatin, Ertapenem)이 치료의 근간입니다. 중증 환자나 저알부민혈증이 있는 경우 Ertapenem보다는 Meropenem이나 Imipenem-Cilastatin이 선호됩니다.\n경구 전환: 임상적 호전이 있고 감수성이 확인되면 TMP-SMX나 Fluoroquinolone으로 전환을 고려할 수 있습니다.\n2.2 AmpC Beta-Lactamase (AmpC) 생성 장내세균\n주요 균종: Enterobacter cloacae complex, Klebsiella aerogenes, Citrobacter freundii\n치료 원칙: 3세대 Cephalosporin (Ceftriaxone 등)에 감수성을 보이더라도 치료 중 내성 유전자 발현(Derepression) 위험이 있어 사용을 피해야 합니다.\n권고 약제: Cefepime이 우선 권장됩니다. Carbapenem도 효과적이나 Cefepime이 Carbapenem 절약 차원에서 선호됩니다.\n주의: Ceftriaxone, Piperacillin-Tazobactam은 권장되지 않습니다.\n2.3 Carbapenem-Resistant Enterobacterales (CRE)\nCarbapenemase 생성 여부 및 종류(KPC, NDM, OXA-48)에 따라 치료 전략이 다릅니다.\n단순 방광염\nNitrofurantoin, TMP-SMX, Ciprofloxacin/Levofloxacin (감수성 시), 단회 Aminoglycoside, 경구 Fosfomycin (E. coli), Colistin.\n신우신염 및 요로 외 감염\nKPC (Klebsiella pneumoniae carbapenemase) 생성균: Meropenem-Vaborbactam, Ceftazidime-Avibactam, Imipenem-Cilastatin-Relebactam이 권장됩니다.\nMetallo-beta-lactamase (MBL, 예: NDM) 생성균: Ceftazidime-Avibactam + Aztreonam 병합 요법, 또는 Cefiderocol 단독 요법이 권장됩니다.\nOXA-48 유사 생성균: Ceftazidime-Avibactam이 우선 권장되며, Cefiderocol을 대체제로 고려할 수 있습니다.\n대체 요법: 새로운 베타락탐 제제를 사용할 수 없는 경우 Tigecycline이나 Eravacycline (요로/혈류 감염 제외)을 고려할 수 있습니다.\n2.4 Difficult-to-Treat Resistance (DTR) Pseudomonas aeruginosa\nPiperacillin-Tazobactam, Ceftazidime, Cefepime, Aztreonam, Meropenem, Imipenem-Cilastatin, Ciprofloxacin, Levofloxacin 모두에 내성인 녹농균입니다.\n1차 권고: Ceftolozane-Tazobactam, Ceftazidime-Avibactam, Imipenem-Cilastatin-Relebactam이 권장됩니다. 이들 약제 간의 우열을 가릴 데이터는 충분하지 않으므로 감수성 결과에 따라 선택합니다.\n대체 약제: Cefiderocol.\n주의: Carbapenemase (특히 MBL)를 생성하는 경우에는 Ceftolozane-Tazobactam 등이 효과가 없으므로 Cefiderocol을 우선 고려해야 합니다.\n2.5 Carbapenem-Resistant Acinetobacter baumannii (CRAB)\n치료 원칙: 단일 약제의 효과가 제한적이므로 2제 이상의 병합 요법(Combination therapy)을 권장합니다.\n권고 요법: Sulbactam-Durlobactam (가용 시) + Carbapenem (Imipenem-Cilastatin 등).\n대체 요법: 고용량 Ampicillin-Sulbactam (Sulbactam 성분 기준 일 9g)을 기반으로 다음 중 하나 이상 병합: Polymyxin B, Minocycline, Tigecycline, Cefiderocol.\n2.6 Stenotrophomonas maltophilia\n권고 요법: 다음 중 2가지 약제 병합 사용(Combination therapy)이 권장됩니다.\nMinocycline, TMP-SMX, Levofloxacin, Cefiderocol 중 2제 병합.\n또는 Ceftazidime-Avibactam + Aztreonam 병합 요법.\n주의: 과거 1차 약제였던 TMP-SMX 단독 요법보다 병합 요법이 선호되는 추세입니다. Ceftazidime은 내성 유전자(L1, L2)의 존재로 인해 권장되지 않습니다.\n3. 주요 항생제별 상세 사용 지침\n3.1 Tigecycline\n특징: Tetracycline 유도체인 Glycylcycline 계열로 단백질 합성을 억제합니다.\n적응증: 복잡성 복강 내 감염, 복잡성 피부 연조직 감염 등에서 ESBL 생성균, VRE(Vancomycin-Resistant Enterococci), MRSA(Methicillin-Resistant S. aureus), CRAB 감염이 의심될 때 사용합니다.\n주의 및 금기:\n혈중 농도가 낮게 유지되므로 균혈증(Bacteremia) 및 요로감염 치료에는 적합하지 않습니다.\nP. aeruginosa, Proteus spp.에는 항균력이 없습니다.\nCRAB 치료 시 고용량(200 mg 부하 용량 후 100 mg q12h) 사용이 권장됩니다.\n3.2 Ceftazidime-Avibactam\n특징: Ceftazidime에 Beta-lactamase inhibitor인 Avibactam을 결합한 약제입니다.\n항균 범위: KPC 및 OXA-48형 CRE, ESBL 생성균, AmpC 생성균, DTR P. aeruginosa에 효과적입니다.\n제한점: MBL(NDM 등) 생성 균주나 Acinetobacter spp.에는 효과가 없습니다. MBL 생성균 치료 시 Aztreonam과 병합해야 합니다.\n용법: 복강 내 감염 치료 시 혐기균 커버를 위해 Metronidazole과 병용해야 합니다.\n3.3 Ceftolozane-Tazobactam\n특징: 다제내성 녹농균 치료를 위해 개발된 Cephalosporin 복합제입니다.\n주요 적응증: DTR P. aeruginosa 치료에 가장 강력한 옵션 중 하나입니다.\n제한점: ESBL 생성균에는 효과가 있으나, Carbapenemase (KPC, MBL 등)를 생성하는 CRE에는 효과가 없습니다.\n3.4 Colistin & Polymyxin B\n특징: 세포막을 파괴하는 약제로 CRE, CRAB, DTR P. aeruginosa의 대체 치료제입니다.\n주의사항: 신독성(Nephrotoxicity) 및 신경독성(Neurotoxicity) 위험이 높으므로 신기능 모니터링이 필수적입니다.\n사용:\nColistin: Prodrug 형태로 요로감염 치료에 사용할 수 있습니다.\nPolymyxin B: 요로 외 감염(혈류 감염 등) 치료 시 Colistin보다 약동학적으로 우수하여 선호되나, 요로 배설이 미미하여 요로감염 치료에는 부적합합니다.\n최근 지침에서는 신약(Ceftazidime-Avibactam 등) 사용이 불가능할 때만 고려하도록 권고합니다.\n3.5 Carbapenem\n종류: Meropenem, Imipenem-Cilastatin, Ertapenem, Doripenem.\n특징: ESBL 생성균에 대한 1차 치료제입니다.\nErtapenem: 1일 1회 투여 가능하나 P. aeruginosa와 Acinetobacter spp.에는 효과가 없습니다.\nMeropenem/Imipenem: P. aeruginosa를 포함한 광범위 그람음성균에 효과적입니다. 중증 감염 시 고용량 또는 연장 주입(Extended infusion)이 권장됩니다.\n4. 요약표 (주요 적응증 및 권고)\nReferences\n1. Tamma PD, Heil EL, Justo JA, et al. Infectious Diseases Society of America 2024 Guidance on the Treatment of Antimicrobial-Resistant Gram-Negative Infections. Clin Infect Dis. 2024.\n2. 윤영경, 문치숙, 김지은 등. 성인 복강 내 감염 항생제 사용지침. Infect Chemother 2022;54(4):812-853.\n3. 강철인, 김지은, 박대원 등. 요로감염 항생제 사용지침. Infect Chemother 2018;50(1):67-100.\n4. 이동건, 김성한, 김수영 등. 국내자료를 근거로 한 호중구감소성 발열 환자의 경험적 치료 지침. Infect Chemother 2011;43(4):285-321.\n5. Evans L, Rhodes A, Alhazzani W, et al. Surviving sepsis campaign: international guidelines for management of sepsis and septic shock 2021. Intensive Care Med. 2021;47(11):1181-1247.\n6. 윤영경, 박찬순, 김재욱 등. 성인 급성 상기도 감염 항생제 사용지침 권고안. Infect Chemother 2017;49(4):326-352.\n본 지침은 인천나은병원 항생제관리팀에서 승인하였으며,\n정기적으로 검토 및 업데이트됩니다.\n문의: 항생제관리팀", "paragraphs": [{"heading": "1. 개요 및 일반 원칙", "content": "본 보고서는 항생제 내성을 보이는 그람음성균(Gram-Negative Bacteria) 감염 환자의 치료 성적을 개선하고, 항생제 스튜어드십(Antimicrobial Stewardship)을 준수하기 위해 IDSA 2024 가이드라인과 국내 임상 진료 지침을 바탕으로 작성되었습니다."}, {"heading": "1.1 초기 평가 및 원칙", "content": "위험 평가: 패혈성 쇼크(Septic shock)나 패혈증(Sepsis)이 의심되는 경우, 최근 3개월 이내 항생제 사용력, 입원력, 이전 배양 검사 결과 등을 토대로 다제내성균(Multidrug-Resistant Organism, MDRO) 감염 위험을 평가해야 합니다.\n배양 검사: 항생제 투여 전 반드시 혈액 및 감염 의심 부위 배양 검사를 시행합니다. 패혈증이나 패혈성 쇼크가 의심되는 경우 배양 검사를 위해 항생제 투여를 45분 이상 지연시켜서는 안 됩니다.\n경험적 치료(Empirical Therapy): 원인균 확인 전에는 환자의 중증도와 지역 내성 현황을 고려하여 광범위 항생제를 사용하되, 배양 결과 확인 후 즉시 조정합니다.\n확정적 치료(Definitive Therapy): 원인균이 확인되면 항생제 감수성 검사(Antimicrobial Susceptibility Testing, AST) 결과에 따라 가장 효과적이고 좁은 스펙트럼의 약제로 변경(De-escalation)합니다."}, {"heading": "2.1 Extended-Spectrum Beta-Lactamase (ESBL) 생성균", "content": "주요 균종: Escherichia coli, Klebsiella pneumoniae, Klebsiella oxytoca, Proteus mirabilis\n정의: Penicillin, Cephalosporin, Aztreonam을 분해하지만 Carbapenem에는 감수성이 있는 효소를 생성하는 장내세균입니다.\n단순 방광염 (Uncomplicated Cystitis)\n권장: Nitrofurantoin, Trimethoprim-Sulfamethoxazole (TMP-SMX).\n대체: Aminoglycoside 단회 요법, 경구 Fosfomycin (E. coli에 한함). Fluoroquinolone (Ciprofloxacin, Levofloxacin)이나 Carbapenem은 효과적이나 내성 관리 및 부작용 우려로 우선 권장되지 않습니다.\n신우신염 및 복잡성 요로감염 (cUTI)\n권장: TMP-SMX, Ciprofloxacin, Levofloxacin, Carbapenem (Ertapenem, Meropenem, Imipenem-Cilastatin).\n주의: Piperacillin-Tazobactam과 Cefepime은 체외 감수성이 있더라도 치료 실패 위험이 있어 Carbapenem이나 Fluoroquinolone보다 선호되지 않습니다.\n요로 외 감염 (Bloodstream Infection 등)\n1차 권고: Carbapenem (Meropenem, Imipenem-Cilastatin, Ertapenem)이 치료의 근간입니다. 중증 환자나 저알부민혈증이 있는 경우 Ertapenem보다는 Meropenem이나 Imipenem-Cilastatin이 선호됩니다.\n경구 전환: 임상적 호전이 있고 감수성이 확인되면 TMP-SMX나 Fluoroquinolone으로 전환을 고려할 수 있습니다."}, {"heading": "2.2 AmpC Beta-Lactamase (AmpC) 생성 장내세균", "content": "주요 균종: Enterobacter cloacae complex, Klebsiella aerogenes, Citrobacter freundii\n치료 원칙: 3세대 Cephalosporin (Ceftriaxone 등)에 감수성을 보이더라도 치료 중 내성 유전자 발현(Derepression) 위험이 있어 사용을 피해야 합니다.\n권고 약제: Cefepime이 우선 권장됩니다. Carbapenem도 효과적이나 Cefepime이 Carbapenem 절약 차원에서 선호됩니다.\n주의: Ceftriaxone, Piperacillin-Tazobactam은 권장되지 않습니다."}, {"heading": "2.3 Carbapenem-Resistant Enterobacterales (CRE)", "content": "Carbapenemase 생성 여부 및 종류(KPC, NDM, OXA-48)에 따라 치료 전략이 다릅니다.\n단순 방광염\nNitrofurantoin, TMP-SMX, Ciprofloxacin/Levofloxacin (감수성 시), 단회 Aminoglycoside, 경구 Fosfomycin (E. coli), Colistin.\n신우신염 및 요로 외 감염\nKPC (Klebsiella pneumoniae carbapenemase) 생성균: Meropenem-Vaborbactam, Ceftazidime-Avibactam, Imipenem-Cilastatin-Relebactam이 권장됩니다.\nMetallo-beta-lactamase (MBL, 예: NDM) 생성균: Ceftazidime-Avibactam + Aztreonam 병합 요법, 또는 Cefiderocol 단독 요법이 권장됩니다.\nOXA-48 유사 생성균: Ceftazidime-Avibactam이 우선 권장되며, Cefiderocol을 대체제로 고려할 수 있습니다.\n대체 요법: 새로운 베타락탐 제제를 사용할 수 없는 경우 Tigecycline이나 Eravacycline (요로/혈류 감염 제외)을 고려할 수 있습니다."}, {"heading": "2.4 Difficult-to-Treat Resistance (DTR) Pseudomonas aeruginosa", "content": "Piperacillin-Tazobactam, Ceftazidime, Cefepime, Aztreonam, Meropenem, Imipenem-Cilastatin, Ciprofloxacin, Levofloxacin 모두에 내성인 녹농균입니다.\n1차 권고: Ceftolozane-Tazobactam, Ceftazidime-Avibactam, Imipenem-Cilastatin-Relebactam이 권장됩니다. 이들 약제 간의 우열을 가릴 데이터는 충분하지 않으므로 감수성 결과에 따라 선택합니다.\n대체 약제: Cefiderocol.\n주의: Carbapenemase (특히 MBL)를 생성하는 경우에는 Ceftolozane-Tazobactam 등이 효과가 없으므로 Cefiderocol을 우선 고려해야 합니다."}, {"heading": "2.5 Carbapenem-Resistant Acinetobacter baumannii (CRAB)", "content": "치료 원칙: 단일 약제의 효과가 제한적이므로 2제 이상의 병합 요법(Combination therapy)을 권장합니다.\n권고 요법: Sulbactam-Durlobactam (가용 시) + Carbapenem (Imipenem-Cilastatin 등).\n대체 요법: 고용량 Ampicillin-Sulbactam (Sulbactam 성분 기준 일 9g)을 기반으로 다음 중 하나 이상 병합: Polymyxin B, Minocycline, Tigecycline, Cefiderocol."}, {"heading": "2.6 Stenotrophomonas maltophilia", "content": "권고 요법: 다음 중 2가지 약제 병합 사용(Combination therapy)이 권장됩니다.\nMinocycline, TMP-SMX, Levofloxacin, Cefiderocol 중 2제 병합.\n또는 Ceftazidime-Avibactam + Aztreonam 병합 요법.\n주의: 과거 1차 약제였던 TMP-SMX 단독 요법보다 병합 요법이 선호되는 추세입니다. Ceftazidime은 내성 유전자(L1, L2)의 존재로 인해 권장되지 않습니다."}, {"heading": "3.1 Tigecycline", "content": "특징: Tetracycline 유도체인 Glycylcycline 계열로 단백질 합성을 억제합니다.\n적응증: 복잡성 복강 내 감염, 복잡성 피부 연조직 감염 등에서 ESBL 생성균, VRE(Vancomycin-Resistant Enterococci), MRSA(Methicillin-Resistant S. aureus), CRAB 감염이 의심될 때 사용합니다.\n주의 및 금기:\n혈중 농도가 낮게 유지되므로 균혈증(Bacteremia) 및 요로감염 치료에는 적합하지 않습니다.\nP. aeruginosa, Proteus spp.에는 항균력이 없습니다.\nCRAB 치료 시 고용량(200 mg 부하 용량 후 100 mg q12h) 사용이 권장됩니다."}, {"heading": "3.2 Ceftazidime-Avibactam", "content": "특징: Ceftazidime에 Beta-lactamase inhibitor인 Avibactam을 결합한 약제입니다.\n항균 범위: KPC 및 OXA-48형 CRE, ESBL 생성균, AmpC 생성균, DTR P. aeruginosa에 효과적입니다.\n제한점: MBL(NDM 등) 생성 균주나 Acinetobacter spp.에는 효과가 없습니다. MBL 생성균 치료 시 Aztreonam과 병합해야 합니다.\n용법: 복강 내 감염 치료 시 혐기균 커버를 위해 Metronidazole과 병용해야 합니다."}, {"heading": "3.3 Ceftolozane-Tazobactam", "content": "특징: 다제내성 녹농균 치료를 위해 개발된 Cephalosporin 복합제입니다.\n주요 적응증: DTR P. aeruginosa 치료에 가장 강력한 옵션 중 하나입니다.\n제한점: ESBL 생성균에는 효과가 있으나, Carbapenemase (KPC, MBL 등)를 생성하는 CRE에는 효과가 없습니다."}, {"heading": "3.4 Colistin & Polymyxin B", "content": "특징: 세포막을 파괴하는 약제로 CRE, CRAB, DTR P. aeruginosa의 대체 치료제입니다.\n주의사항: 신독성(Nephrotoxicity) 및 신경독성(Neurotoxicity) 위험이 높으므로 신기능 모니터링이 필수적입니다.\n사용:\nColistin: Prodrug 형태로 요로감염 치료에 사용할 수 있습니다.\nPolymyxin B: 요로 외 감염(혈류 감염 등) 치료 시 Colistin보다 약동학적으로 우수하여 선호되나, 요로 배설이 미미하여 요로감염 치료에는 부적합합니다.\n최근 지침에서는 신약(Ceftazidime-Avibactam 등) 사용이 불가능할 때만 고려하도록 권고합니다."}, {"heading": "3.5 Carbapenem", "content": "종류: Meropenem, Imipenem-Cilastatin, Ertapenem, Doripenem.\n특징: ESBL 생성균에 대한 1차 치료제입니다.\nErtapenem: 1일 1회 투여 가능하나 P. aeruginosa와 Acinetobacter spp.에는 효과가 없습니다.\nMeropenem/Imipenem: P. aeruginosa를 포함한 광범위 그람음성균에 효과적입니다. 중증 감염 시 고용량 또는 연장 주입(Extended infusion)이 권장됩니다."}, {"heading": "4. 요약표 (주요 적응증 및 권고)", "content": "References\n1. Tamma PD, Heil EL, Justo JA, et al. Infectious Diseases Society of America 2024 Guidance on the Treatment of Antimicrobial-Resistant Gram-Negative Infections. Clin Infect Dis. 2024."}, {"heading": "3. 강철인, 김지은, 박대원 등. 요로감염 항생제 사용지침. Infect Chemother 2018;50(1):67-100.", "content": "4. 이동건, 김성한, 김수영 등. 국내자료를 근거로 한 호중구감소성 발열 환자의 경험적 치료 지침. Infect Chemother 2011;43(4):285-321.\n5. Evans L, Rhodes A, Alhazzani W, et al. Surviving sepsis campaign: international guidelines for management of sepsis and septic shock 2021. Intensive Care Med. 2021;47(11):1181-1247.\n6. 윤영경, 박찬순, 김재욱 등. 성인 급성 상기도 감염 항생제 사용지침 권고안. Infect Chemother 2017;49(4):326-352.\n본 지침은 인천나은병원 항생제관리팀에서 승인하였으며,\n정기적으로 검토 및 업데이트됩니다.\n문의: 항생제관리팀"}]}, {"id": "01_급성감염성설사및CDI감염지침", "title": "급성 감염성 설사 및 CDI", "icon": "🔬", "tags": ["C.difficile", "CDI", "Vancomycin", "Fidaxomicin", "Metronidazole", "Campylobacter", "Salmonella", "Shigella", "설사", "장염"], "fullText": "급성 감염성 설사 및\nC. difficile 감염 항생제 사용 지침\n인천나은병원 항생제관리팀\n2026.2.20\n1. 개요 및 일반 원칙\n급성 감염성 설사는 대부분 바이러스성이거나 자가 제한적(Self-limiting)인 경과를 보이므로, 수분 공급(Rehydration)이 치료의 핵심이며 항생제 투여는 선별적으로 이루어져야 합니다. 불필요한 항생제 사용은 부작용을 유발하고 내성균 발생을 조장할 수 있습니다.\n1.1 초기 평가\n병력 청취: 증상 발생 시기, 여행력, 음식물 섭취력(익히지 않은 해산물, 육류 등), 항생제 사용력(최근 3개월), 입원력, 동반 질환 등을 확인해야 합니다.\n탈수 평가: 모든 환자에서 탈수 정도를 평가하고 수분 및 전해질 교정을 최우선으로 시행해야 합니다.\n1.2 진단 검사 적응증\n대변 배양 및 검사: 발열, 혈변(Bloody stool), 심한 복통, 패혈증 징후가 있는 경우, 면역저하자, 고령자 등 고위험군, 집단 발병이 의심되는 경우.\n검사 항목: Salmonella, Shigella, Campylobacter, Yersinia, Clostridioides difficile (항생제 노출력 있는 경우), Shiga toxin-producing Escherichia coli (STEC).\n혈액 배양: 패혈증 징후, 장티푸스(Enteric fever) 의심, 면역저하자, 용혈성 빈혈 환자 등에서 시행합니다.\n2. 경험적 항생제 치료 (Empirical Therapy)\n2.1 치료 원칙\n급성 물설사(Watery diarrhea): 대부분 바이러스성이나 비침습적 세균이 원인이므로 항생제 치료를 권장하지 않습니다.\n항생제 투여 고려 대상: 발열(≥38.5°C)이나 패혈증 징후를 동반한 중증 설사, 혈변이나 점액변이 있는 이질(Dysentery) 증상, 면역저하자, 심한 여행자 설사(Traveler's diarrhea).\n2.2 경험적 항생제 선택\n국내 및 여행 지역의 내성 현황을 고려해야 합니다. 국내 Campylobacter의 Fluoroquinolone 내성률이 높으므로 주의가 필요합니다.\n1차 권장 약제:\nFluoroquinolone: Ciprofloxacin 500 mg 1일 2회 또는 Levofloxacin 500 mg 1일 1회 (3~5일).\nMacrolide: Azithromycin 500 mg 1일 1회 (3일). Campylobacter가 의심되거나(동남아시아 여행 등) Fluoroquinolone 내성이 우려될 때 우선 고려합니다.\n대체 약제: Rifaximin: 여행자 설사 등 비침습적 균주(예: E. coli)가 원인으로 의심되는 물설사에 사용 가능하나, 혈변이나 발열이 있는 경우에는 사용하지 않습니다.\n금기: Shiga toxin-producing E. coli (STEC) 감염이 의심되는 경우(혈변, 발열 없음 또는 미열), 항생제 투여가 용혈성 요독 증후군(Hemolytic Uremic Syndrome, HUS) 발생 위험을 높일 수 있으므로 항생제를 투여하지 않습니다.\n3. 원인균별 확정적 치료 (Pathogen-Specific Therapy)\n배양 결과가 확인되면 감수성에 따라 항생제를 조정합니다.\n3.1 Campylobacter spp.\n1차 권장: Azithromycin (내성률이 낮아 우선 권장됨).\n대체: Ciprofloxacin (감수성이 확인된 경우에만 사용).\n3.2 Nontyphoidal Salmonella\n단순 위장관염: 항생제 치료가 증상 기간을 크게 단축시키지 않고 보균 기간을 연장시킬 수 있어 면역 정상인에서는 치료를 권장하지 않습니다.\n치료 적응증: 3개월 미만 영아, 50세 이상(동맥경화 의심), 면역저하자, 심장 판막 질환, 인공 관절 등 합병증 고위험군.\n약제: Ceftriaxone, Ciprofloxacin, Trimethoprim-Sulfamethoxazole (TMP-SMX), Amoxicillin (감수성 확인 후).\n3.3 Shigella spp. (이질)\n권장 약제: Azithromycin, Ciprofloxacin, Ceftriaxone.\n주의: TMP-SMX나 Ampicillin은 내성률이 높아 감수성 확인 전에는 권장되지 않습니다.\n3.4 Vibrio cholerae (콜레라)\n수분 공급이 주 치료이며, 중증 탈수 시 항생제를 병용합니다.\n약제: Doxycycline (1회 투여), Azithromycin, Ciprofloxacin.\n4. Clostridioides difficile 감염 (CDI)\n4.1 진단 및 일반 원칙\n검사 대상: 원인 불명의 설사(24시간 내 3회 이상 묽은 변)가 있으면서 최근 항생제 사용력, 입원력 등의 위험 인자가 있는 환자.\n진단: 대변 내 독소(Toxin A/B) 검사 또는 독소 유전자 검사(NAAT).\n일반 원칙: 유발 원인이 되는 항생제는 가능한 중단합니다.\n4.2 치료 지침 (IDSA 2021 Update 기반)\n최신 지침에서는 치료 성공률과 재발률 감소를 위해 Fidaxomicin을 1차 약제로 우선 권고하고 있습니다.\nA. 초회 감염 (Initial Episode)\n비중증(Non-severe) 및 중증(Severe):\n1차 권장 (Preferred): Fidaxomicin 200 mg 경구 1일 2회, 10일간.\n대안 (Alternative): Vancomycin 125 mg 경구 1일 4회, 10일간.\n대체 약제 (위 약제 사용 불가 시): Metronidazole 500 mg 경구 1일 3회, 10~14일간 (비중증에 한함).\nB. 전격성 감염 (Fulminant CDI)\n저혈압, 쇼크, 장폐색(Ileus), 거대결장 등을 동반한 경우입니다.\n권장 요법: Vancomycin 500 mg 경구(또는 비위관) 1일 4회 PLUS Metronidazole 500 mg 정맥주사 1일 3회.\n장폐색이 있는 경우 Vancomycin 관장(Rectal instillation)을 병행할 수 있습니다.\nC. 재발성 감염 (Recurrent CDI)\n첫 번째 재발:\n초회 치료에 Metronidazole 사용 시: Vancomycin 125 mg 1일 4회, 10일.\n초회 치료에 Vancomycin 사용 시: Fidaxomicin 200 mg 1일 2회 10일, 또는 Vancomycin Tapered and Pulsed regimen (장기간 감량 요법).\nBezlotoxumab: 재발 방지를 위해 표준 항생제 치료와 함께 Bezlotoxumab (항독소 단클론항체) 10 mg/kg 1회 정맥주사를 고려할 수 있습니다(특히 지난 6개월 내 CDI 병력 등 고위험군). 단, 심부전 환자에서는 주의해야 합니다.\n두 번째 이후 재발:\nVancomycin Tapered and Pulsed regimen.\nVancomycin 10일 치료 후 Rifaximin 400 mg 1일 3회 20일간 유지.\nFidaxomicin.\n대변 이식술 (Fecal Microbiota Transplantation, FMT): 적절한 항생제 치료에도 불구하고 2회 이상 재발(총 3회 이상 발병)한 경우 권장됩니다.\n5. 보조 요법\n지사제 (Loperamide): 발열이 없고 혈변이 없는 물설사 환자에서 수분 공급과 함께 사용하면 증상 기간을 단축시킬 수 있습니다. 단, 독성 거대결장(Toxic megacolon)의 위험이 있는 C. difficile 감염이나 이질 등에서는 사용을 피해야 합니다.\nProbiotics: 급성 감염성 설사의 증상 기간을 줄이는 데 일부 도움이 될 수 있으나, 면역저하자에서는 균혈증 위험이 있어 주의해야 합니다.\n6. 요약표\n약어: FQ (Fluoroquinolone), TMP-SMX (Trimethoprim-Sulfamethoxazole), STEC (Shiga toxin-producing E. coli)\nReferences\n1. 김지은, 김수영, 민윤기 등. 급성 감염성 설사 항생제 사용지침. Infect Chemother 2019;51(2):217-243.\n2. Johnson S, Lavergne V, Skinner AM, et al. Clinical Practice Guideline by the Infectious Diseases Society of America (IDSA) and Society for Healthcare Epidemiology of America (SHEA): 2021 Focused Update Guidelines on Management of Clostridioides difficile Infection in Adults. Clin Infect Dis. 2021;73(5):e1029-e1044.\n3. Shane AL, Mody RK, Crump JA, et al. 2017 Infectious Diseases Society of America Clinical Practice Guidelines for the Diagnosis and Management of Infectious Diarrhea. Clin Infect Dis. 2017;65(12):e45-e80.\n4. Riddle MS, DuPont HL, Connor BA. ACG Clinical Guideline: Diagnosis, Treatment, and Prevention of Acute Diarrheal Infections in Adults. Am J Gastroenterol. 2016;111(5):602-622.\n본 지침은 인천나은병원 항생제관리팀에서 승인하였으며,\n정기적으로 검토 및 업데이트됩니다.\n문의: 항생제관리팀", "paragraphs": [{"heading": "1. 개요 및 일반 원칙", "content": "급성 감염성 설사는 대부분 바이러스성이거나 자가 제한적(Self-limiting)인 경과를 보이므로, 수분 공급(Rehydration)이 치료의 핵심이며 항생제 투여는 선별적으로 이루어져야 합니다. 불필요한 항생제 사용은 부작용을 유발하고 내성균 발생을 조장할 수 있습니다."}, {"heading": "1.1 초기 평가", "content": "병력 청취: 증상 발생 시기, 여행력, 음식물 섭취력(익히지 않은 해산물, 육류 등), 항생제 사용력(최근 3개월), 입원력, 동반 질환 등을 확인해야 합니다.\n탈수 평가: 모든 환자에서 탈수 정도를 평가하고 수분 및 전해질 교정을 최우선으로 시행해야 합니다."}, {"heading": "1.2 진단 검사 적응증", "content": "대변 배양 및 검사: 발열, 혈변(Bloody stool), 심한 복통, 패혈증 징후가 있는 경우, 면역저하자, 고령자 등 고위험군, 집단 발병이 의심되는 경우.\n검사 항목: Salmonella, Shigella, Campylobacter, Yersinia, Clostridioides difficile (항생제 노출력 있는 경우), Shiga toxin-producing Escherichia coli (STEC).\n혈액 배양: 패혈증 징후, 장티푸스(Enteric fever) 의심, 면역저하자, 용혈성 빈혈 환자 등에서 시행합니다."}, {"heading": "2.1 치료 원칙", "content": "급성 물설사(Watery diarrhea): 대부분 바이러스성이나 비침습적 세균이 원인이므로 항생제 치료를 권장하지 않습니다.\n항생제 투여 고려 대상: 발열(≥38.5°C)이나 패혈증 징후를 동반한 중증 설사, 혈변이나 점액변이 있는 이질(Dysentery) 증상, 면역저하자, 심한 여행자 설사(Traveler's diarrhea)."}, {"heading": "2.2 경험적 항생제 선택", "content": "국내 및 여행 지역의 내성 현황을 고려해야 합니다. 국내 Campylobacter의 Fluoroquinolone 내성률이 높으므로 주의가 필요합니다.\n1차 권장 약제:\nFluoroquinolone: Ciprofloxacin 500 mg 1일 2회 또는 Levofloxacin 500 mg 1일 1회 (3~5일).\nMacrolide: Azithromycin 500 mg 1일 1회 (3일). Campylobacter가 의심되거나(동남아시아 여행 등) Fluoroquinolone 내성이 우려될 때 우선 고려합니다.\n대체 약제: Rifaximin: 여행자 설사 등 비침습적 균주(예: E. coli)가 원인으로 의심되는 물설사에 사용 가능하나, 혈변이나 발열이 있는 경우에는 사용하지 않습니다.\n금기: Shiga toxin-producing E. coli (STEC) 감염이 의심되는 경우(혈변, 발열 없음 또는 미열), 항생제 투여가 용혈성 요독 증후군(Hemolytic Uremic Syndrome, HUS) 발생 위험을 높일 수 있으므로 항생제를 투여하지 않습니다."}, {"heading": "3. 원인균별 확정적 치료 (Pathogen-Specific Therapy)", "content": "배양 결과가 확인되면 감수성에 따라 항생제를 조정합니다."}, {"heading": "3.1 Campylobacter spp.", "content": "1차 권장: Azithromycin (내성률이 낮아 우선 권장됨).\n대체: Ciprofloxacin (감수성이 확인된 경우에만 사용)."}, {"heading": "3.2 Nontyphoidal Salmonella", "content": "단순 위장관염: 항생제 치료가 증상 기간을 크게 단축시키지 않고 보균 기간을 연장시킬 수 있어 면역 정상인에서는 치료를 권장하지 않습니다.\n치료 적응증: 3개월 미만 영아, 50세 이상(동맥경화 의심), 면역저하자, 심장 판막 질환, 인공 관절 등 합병증 고위험군.\n약제: Ceftriaxone, Ciprofloxacin, Trimethoprim-Sulfamethoxazole (TMP-SMX), Amoxicillin (감수성 확인 후)."}, {"heading": "3.3 Shigella spp. (이질)", "content": "권장 약제: Azithromycin, Ciprofloxacin, Ceftriaxone.\n주의: TMP-SMX나 Ampicillin은 내성률이 높아 감수성 확인 전에는 권장되지 않습니다."}, {"heading": "3.4 Vibrio cholerae (콜레라)", "content": "수분 공급이 주 치료이며, 중증 탈수 시 항생제를 병용합니다.\n약제: Doxycycline (1회 투여), Azithromycin, Ciprofloxacin."}, {"heading": "4.1 진단 및 일반 원칙", "content": "검사 대상: 원인 불명의 설사(24시간 내 3회 이상 묽은 변)가 있으면서 최근 항생제 사용력, 입원력 등의 위험 인자가 있는 환자.\n진단: 대변 내 독소(Toxin A/B) 검사 또는 독소 유전자 검사(NAAT).\n일반 원칙: 유발 원인이 되는 항생제는 가능한 중단합니다."}, {"heading": "4.2 치료 지침 (IDSA 2021 Update 기반)", "content": "최신 지침에서는 치료 성공률과 재발률 감소를 위해 Fidaxomicin을 1차 약제로 우선 권고하고 있습니다.\nA. 초회 감염 (Initial Episode)\n비중증(Non-severe) 및 중증(Severe):\n1차 권장 (Preferred): Fidaxomicin 200 mg 경구 1일 2회, 10일간.\n대안 (Alternative): Vancomycin 125 mg 경구 1일 4회, 10일간.\n대체 약제 (위 약제 사용 불가 시): Metronidazole 500 mg 경구 1일 3회, 10~14일간 (비중증에 한함).\nB. 전격성 감염 (Fulminant CDI)\n저혈압, 쇼크, 장폐색(Ileus), 거대결장 등을 동반한 경우입니다.\n권장 요법: Vancomycin 500 mg 경구(또는 비위관) 1일 4회 PLUS Metronidazole 500 mg 정맥주사 1일 3회.\n장폐색이 있는 경우 Vancomycin 관장(Rectal instillation)을 병행할 수 있습니다.\nC. 재발성 감염 (Recurrent CDI)\n첫 번째 재발:\n초회 치료에 Metronidazole 사용 시: Vancomycin 125 mg 1일 4회, 10일.\n초회 치료에 Vancomycin 사용 시: Fidaxomicin 200 mg 1일 2회 10일, 또는 Vancomycin Tapered and Pulsed regimen (장기간 감량 요법).\nBezlotoxumab: 재발 방지를 위해 표준 항생제 치료와 함께 Bezlotoxumab (항독소 단클론항체) 10 mg/kg 1회 정맥주사를 고려할 수 있습니다(특히 지난 6개월 내 CDI 병력 등 고위험군). 단, 심부전 환자에서는 주의해야 합니다.\n두 번째 이후 재발:\nVancomycin Tapered and Pulsed regimen.\nVancomycin 10일 치료 후 Rifaximin 400 mg 1일 3회 20일간 유지.\nFidaxomicin.\n대변 이식술 (Fecal Microbiota Transplantation, FMT): 적절한 항생제 치료에도 불구하고 2회 이상 재발(총 3회 이상 발병)한 경우 권장됩니다."}, {"heading": "5. 보조 요법", "content": "지사제 (Loperamide): 발열이 없고 혈변이 없는 물설사 환자에서 수분 공급과 함께 사용하면 증상 기간을 단축시킬 수 있습니다. 단, 독성 거대결장(Toxic megacolon)의 위험이 있는 C. difficile 감염이나 이질 등에서는 사용을 피해야 합니다.\nProbiotics: 급성 감염성 설사의 증상 기간을 줄이는 데 일부 도움이 될 수 있으나, 면역저하자에서는 균혈증 위험이 있어 주의해야 합니다."}, {"heading": "6. 요약표", "content": "약어: FQ (Fluoroquinolone), TMP-SMX (Trimethoprim-Sulfamethoxazole), STEC (Shiga toxin-producing E. coli)\nReferences"}, {"heading": "1. 김지은, 김수영, 민윤기 등. 급성 감염성 설사 항생제 사용지침. Infect Chemother 2019;51(2):217-243.", "content": "2. Johnson S, Lavergne V, Skinner AM, et al. Clinical Practice Guideline by the Infectious Diseases Society of America (IDSA) and Society for Healthcare Epidemiology of America (SHEA): 2021 Focused Update Guidelines on Management of Clostridioides difficile Infection in Adults. Clin Infect Dis. 2021;73(5):e1029-e1044.\n3. Shane AL, Mody RK, Crump JA, et al. 2017 Infectious Diseases Society of America Clinical Practice Guidelines for the Diagnosis and Management of Infectious Diarrhea. Clin Infect Dis. 2017;65(12):e45-e80.\n4. Riddle MS, DuPont HL, Connor BA. ACG Clinical Guideline: Diagnosis, Treatment, and Prevention of Acute Diarrheal Infections in Adults. Am J Gastroenterol. 2016;111(5):602-622.\n본 지침은 인천나은병원 항생제관리팀에서 승인하였으며,\n정기적으로 검토 및 업데이트됩니다.\n문의: 항생제관리팀"}]}, {"id": "02_급성요로감염지침", "title": "급성 요로감염", "icon": "💧", "tags": ["방광염", "신우신염", "UTI", "Fosfomycin", "Nitrofurantoin", "Ciprofloxacin", "CAUTI", "전립선염", "요로감염"], "fullText": "급성 요로감염 항생제 사용 지침\n인천나은병원 항생제관리팀\n26.2.20\n1. 개요\n본 지침은 성인 환자에서 발생하는 급성 단순 방광염, 급성 단순 신우신염, 그리고 복잡성 요로감염의 적절한 진단과 치료를 위해 작성되었습니다. 국내 요로감염 원인균의 항생제 내성 증가(특히 Fluoroquinolone 및 3세대 Cephalosporin)를 고려하여 경험적 항생제 선택에 신중을 기해야 합니다.\n2. 무증상 세균뇨 (Asymptomatic Bacteriuria, ASB)\n2.1 정의 및 진단\n요로감염 증상이나 징후 없이 소변에 의미 있는 세균이 존재하는 경우입니다.\n여성은 청결 채취 중간뇨에서 1 mL당 10⁵ 집락형성단위(Colony Forming Unit, CFU) 이상 2회 연속 같은 세균이 배양될 때, 남성은 1회라도 배양될 때 진단합니다.\n2.2 치료 적응증\n치료 권장:\n임신부: 임신 초기 여성에서 선별하여 치료해야 합니다. 치료하지 않을 경우 신우신염, 저체중아 출산, 조기 분만 등의 위험이 있습니다.\n점막 출혈이 예상되는 비뇨기과 시술 예정자: 경요도 전립선 절제술(Transurethral Resection of the Prostate, TUR-P) 등 시술 전 치료를 권장합니다.\n치료 권장하지 않음: 비임신 여성, 당뇨병 환자, 노인(시설 거주자 포함), 척수 손상 환자, 유치 도뇨관(Indwelling urinary catheter)을 가진 환자에서는 이득이 없거나 내성균 출현을 조장하므로 치료하지 않습니다.\n3. 급성 단순 방광염 (Acute Uncomplicated Cystitis)\n3.1 정의 및 진단\n정의: 구조적/기능적 요로 이상이 없는 건강한 성인 여성에서 방광에 국한된 감염입니다.\n진단: 배뇨통(Dysuria), 빈뇨(Frequency), 긴박뇨(Urgency), 치골 상부 통증 등이 주 증상입니다.\n배양 검사: 전형적인 증상이 있는 단순 방광염은 경험적 치료가 가능하나, 신우신염이 의심되거나, 비전형적 증상, 임신부, 남성, 최근 항생제 사용력, 재발성 감염의 경우 소변 배양 검사를 시행해야 합니다. 국내 내성률 증가로 인해 배양 검사의 중요성이 강조되고 있습니다.\n3.2 경험적 항생제 치료 (Empirical Therapy)\n국내 Escherichia coli의 Ciprofloxacin 내성률이 높고, Trimethoprim-Sulfamethoxazole (TMP-SMX) 내성률 또한 30%를 상회하므로 경험적 선택 시 주의가 필요합니다.\n1차 권장 약제:\nFosfomycin trometamol: 3 g 경구 1회 투여. (국내 내성률이 낮아 유용한 옵션입니다)\nNitrofurantoin monohydrate/macrocrystals: 100 mg 경구 1일 2회, 5일간 투여 (신기능 저하 시 주의)\nPivmecillinam: 400 mg 경구 1일 3회, 3~5일간 투여 (국내 도입 시 고려)\n대체 약제:\nFluoroquinolone: Ciprofloxacin (250~500 mg 1일 2회) 또는 Levofloxacin (250~500 mg 1일 1회) 3일 요법. (단, 결핵이 의심되거나 다른 1차 약제 사용이 가능한 경우 유보하는 것이 좋습니다)\nBeta-lactams: Cefpodoxime, Cefdinir, Cefixime 등 경구 3세대 Cephalosporin을 5~7일간 투여할 수 있으나, Fluoroquinolone보다 효과가 다소 떨어질 수 있습니다.\n주의: Amoxicillin-Clavulanate나 Ampicillin은 내성률이 높아 단독 경험적 치료로 권장되지 않습니다.\n4. 급성 단순 신우신염 (Acute Uncomplicated Pyelonephritis)\n4.1 정의 및 진단\n정의: 감염이 신장 실질과 신우까지 파급된 상부 요로감염으로, 발열(>38°C), 오한, 옆구리 통증(Flank pain), 늑골척추각 압통(Costovertebral Angle Tenderness, CVAT), 구역/구토를 동반합니다.\n검사: 소변 배양 및 혈액 배양 검사를 반드시 시행해야 합니다.\n4.2 치료 원칙\n모든 환자에서 배양 검사 결과에 따라 항생제를 조정(De-escalation)해야 합니다.\n국내 E. coli의 Fluoroquinolone 내성률이 20%를 상회하므로, 초기 경험적 치료 실패 가능성을 고려해야 합니다.\n4.3 경험적 항생제 치료\nA. 입원이 필요 없는 경증 환자 (Outpatient)\n초기 주사 요법: Ceftriaxone 1 g 정주 또는 Amikacin (Aminoglycoside) 1회 투여 후 경구 항생제로 이어가는 것이 안전합니다.\n경구 유지 요법:\nCiprofloxacin 500 mg 1일 2회, 7일.\nLevofloxacin 750 mg 1일 1회, 5일.\nTMP-SMX 160/800 mg 1일 2회, 14일 (감수성이 확인된 경우).\n경구 Beta-lactams(예: Cefpodoxime)은 효과가 떨어질 수 있어 10~14일 투여가 권장됩니다.\nB. 입원이 필요한 중등도 이상 환자 (Inpatient)\n권장 주사 약제:\nExtended-spectrum Cephalosporin: Ceftriaxone, Cefotaxime, Cefepime.\nFluoroquinolone: Ciprofloxacin, Levofloxacin (국내 내성률 고려 시 단독 사용 주의).\nPiperacillin-Tazobactam.\nAminoglycoside (Gentamicin, Amikacin) + Ampicillin.\nCarbapenem: Ertapenem, Meropenem, Imipenem-Cilastatin (ESBL 생성균 의심 시).\n중증 패혈증/패혈성 쇼크: Piperacillin-Tazobactam 또는 Carbapenem 계열을 우선 고려하며, 다제내성균 위험이 높으면 Amikacin 병합을 고려할 수 있습니다.\n5. 복잡성 요로감염 (Complicated Urinary Tract Infection, cUTI)\n5.1 정의\n요로계의 해부학적 또는 기능적 이상(예: 요로 결석, 종양, 신경인성 방광), 요로 폐쇄, 이물질(도뇨관, 스텐트), 혹은 기저질환(당뇨병, 면역저하)이 동반된 상태에서 발생한 요로감염입니다.\n남성의 요로감염은 기본적으로 복잡성으로 간주하는 경향이 있으며, 전립선염 감별이 필요합니다.\n5.2 요로 폐쇄 관련 신우신염 (Obstructive Pyelonephritis)\n치료 원칙: 항생제 치료와 함께 폐쇄의 원인(결석 등)을 해소하는 감압 시술(Stent 삽입, 경피적 신루 설치술 등)이 필수적이며, 가능한 한 빨리 시행해야 합니다.\n경험적 항생제: 단순 신우신염보다 광범위한 커버리지가 필요할 수 있습니다. Piperacillin-Tazobactam, Cefepime, Carbapenem 등을 고려합니다. 패혈증 동반 시 Beta-lactam + Aminoglycoside 병합 요법을 고려할 수 있습니다.\n치료 기간: 요로 폐쇄가 해결되고 증상이 호전되면 7~14일간 투여하나, 불충분한 경우 21일 이상 연장할 수 있습니다.\n5.3 기종성 신우신염 (Emphysematous Pyelonephritis)\n특징: 당뇨병 환자에서 주로 발생하며 신장 실질에 가스가 형성되는 중증 감염입니다.\n치료: 즉각적인 광범위 항생제 투여(Carbapenem 등)와 경피적 배농술이 필요하며, 보존적 치료에 반응하지 않거나 광범위한 침범 시 신장 절제술을 고려해야 합니다.\n5.4 다제내성균(ESBL-E, CRE 등)에 의한 cUTI\nExtended-Spectrum Beta-Lactamase (ESBL) 생성균: Carbapenem이 1차 치료제입니다. 상태가 안정적이고 감수성이 있다면 Piperacillin-Tazobactam, Amikacin 등을 대체제로 고려할 수 있습니다.\nCarbapenem-Resistant Enterobacterales (CRE): Ceftazidime-Avibactam, Meropenem-Vaborbactam, Imipenem-Cilastatin-Relebactam, Cefiderocol 등이 권장되며, Aminoglycoside 단독 요법도 대안이 될 수 있습니다.\n6. 요약표: 주요 요로감염 경험적 항생제\n약어: FQ (Fluoroquinolone), ESBL (Extended-Spectrum Beta-Lactamase)\nReferences\n강철인, 김지은, 박대원 등. 요로감염 항생제 사용지침. Infect Chemother 2018;50(1):67-100.  \n Nicolle LE, Bradley S, Colgan R, et al. Infectious Diseases Society of America guidelines for the diagnosis and treatment of asymptomatic bacteriuria in adults. Clin Infect Dis 2005;40:643-54.  \nSmaill FM, Vazquez JC. Antibiotics for asymptomatic bacteriuria in pregnancy. Cochrane Database Syst Rev 2015;(8):CD000490.  \nCai T, Mazzoli S, Mondaini N, et al. The role of asymptomatic bacteriuria in young women with recurrent urinary tract infections: to treat or not to treat? Clin Infect Dis 2012;55:771-7.  \nNicolle LE, Mayhew WJ, Bryan L. Prospective randomized comparison of therapy and no therapy for asymptomatic bacteriuria in institutionalized elderly women. Am J Med 1987;83:27-33.  \nHarding GK, Zhanel GG, Nicolle LE, et al. Antimicrobial treatment in diabetic women with asymptomatic bacteriuria. N Engl J Med 2002;347:1576-83.  \nMohler JL, Cowen DL, Flanigan RC. Suppression and treatment of urinary tract infection in patients with an intermittently catheterized neurogenic bladder. J Urol 1987;138:336-40.  \nGrabe M, Forsgren A, Björk T, Hellsten S. Controlled trial of a short and a prolonged course with ciprofloxacin in patients undergoing transurethral prostatic surgery. Eur J Clin Microbiol 1987;6:11-7.  \nLee SJ, Lee DS, Choe HS, et al. Antimicrobial resistance in community-acquired urinary tract infections: results from the Korean Antimicrobial Resistance Monitoring System. J Infect Chemother 2011;17:440-6.  \nGupta K, Hooton TM, Naber KG, et al. International clinical practice guidelines for the treatment of acute uncomplicated cystitis and pyelonephritis in women: A 2010 update by the Infectious Diseases Society of America and the European Society for Microbiology and Infectious Diseases. Clin Infect Dis 2011;52:e103-20.  \nRafalsky V, Andreeva I, Rjabkova E. Quinolones for uncomplicated acute cystitis in women. Cochrane Database Syst Rev 2006;(3):CD003597.  \nFalagas ME, Vouloumanou EK, Togias AG, et al. Fosfomycin versus other antibiotics for the treatment of cystitis: a meta-analysis of randomized controlled trials. J Antimicrob Chemother 2010;65:1862-77.  \nHooton TM, Roberts PL, Stapleton AE. Cefpodoxime vs ciprofloxacin for short-course treatment of acute uncomplicated cystitis: a randomized trial. JAMA 2012;307:583-9.  \nSeo MR, Kim SJ, Kim Y, et al. Susceptibility of Escherichia coli from community-acquired urinary tract infection to fosfomycin, nitrofurantoin, and temocillin in Korea. J Korean Med Sci 2014;29:1178-81.  \nKim ME, Ha US, Cho YH. Prevalence of antimicrobial resistance among uropathogens causing acute uncomplicated cystitis in female outpatients in South Korea: a multicentre study in 2006. Int J Antimicrob Agents 2008;31(Suppl 1):S15-8. \nLifshitz E, Kramer L. Outpatient urine culture: does collection technique matter? Arch Intern Med 2000;160:2537-40.  \nTalan DA, Stamm WE, Hooton TM, et al. Comparison of ciprofloxacin (7 days) and trimethoprim-sulfamethoxazole (14 days) for acute uncomplicated pyelonephritis in women: a randomized trial. JAMA 2000;283:1583-90.  \nWagenlehner FM, Weidner W, Naber KG. An update on uncomplicated urinary tract infections in women. Curr Opin Urol 2009;19:368-74.  \nWie SH. Urinary tract infections. In: The Korean Society for Infectious Diseases, eds. Infectious Diseases. 2nd ed. Seoul: Koonja Publishing Inc.; 2014;225-37.  \nJeon JH, Kim K, Han WD, et al. Empirical use of ciprofloxacin for acute uncomplicated pyelonephritis caused by Escherichia coli in communities where the prevalence of fluoroquinolone resistance is high. Antimicrob Agents Chemother 2012;56:3043-6.  \nVeve MP, Wagner JL, Kenney RM, et al. Comparison of fosfomycin to ertapenem for outpatient or step-down therapy of extended-spectrum beta-lactamase urinary tract infections. Int J Antimicrob Agents 2016;48:56-60.  \nWagenlehner FM, Lichtenstern C, Rolfes C, et al. Diagnosis and management for urosepsis. Int J Urol 2013;20:963-70.  \nRamsey S, Robertson A, Ablett MJ, et al. Evidence-based drainage of infected hydronephrosis secondary to ureteric calculi. J Endourol 2010;24:185-9.  \nMarien T, Miller NL. Treatment of the Infected Stone. Urol Clin North Am 2015;42:459-72.  \nAboumarzouk OM, Hughes O, Narahari K, et al. Emphysematous pyelonephritis: Time for a management plan with an evidence-based approach. Arab J Urol 2014;12:106-15.  \nHuang JJ, Tseng CC. Emphysematous pyelonephritis: clinicoradiological classification, management, prognosis, and pathogenesis. Arch Intern Med 2000;160:797-805.  \nBrehm TJ, Trautner BW, Kulkarni PA. Acute and Chronic Infectious Prostatitis in Older Adults. Infect Dis Clin North Am 2023;37(1):175-194.  \nTamma PD, et al. Infectious Diseases Society of America 2024 Guidance on the Treatment of Antimicrobial-Resistant Gram-Negative Infections. Clin Infect Dis. 2024.  \n본 지침은 인천나은병원 항생제관리팀에서 승인하였으며,\n정기적으로 검토 및 업데이트됩니다.\n문의: 항생제관리팀", "paragraphs": [{"heading": "1. 개요", "content": "본 지침은 성인 환자에서 발생하는 급성 단순 방광염, 급성 단순 신우신염, 그리고 복잡성 요로감염의 적절한 진단과 치료를 위해 작성되었습니다. 국내 요로감염 원인균의 항생제 내성 증가(특히 Fluoroquinolone 및 3세대 Cephalosporin)를 고려하여 경험적 항생제 선택에 신중을 기해야 합니다."}, {"heading": "2.1 정의 및 진단", "content": "요로감염 증상이나 징후 없이 소변에 의미 있는 세균이 존재하는 경우입니다.\n여성은 청결 채취 중간뇨에서 1 mL당 10⁵ 집락형성단위(Colony Forming Unit, CFU) 이상 2회 연속 같은 세균이 배양될 때, 남성은 1회라도 배양될 때 진단합니다."}, {"heading": "2.2 치료 적응증", "content": "치료 권장:\n임신부: 임신 초기 여성에서 선별하여 치료해야 합니다. 치료하지 않을 경우 신우신염, 저체중아 출산, 조기 분만 등의 위험이 있습니다.\n점막 출혈이 예상되는 비뇨기과 시술 예정자: 경요도 전립선 절제술(Transurethral Resection of the Prostate, TUR-P) 등 시술 전 치료를 권장합니다.\n치료 권장하지 않음: 비임신 여성, 당뇨병 환자, 노인(시설 거주자 포함), 척수 손상 환자, 유치 도뇨관(Indwelling urinary catheter)을 가진 환자에서는 이득이 없거나 내성균 출현을 조장하므로 치료하지 않습니다."}, {"heading": "3.1 정의 및 진단", "content": "정의: 구조적/기능적 요로 이상이 없는 건강한 성인 여성에서 방광에 국한된 감염입니다.\n진단: 배뇨통(Dysuria), 빈뇨(Frequency), 긴박뇨(Urgency), 치골 상부 통증 등이 주 증상입니다.\n배양 검사: 전형적인 증상이 있는 단순 방광염은 경험적 치료가 가능하나, 신우신염이 의심되거나, 비전형적 증상, 임신부, 남성, 최근 항생제 사용력, 재발성 감염의 경우 소변 배양 검사를 시행해야 합니다. 국내 내성률 증가로 인해 배양 검사의 중요성이 강조되고 있습니다."}, {"heading": "3.2 경험적 항생제 치료 (Empirical Therapy)", "content": "국내 Escherichia coli의 Ciprofloxacin 내성률이 높고, Trimethoprim-Sulfamethoxazole (TMP-SMX) 내성률 또한 30%를 상회하므로 경험적 선택 시 주의가 필요합니다.\n1차 권장 약제:\nFosfomycin trometamol: 3 g 경구 1회 투여. (국내 내성률이 낮아 유용한 옵션입니다)\nNitrofurantoin monohydrate/macrocrystals: 100 mg 경구 1일 2회, 5일간 투여 (신기능 저하 시 주의)\nPivmecillinam: 400 mg 경구 1일 3회, 3~5일간 투여 (국내 도입 시 고려)\n대체 약제:\nFluoroquinolone: Ciprofloxacin (250~500 mg 1일 2회) 또는 Levofloxacin (250~500 mg 1일 1회) 3일 요법. (단, 결핵이 의심되거나 다른 1차 약제 사용이 가능한 경우 유보하는 것이 좋습니다)\nBeta-lactams: Cefpodoxime, Cefdinir, Cefixime 등 경구 3세대 Cephalosporin을 5~7일간 투여할 수 있으나, Fluoroquinolone보다 효과가 다소 떨어질 수 있습니다.\n주의: Amoxicillin-Clavulanate나 Ampicillin은 내성률이 높아 단독 경험적 치료로 권장되지 않습니다."}, {"heading": "4.1 정의 및 진단", "content": "정의: 감염이 신장 실질과 신우까지 파급된 상부 요로감염으로, 발열(>38°C), 오한, 옆구리 통증(Flank pain), 늑골척추각 압통(Costovertebral Angle Tenderness, CVAT), 구역/구토를 동반합니다.\n검사: 소변 배양 및 혈액 배양 검사를 반드시 시행해야 합니다."}, {"heading": "4.2 치료 원칙", "content": "모든 환자에서 배양 검사 결과에 따라 항생제를 조정(De-escalation)해야 합니다.\n국내 E. coli의 Fluoroquinolone 내성률이 20%를 상회하므로, 초기 경험적 치료 실패 가능성을 고려해야 합니다."}, {"heading": "4.3 경험적 항생제 치료", "content": "A. 입원이 필요 없는 경증 환자 (Outpatient)\n초기 주사 요법: Ceftriaxone 1 g 정주 또는 Amikacin (Aminoglycoside) 1회 투여 후 경구 항생제로 이어가는 것이 안전합니다.\n경구 유지 요법:\nCiprofloxacin 500 mg 1일 2회, 7일.\nLevofloxacin 750 mg 1일 1회, 5일.\nTMP-SMX 160/800 mg 1일 2회, 14일 (감수성이 확인된 경우).\n경구 Beta-lactams(예: Cefpodoxime)은 효과가 떨어질 수 있어 10~14일 투여가 권장됩니다.\nB. 입원이 필요한 중등도 이상 환자 (Inpatient)\n권장 주사 약제:\nExtended-spectrum Cephalosporin: Ceftriaxone, Cefotaxime, Cefepime.\nFluoroquinolone: Ciprofloxacin, Levofloxacin (국내 내성률 고려 시 단독 사용 주의).\nPiperacillin-Tazobactam.\nAminoglycoside (Gentamicin, Amikacin) + Ampicillin.\nCarbapenem: Ertapenem, Meropenem, Imipenem-Cilastatin (ESBL 생성균 의심 시).\n중증 패혈증/패혈성 쇼크: Piperacillin-Tazobactam 또는 Carbapenem 계열을 우선 고려하며, 다제내성균 위험이 높으면 Amikacin 병합을 고려할 수 있습니다."}, {"heading": "5.1 정의", "content": "요로계의 해부학적 또는 기능적 이상(예: 요로 결석, 종양, 신경인성 방광), 요로 폐쇄, 이물질(도뇨관, 스텐트), 혹은 기저질환(당뇨병, 면역저하)이 동반된 상태에서 발생한 요로감염입니다.\n남성의 요로감염은 기본적으로 복잡성으로 간주하는 경향이 있으며, 전립선염 감별이 필요합니다."}, {"heading": "5.2 요로 폐쇄 관련 신우신염 (Obstructive Pyelonephritis)", "content": "치료 원칙: 항생제 치료와 함께 폐쇄의 원인(결석 등)을 해소하는 감압 시술(Stent 삽입, 경피적 신루 설치술 등)이 필수적이며, 가능한 한 빨리 시행해야 합니다.\n경험적 항생제: 단순 신우신염보다 광범위한 커버리지가 필요할 수 있습니다. Piperacillin-Tazobactam, Cefepime, Carbapenem 등을 고려합니다. 패혈증 동반 시 Beta-lactam + Aminoglycoside 병합 요법을 고려할 수 있습니다.\n치료 기간: 요로 폐쇄가 해결되고 증상이 호전되면 7~14일간 투여하나, 불충분한 경우 21일 이상 연장할 수 있습니다."}, {"heading": "5.3 기종성 신우신염 (Emphysematous Pyelonephritis)", "content": "특징: 당뇨병 환자에서 주로 발생하며 신장 실질에 가스가 형성되는 중증 감염입니다.\n치료: 즉각적인 광범위 항생제 투여(Carbapenem 등)와 경피적 배농술이 필요하며, 보존적 치료에 반응하지 않거나 광범위한 침범 시 신장 절제술을 고려해야 합니다."}, {"heading": "5.4 다제내성균(ESBL-E, CRE 등)에 의한 cUTI", "content": "Extended-Spectrum Beta-Lactamase (ESBL) 생성균: Carbapenem이 1차 치료제입니다. 상태가 안정적이고 감수성이 있다면 Piperacillin-Tazobactam, Amikacin 등을 대체제로 고려할 수 있습니다.\nCarbapenem-Resistant Enterobacterales (CRE): Ceftazidime-Avibactam, Meropenem-Vaborbactam, Imipenem-Cilastatin-Relebactam, Cefiderocol 등이 권장되며, Aminoglycoside 단독 요법도 대안이 될 수 있습니다."}, {"heading": "6. 요약표: 주요 요로감염 경험적 항생제", "content": "약어: FQ (Fluoroquinolone), ESBL (Extended-Spectrum Beta-Lactamase)\nReferences\n강철인, 김지은, 박대원 등. 요로감염 항생제 사용지침. Infect Chemother 2018;50(1):67-100.\nNicolle LE, Bradley S, Colgan R, et al. Infectious Diseases Society of America guidelines for the diagnosis and treatment of asymptomatic bacteriuria in adults. Clin Infect Dis 2005;40:643-54.\nSmaill FM, Vazquez JC. Antibiotics for asymptomatic bacteriuria in pregnancy. Cochrane Database Syst Rev 2015;(8):CD000490.\nCai T, Mazzoli S, Mondaini N, et al. The role of asymptomatic bacteriuria in young women with recurrent urinary tract infections: to treat or not to treat? Clin Infect Dis 2012;55:771-7.\nNicolle LE, Mayhew WJ, Bryan L. Prospective randomized comparison of therapy and no therapy for asymptomatic bacteriuria in institutionalized elderly women. Am J Med 1987;83:27-33.\nHarding GK, Zhanel GG, Nicolle LE, et al. Antimicrobial treatment in diabetic women with asymptomatic bacteriuria. N Engl J Med 2002;347:1576-83.\nMohler JL, Cowen DL, Flanigan RC. Suppression and treatment of urinary tract infection in patients with an intermittently catheterized neurogenic bladder. J Urol 1987;138:336-40.\nGrabe M, Forsgren A, Björk T, Hellsten S. Controlled trial of a short and a prolonged course with ciprofloxacin in patients undergoing transurethral prostatic surgery. Eur J Clin Microbiol 1987;6:11-7.\nLee SJ, Lee DS, Choe HS, et al. Antimicrobial resistance in community-acquired urinary tract infections: results from the Korean Antimicrobial Resistance Monitoring System. J Infect Chemother 2011;17:440-6.\nGupta K, Hooton TM, Naber KG, et al. International clinical practice guidelines for the treatment of acute uncomplicated cystitis and pyelonephritis in women: A 2010 update by the Infectious Diseases Society of America and the European Society for Microbiology and Infectious Diseases. Clin Infect Dis 2011;52:e103-20.\nRafalsky V, Andreeva I, Rjabkova E. Quinolones for uncomplicated acute cystitis in women. Cochrane Database Syst Rev 2006;(3):CD003597.\nFalagas ME, Vouloumanou EK, Togias AG, et al. Fosfomycin versus other antibiotics for the treatment of cystitis: a meta-analysis of randomized controlled trials. J Antimicrob Chemother 2010;65:1862-77.\nHooton TM, Roberts PL, Stapleton AE. Cefpodoxime vs ciprofloxacin for short-course treatment of acute uncomplicated cystitis: a randomized trial. JAMA 2012;307:583-9.\nSeo MR, Kim SJ, Kim Y, et al. Susceptibility of Escherichia coli from community-acquired urinary tract infection to fosfomycin, nitrofurantoin, and temocillin in Korea. J Korean Med Sci 2014;29:1178-81.\nKim ME, Ha US, Cho YH. Prevalence of antimicrobial resistance among uropathogens causing acute uncomplicated cystitis in female outpatients in South Korea: a multicentre study in 2006. Int J Antimicrob Agents 2008;31(Suppl 1):S15-8.\nLifshitz E, Kramer L. Outpatient urine culture: does collection technique matter? Arch Intern Med 2000;160:2537-40.\nTalan DA, Stamm WE, Hooton TM, et al. Comparison of ciprofloxacin (7 days) and trimethoprim-sulfamethoxazole (14 days) for acute uncomplicated pyelonephritis in women: a randomized trial. JAMA 2000;283:1583-90.\nWagenlehner FM, Weidner W, Naber KG. An update on uncomplicated urinary tract infections in women. Curr Opin Urol 2009;19:368-74.\nWie SH. Urinary tract infections. In: The Korean Society for Infectious Diseases, eds. Infectious Diseases. 2nd ed. Seoul: Koonja Publishing Inc.; 2014;225-37.\nJeon JH, Kim K, Han WD, et al. Empirical use of ciprofloxacin for acute uncomplicated pyelonephritis caused by Escherichia coli in communities where the prevalence of fluoroquinolone resistance is high. Antimicrob Agents Chemother 2012;56:3043-6.\nVeve MP, Wagner JL, Kenney RM, et al. Comparison of fosfomycin to ertapenem for outpatient or step-down therapy of extended-spectrum beta-lactamase urinary tract infections. Int J Antimicrob Agents 2016;48:56-60.\nWagenlehner FM, Lichtenstern C, Rolfes C, et al. Diagnosis and management for urosepsis. Int J Urol 2013;20:963-70.\nRamsey S, Robertson A, Ablett MJ, et al. Evidence-based drainage of infected hydronephrosis secondary to ureteric calculi. J Endourol 2010;24:185-9.\nMarien T, Miller NL. Treatment of the Infected Stone. Urol Clin North Am 2015;42:459-72.\nAboumarzouk OM, Hughes O, Narahari K, et al. Emphysematous pyelonephritis: Time for a management plan with an evidence-based approach. Arab J Urol 2014;12:106-15.\nHuang JJ, Tseng CC. Emphysematous pyelonephritis: clinicoradiological classification, management, prognosis, and pathogenesis. Arch Intern Med 2000;160:797-805.\nBrehm TJ, Trautner BW, Kulkarni PA. Acute and Chronic Infectious Prostatitis in Older Adults. Infect Dis Clin North Am 2023;37(1):175-194.\nTamma PD, et al. Infectious Diseases Society of America 2024 Guidance on the Treatment of Antimicrobial-Resistant Gram-Negative Infections. Clin Infect Dis. 2024.\n본 지침은 인천나은병원 항생제관리팀에서 승인하였으며,\n정기적으로 검토 및 업데이트됩니다.\n문의: 항생제관리팀"}]}, {"id": "03_호흡기감염지침", "title": "호흡기 감염", "icon": "__LUNG__", "tags": ["폐렴", "CAP", "HAP", "VAP", "인두염", "Amoxicillin", "Azithromycin", "Levofloxacin", "McIsaac", "호흡기"], "fullText": "호흡기 감염 항생제 사용 지침\n인천나은병원 항생제관리팀\n26.2.20\n1. 개요\n본 지침은 성인 환자에서 발생하는 급성 상기도 감염 및 폐렴의 적절한 진단과 항생제 사용을 위해 작성되었습니다. 불필요한 항생제 사용을 줄이고, 내성균 발생을 억제하며, 환자의 예후를 개선하는 것을 목적으로 합니다.\n2. 급성 상기도 감염 (Acute Upper Respiratory Tract Infections)\n대부분의 급성 상기도 감염은 바이러스성이므로 항생제 치료가 필요하지 않습니다. 세균성 감염이 강력히 의심되거나 합병증이 동반된 경우에 한해 항생제를 투여합니다.\n2.1 급성 인두편도염 (Acute Pharyngotonsillitis)\n원인균: 대부분 바이러스가 원인이며, 성인 인두염의 5-15%만이 Streptococcus pyogenes (Group A Streptococcus, GAS)에 의해 발생합니다.\n진단: 임상 증상만으로는 바이러스성과 세균성을 감별하기 어려우므로 임상 점수 체계를 활용합니다.\n2.1.1 임상 점수 체계: Centor 및 McIsaac 점수\n이 점수 체계는 인후통 환자에서 S. pyogenes 감염 확률을 예측하여 항생제 사용이나 추가 검사 여부를 결정하는 데 사용됩니다.\nCentor Score: 다음 4가지 임상 지표를 기준으로 합니다(각 1점).\n체온 38℃ 이상의 발열\n기침이 없음 (Absence of cough)\n압통을 동반한 전방 경부 림프절 종대 (Tender anterior cervical adenopathy)\n편도 비대 또는 삼출물 (Tonsillar exudates)\nMcIsaac Score (Modified Centor Score): Centor 점수에 연령 요소를 반영하여 보완한 것으로, 국내 지침에서 주로 권고됩니다.\n계산: Centor 점수(0~4점) + 연령 점수\n연령 점수: 3~14세 (+1점), 15~44세 (0점), 45세 이상 (-1점)\n점수에 따른 권고 사항:\n0~2점: S. pyogenes 감염 확률이 낮으므로(1~17%) 대증 요법을 시행하며, 항생제 투여나 추가 검사는 권장하지 않습니다.\n3점 이상: S. pyogenes 감염 확률이 높으므로(28~53%), 신속항원검사(Rapid Antigen Detection Test, RADT)를 시행합니다. 양성인 경우 항생제를 투여하고, 검사가 불가능한 상황에서는 경험적 항생제 투여를 고려할 수 있습니다.\n2.2 치료 (S. pyogenes 확진 또는 강력 의심 시)\n1차 선택약제: Amoxicillin 10일 요법. (단, 전염단핵구증이 의심될 때는 Amoxicillin을 사용하지 않습니다)\n대체 약제: 순응도가 우려될 경우 Cefdinir나 Azithromycin 5일 요법을 고려할 수 있습니다.\nPenicillin 알레르기:\nType 4(발진 등): 1세대 Cephalosporin (Cephalexin 등), Clindamycin, Azithromycin, Clarithromycin\nType 1(Anaphylaxis): Beta-lactam 계열을 피하고 Clindamycin, Azithromycin, Clarithromycin 사용\n3. 지역사회획득 폐렴 (Community-Acquired Pneumonia, CAP)\n3.1 진단 및 중증도 평가\n진단: 기침, 가래, 발열 등의 증상과 흉부 방사선 검사(Chest X-ray)상 신규 침윤이 확인된 경우 진단합니다.\n중증도 평가: 환자의 사망 위험도를 예측하여 치료 장소(외래 vs 일반병동 vs 중환자실)를 결정하기 위해 Pneumonia Severity Index (PSI) 또는 CURB-65를 사용합니다.\n3.1.1 중증도 평가 도구\nA. Pneumonia Severity Index (PSI)\n개요: 나이, 성별, 동반질환, 신체검진 소견, 혈액 및 영상 검사 소견 등 총 20개 변수를 종합하여 평가합니다.\n특징: 저위험군을 선별하는 데 예측력이 뛰어나 외래 치료 환자를 결정하는 데 우선적으로 권장됩니다.\n등급 및 권고:\nClass I-II (≤70점): 저위험군 (외래 치료 권장).\nClass III (71-90점): 저위험군 (외래 또는 단기 입원 고려).\nClass IV (91-130점): 중등도 위험군 (입원 치료 권장).\nClass V (>130점): 고위험군 (입원 치료 권장, 중환자실 고려).\nB. CURB-65\n개요: 다음 5가지 핵심 지표(각 1점)를 사용하여 계산이 간편하여 응급실 등에서 유용하게 사용됩니다.\nC (Confusion): 의식 혼미\nU (Urea): Blood Urea Nitrogen (BUN) > 19 mg/dL (> 7 mmol/L)\nR (Respiratory rate): 호흡수 ≥ 30회/분\nB (Blood pressure): 수축기 < 90 mmHg 또는 이완기 ≤ 60 mmHg\n65: 나이 ≥ 65세\n점수별 권고:\n0~1점: 저위험군 (외래 치료 고려, 사망률 <1.5%).\n2점: 중등도 위험군 (입원 치료 고려, 사망률 약 9.2%).\n3~5점: 고위험군 (입원 치료, 특히 중환자실 입원 고려, 사망률 22% 이상).\n3.2 경험적 항생제 치료 (Empirical Therapy)\nA. 외래 환자 (Outpatient)\n건강한 성인 (동반질환 없음, 항생제 내성 위험 없음):\nAmoxicillin 1 g tid, 또는 Doxycycline 100 mg bid.\nMacrolide (Azithromycin, Clarithromycin): 폐렴구균의 Macrolide 내성률이 25% 미만인 지역에서만 단독 요법으로 사용 가능합니다(국내 내성률은 높으므로 주의).\n동반질환자 (만성 심/폐/간/신질환, 당뇨, 알코올 중독, 악성종양, 무비증 등):\n병합 요법: Amoxicillin-Clavulanate 또는 Cephalosporin (Cefpodoxime, Cefuroxime) PLUS Macrolide 또는 Doxycycline.\n단독 요법: Respiratory Fluoroquinolone (Levofloxacin, Moxifloxacin, Gemifloxacin).\n국내 주의사항: 결핵을 배제할 수 없는 경우 Fluoroquinolone의 경험적 사용을 피하는 것이 좋습니다.\nB. 입원 환자 (Inpatient)\n비중증 (Non-severe):\nBeta-lactam (Ampicillin-Sulbactam, Cefotaxime, Ceftriaxone, Ceftaroline) PLUS Macrolide.\n또는 Respiratory Fluoroquinolone 단독 요법.\nMacrolide와 Fluoroquinolone을 사용할 수 없는 경우: Beta-lactam + Doxycycline.\n중증 (Severe):\nBeta-lactam PLUS Macrolide.\n또는 Beta-lactam PLUS Respiratory Fluoroquinolone.\n3.3 MRSA 및 P. aeruginosa 위험군 관리\n과거 Healthcare-Associated Pneumonia (HCAP) 개념은 폐기되었으며, 개별 환자의 위험 인자와 지역 내성 현황을 기반으로 항생제를 선택합니다.\n경험적 커버리지: 과거 호흡기 검체에서 Methicillin-Resistant Staphylococcus aureus (MRSA)나 Pseudomonas aeruginosa가 분리되었거나, 최근 90일 이내 입원 및 정주 항생제 사용력이 있는 경우 경험적 커버리지를 고려합니다.\nMRSA 의심 시: Vancomycin 또는 Linezolid 추가.\nP. aeruginosa 의심 시: Piperacillin-Tazobactam, Cefepime, Ceftazidime, Meropenem, Imipenem-Cilastatin, Aztreonam 중 선택.\nDe-escalation: 배양 결과가 음성이면 48시간 내에 해당 균에 대한 항생제는 중단(De-escalation)합니다.\n4. 병원획득 폐렴 및 인공호흡기 관련 폐렴 (HAP/VAP)\n4.1 일반 원칙\nHAP (입원 48시간 이후 발생) 및 VAP (기관삽관 48시간 이후 발생)는 다제내성균(MDR)의 위험이 높으므로 초기 적절한 광범위 항생제 선택이 중요합니다.\n4.2 경험적 치료 (Empirical Therapy)\n표준 요법 (MDR 위험이 낮은 경우):\nPiperacillin-Tazobactam, Cefepime, Levofloxacin, Imipenem, Meropenem 중 단독 요법.\nMDR 위험이 높거나 사망 위험이 높은 경우 (패혈성 쇼크 등):\n2제 요법 (Gram-negative double coverage): Anti-pseudomonal Beta-lactam (예: Piperacillin-Tazobactam, Cefepime, Carbapenem) PLUS Non-beta-lactam (예: Levofloxacin, Ciprofloxacin, Aminoglycoside).\nMRSA 커버리지: MRSA 유병률이 높은 병원이나 위험 인자가 있는 경우 Vancomycin 또는 Linezolid를 병합합니다.\n4.3 다제내성 그람음성균 (MDR-GNB) 확진 시 치료 전략\n원인균이 확인되면 감수성에 따라 치료를 변경합니다(IDSA 2024 지침 기반).\nExtended-Spectrum Beta-Lactamase (ESBL) 생성균: Carbapenem (Meropenem, Imipenem-Cilastatin)이 우선 권장됩니다. 경증이나 요로 감염이 동반된 경우 Fluoroquinolone이나 Trimethoprim-Sulfamethoxazole (TMP-SMX) 사용 가능성을 고려합니다.\nCarbapenem-Resistant Enterobacterales (CRE): Ceftazidime-Avibactam, Meropenem-Vaborbactam, Imipenem-Cilastatin-Relebactam, Cefiderocol 중 감수성에 따라 선택합니다.\nDifficult-to-Treat Resistance (DTR) P. aeruginosa: Ceftolozane-Tazobactam, Ceftazidime-Avibactam, Imipenem-Cilastatin-Relebactam이 우선 권장되며, 대안으로 Cefiderocol을 고려합니다.\nCarbapenem-Resistant Acinetobacter baumannii (CRAB): Sulbactam-Durlobactam (가용 시) + Carbapenem, 또는 고용량 Ampicillin-Sulbactam 기반의 병합 요법을 고려합니다.\n5. 요약표\nReferences\n1. Metlay JP, Waterer GW, Long AC, et al. Diagnosis and Treatment of Adults with Community-acquired Pneumonia. An Official Clinical Practice Guideline of the American Thoracic Society and Infectious Diseases Society of America. Am J Respir Crit Care Med. 2019;200(7):e45-e67.\n2. Tamma PD, Heil EL, Justo JA, et al. Infectious Diseases Society of America 2024 Guidance on the Treatment of Antimicrobial-Resistant Gram-Negative Infections. Clin Infect Dis. 2024.\n3. 윤영경, 박찬순, 김재욱 등. 성인 급성 상기도 감염 항생제 사용지침 권고안. Infect Chemother 2017;49(4):326-352.\n4. 이미숙, 오지연, 강철인 등. 성인 지역사회획득 폐렴 항생제 사용지침. Infect Chemother 2018;50(2):160-198.\n5. McIsaac WJ, Kellner JD, Aufricht P, et al. Empirical validation of guidelines for the management of pharyngitis in children and adults. JAMA 2004;291:1587-95.\n6. Fine MJ, Auble TE, Yealy DM, et al. A prediction rule to identify low-risk patients with community-acquired pneumonia. N Engl J Med 1997;336:243-250.\n7. Lim WS, van der Eerden MM, Laing R, et al. Defining community acquired pneumonia severity on presentation to hospital: an international derivation and validation study. Thorax 2003;58:377-382.\n본 지침은 인천나은병원 항생제관리팀에서 승인하였으며,\n정기적으로 검토 및 업데이트됩니다.\n문의: 항생제관리팀", "paragraphs": [{"heading": "1. 개요", "content": "본 지침은 성인 환자에서 발생하는 급성 상기도 감염 및 폐렴의 적절한 진단과 항생제 사용을 위해 작성되었습니다. 불필요한 항생제 사용을 줄이고, 내성균 발생을 억제하며, 환자의 예후를 개선하는 것을 목적으로 합니다."}, {"heading": "2. 급성 상기도 감염 (Acute Upper Respiratory Tract Infections)", "content": "대부분의 급성 상기도 감염은 바이러스성이므로 항생제 치료가 필요하지 않습니다. 세균성 감염이 강력히 의심되거나 합병증이 동반된 경우에 한해 항생제를 투여합니다."}, {"heading": "2.1 급성 인두편도염 (Acute Pharyngotonsillitis)", "content": "원인균: 대부분 바이러스가 원인이며, 성인 인두염의 5-15%만이 Streptococcus pyogenes (Group A Streptococcus, GAS)에 의해 발생합니다.\n진단: 임상 증상만으로는 바이러스성과 세균성을 감별하기 어려우므로 임상 점수 체계를 활용합니다."}, {"heading": "2.1.1 임상 점수 체계: Centor 및 McIsaac 점수", "content": "이 점수 체계는 인후통 환자에서 S. pyogenes 감염 확률을 예측하여 항생제 사용이나 추가 검사 여부를 결정하는 데 사용됩니다.\nCentor Score: 다음 4가지 임상 지표를 기준으로 합니다(각 1점).\n체온 38℃ 이상의 발열\n기침이 없음 (Absence of cough)\n압통을 동반한 전방 경부 림프절 종대 (Tender anterior cervical adenopathy)\n편도 비대 또는 삼출물 (Tonsillar exudates)\nMcIsaac Score (Modified Centor Score): Centor 점수에 연령 요소를 반영하여 보완한 것으로, 국내 지침에서 주로 권고됩니다.\n계산: Centor 점수(0~4점) + 연령 점수\n연령 점수: 3~14세 (+1점), 15~44세 (0점), 45세 이상 (-1점)\n점수에 따른 권고 사항:\n0~2점: S. pyogenes 감염 확률이 낮으므로(1~17%) 대증 요법을 시행하며, 항생제 투여나 추가 검사는 권장하지 않습니다.\n3점 이상: S. pyogenes 감염 확률이 높으므로(28~53%), 신속항원검사(Rapid Antigen Detection Test, RADT)를 시행합니다. 양성인 경우 항생제를 투여하고, 검사가 불가능한 상황에서는 경험적 항생제 투여를 고려할 수 있습니다."}, {"heading": "2.2 치료 (S. pyogenes 확진 또는 강력 의심 시)", "content": "1차 선택약제: Amoxicillin 10일 요법. (단, 전염단핵구증이 의심될 때는 Amoxicillin을 사용하지 않습니다)\n대체 약제: 순응도가 우려될 경우 Cefdinir나 Azithromycin 5일 요법을 고려할 수 있습니다.\nPenicillin 알레르기:\nType 4(발진 등): 1세대 Cephalosporin (Cephalexin 등), Clindamycin, Azithromycin, Clarithromycin\nType 1(Anaphylaxis): Beta-lactam 계열을 피하고 Clindamycin, Azithromycin, Clarithromycin 사용"}, {"heading": "3.1 진단 및 중증도 평가", "content": "진단: 기침, 가래, 발열 등의 증상과 흉부 방사선 검사(Chest X-ray)상 신규 침윤이 확인된 경우 진단합니다.\n중증도 평가: 환자의 사망 위험도를 예측하여 치료 장소(외래 vs 일반병동 vs 중환자실)를 결정하기 위해 Pneumonia Severity Index (PSI) 또는 CURB-65를 사용합니다."}, {"heading": "3.1.1 중증도 평가 도구", "content": "A. Pneumonia Severity Index (PSI)\n개요: 나이, 성별, 동반질환, 신체검진 소견, 혈액 및 영상 검사 소견 등 총 20개 변수를 종합하여 평가합니다.\n특징: 저위험군을 선별하는 데 예측력이 뛰어나 외래 치료 환자를 결정하는 데 우선적으로 권장됩니다.\n등급 및 권고:\nClass I-II (≤70점): 저위험군 (외래 치료 권장).\nClass III (71-90점): 저위험군 (외래 또는 단기 입원 고려).\nClass IV (91-130점): 중등도 위험군 (입원 치료 권장).\nClass V (>130점): 고위험군 (입원 치료 권장, 중환자실 고려).\nB. CURB-65\n개요: 다음 5가지 핵심 지표(각 1점)를 사용하여 계산이 간편하여 응급실 등에서 유용하게 사용됩니다.\nC (Confusion): 의식 혼미\nU (Urea): Blood Urea Nitrogen (BUN) > 19 mg/dL (> 7 mmol/L)\nR (Respiratory rate): 호흡수 ≥ 30회/분\nB (Blood pressure): 수축기 < 90 mmHg 또는 이완기 ≤ 60 mmHg\n65: 나이 ≥ 65세\n점수별 권고:\n0~1점: 저위험군 (외래 치료 고려, 사망률 <1.5%).\n2점: 중등도 위험군 (입원 치료 고려, 사망률 약 9.2%).\n3~5점: 고위험군 (입원 치료, 특히 중환자실 입원 고려, 사망률 22% 이상)."}, {"heading": "3.2 경험적 항생제 치료 (Empirical Therapy)", "content": "A. 외래 환자 (Outpatient)\n건강한 성인 (동반질환 없음, 항생제 내성 위험 없음):\nAmoxicillin 1 g tid, 또는 Doxycycline 100 mg bid.\nMacrolide (Azithromycin, Clarithromycin): 폐렴구균의 Macrolide 내성률이 25% 미만인 지역에서만 단독 요법으로 사용 가능합니다(국내 내성률은 높으므로 주의).\n동반질환자 (만성 심/폐/간/신질환, 당뇨, 알코올 중독, 악성종양, 무비증 등):\n병합 요법: Amoxicillin-Clavulanate 또는 Cephalosporin (Cefpodoxime, Cefuroxime) PLUS Macrolide 또는 Doxycycline.\n단독 요법: Respiratory Fluoroquinolone (Levofloxacin, Moxifloxacin, Gemifloxacin).\n국내 주의사항: 결핵을 배제할 수 없는 경우 Fluoroquinolone의 경험적 사용을 피하는 것이 좋습니다.\nB. 입원 환자 (Inpatient)\n비중증 (Non-severe):\nBeta-lactam (Ampicillin-Sulbactam, Cefotaxime, Ceftriaxone, Ceftaroline) PLUS Macrolide.\n또는 Respiratory Fluoroquinolone 단독 요법.\nMacrolide와 Fluoroquinolone을 사용할 수 없는 경우: Beta-lactam + Doxycycline.\n중증 (Severe):\nBeta-lactam PLUS Macrolide.\n또는 Beta-lactam PLUS Respiratory Fluoroquinolone."}, {"heading": "3.3 MRSA 및 P. aeruginosa 위험군 관리", "content": "과거 Healthcare-Associated Pneumonia (HCAP) 개념은 폐기되었으며, 개별 환자의 위험 인자와 지역 내성 현황을 기반으로 항생제를 선택합니다.\n경험적 커버리지: 과거 호흡기 검체에서 Methicillin-Resistant Staphylococcus aureus (MRSA)나 Pseudomonas aeruginosa가 분리되었거나, 최근 90일 이내 입원 및 정주 항생제 사용력이 있는 경우 경험적 커버리지를 고려합니다.\nMRSA 의심 시: Vancomycin 또는 Linezolid 추가.\nP. aeruginosa 의심 시: Piperacillin-Tazobactam, Cefepime, Ceftazidime, Meropenem, Imipenem-Cilastatin, Aztreonam 중 선택.\nDe-escalation: 배양 결과가 음성이면 48시간 내에 해당 균에 대한 항생제는 중단(De-escalation)합니다."}, {"heading": "4.1 일반 원칙", "content": "HAP (입원 48시간 이후 발생) 및 VAP (기관삽관 48시간 이후 발생)는 다제내성균(MDR)의 위험이 높으므로 초기 적절한 광범위 항생제 선택이 중요합니다."}, {"heading": "4.2 경험적 치료 (Empirical Therapy)", "content": "표준 요법 (MDR 위험이 낮은 경우):\nPiperacillin-Tazobactam, Cefepime, Levofloxacin, Imipenem, Meropenem 중 단독 요법.\nMDR 위험이 높거나 사망 위험이 높은 경우 (패혈성 쇼크 등):\n2제 요법 (Gram-negative double coverage): Anti-pseudomonal Beta-lactam (예: Piperacillin-Tazobactam, Cefepime, Carbapenem) PLUS Non-beta-lactam (예: Levofloxacin, Ciprofloxacin, Aminoglycoside).\nMRSA 커버리지: MRSA 유병률이 높은 병원이나 위험 인자가 있는 경우 Vancomycin 또는 Linezolid를 병합합니다."}, {"heading": "4.3 다제내성 그람음성균 (MDR-GNB) 확진 시 치료 전략", "content": "원인균이 확인되면 감수성에 따라 치료를 변경합니다(IDSA 2024 지침 기반).\nExtended-Spectrum Beta-Lactamase (ESBL) 생성균: Carbapenem (Meropenem, Imipenem-Cilastatin)이 우선 권장됩니다. 경증이나 요로 감염이 동반된 경우 Fluoroquinolone이나 Trimethoprim-Sulfamethoxazole (TMP-SMX) 사용 가능성을 고려합니다.\nCarbapenem-Resistant Enterobacterales (CRE): Ceftazidime-Avibactam, Meropenem-Vaborbactam, Imipenem-Cilastatin-Relebactam, Cefiderocol 중 감수성에 따라 선택합니다.\nDifficult-to-Treat Resistance (DTR) P. aeruginosa: Ceftolozane-Tazobactam, Ceftazidime-Avibactam, Imipenem-Cilastatin-Relebactam이 우선 권장되며, 대안으로 Cefiderocol을 고려합니다.\nCarbapenem-Resistant Acinetobacter baumannii (CRAB): Sulbactam-Durlobactam (가용 시) + Carbapenem, 또는 고용량 Ampicillin-Sulbactam 기반의 병합 요법을 고려합니다."}, {"heading": "5. 요약표", "content": "References\n1. Metlay JP, Waterer GW, Long AC, et al. Diagnosis and Treatment of Adults with Community-acquired Pneumonia. An Official Clinical Practice Guideline of the American Thoracic Society and Infectious Diseases Society of America. Am J Respir Crit Care Med. 2019;200(7):e45-e67.\n2. Tamma PD, Heil EL, Justo JA, et al. Infectious Diseases Society of America 2024 Guidance on the Treatment of Antimicrobial-Resistant Gram-Negative Infections. Clin Infect Dis. 2024.\n3. 윤영경, 박찬순, 김재욱 등. 성인 급성 상기도 감염 항생제 사용지침 권고안. Infect Chemother 2017;49(4):326-352."}, {"heading": "4. 이미숙, 오지연, 강철인 등. 성인 지역사회획득 폐렴 항생제 사용지침. Infect Chemother 2018;50(2):160-198.", "content": "5. McIsaac WJ, Kellner JD, Aufricht P, et al. Empirical validation of guidelines for the management of pharyngitis in children and adults. JAMA 2004;291:1587-95.\n6. Fine MJ, Auble TE, Yealy DM, et al. A prediction rule to identify low-risk patients with community-acquired pneumonia. N Engl J Med 1997;336:243-250.\n7. Lim WS, van der Eerden MM, Laing R, et al. Defining community acquired pneumonia severity on presentation to hospital: an international derivation and validation study. Thorax 2003;58:377-382.\n본 지침은 인천나은병원 항생제관리팀에서 승인하였으며,\n정기적으로 검토 및 업데이트됩니다.\n문의: 항생제관리팀"}]}, {"id": "04_피부연조직및당뇨발감염지침", "title": "피부·연조직 감염 및 당뇨발", "icon": "🦶", "tags": ["연조직염", "Cellulitis", "MRSA", "당뇨발", "괴사성근막염", "Cefazolin", "Vancomycin", "농양", "피부감염"], "fullText": "피부·연조직 감염 및\n당뇨발 감염 항생제 사용 지침\n인천나은병원 항생제관리팀\n26.2.20\n1. 개요 및 일반 원칙\n본 지침은 성인에서 발생하는 지역사회 획득 피부·연조직 감염 및 당뇨발 감염의 적절한 진단과 치료를 위해 작성되었습니다. 감염의 심도와 임상 양상(화농성 vs 비화농성)에 따른 분류를 통해 적절한 진단 및 경험적 항생제 선택을 돕는 것을 목적으로 합니다.\n2. 피부 및 연조직 감염 (Skin and Soft Tissue Infections, SSTI)\n2.1 농가진(Impetigo) 및 농창(Ecthyma)\n주요 원인균: Staphylococcus aureus, Streptococcus pyogenes.\n진단: 병변의 농이나 삼출물로 그람 염색과 배양검사를 추천하나, 전형적인 경우는 검사 없이 치료할 수 있습니다.\n치료:\n국소 요법: 병변이 국소적일 경우 Mupirocin이나 Fusidic acid 연고를 5일간 도포합니다.\n전신 요법: 병변이 많거나 전염 우려가 있을 경우 경구 항생제를 7일간 사용합니다.\n1차 선택약: Amoxicillin-Clavulanate, 1세대 Cephalosporin (Cephalexin 등), Clindamycin.\nMethicillin-Resistant S. aureus (MRSA) 의심 시: Doxycycline, Clindamycin, Trimethoprim-Sulfamethoxazole (TMP-SMX).\n2.2 화농성 피부·연조직 감염 (Purulent SSTI)\n정의: 피부농양(Cutaneous abscess), 종기(Furuncle), 큰 종기(Carbuncle)를 포함합니다.\n치료 원칙: 절개와 배농(Incision and Drainage, I&D)이 주된 치료입니다. 단순 농양은 배농만으로 치료될 수 있습니다.\n항생제 투여 적응증: 주위 연조직염(Cellulitis) 동반, 전신 증상(발열 등), 면역저하자, 배농이 어려운 부위(얼굴, 손 등)인 경우 항생제를 병용합니다.\n권장 항생제:\n경험적 치료: 1세대 Cephalosporin (Cefazolin, Cephalexin), Amoxicillin-Clavulanate.\nMRSA 위험군/치료 실패 시: Doxycycline, TMP-SMX, Clindamycin.\n2.3 단독(Erysipelas) 및 연조직염(Cellulitis)\n특징: 비화농성 감염으로, 단독은 경계가 명확하고 진피 상층을 침범하며, 연조직염은 경계가 모호하고 피하조직까지 침범합니다.\n주요 원인균: Beta-hemolytic Streptococci (S. pyogenes 등)가 가장 흔하며, S. aureus도 원인이 됩니다.\n치료:\n단독: Penicillin, Amoxicillin이 1차 선택약입니다.\n연조직염: 1세대 Cephalosporin (Cefazolin, Cephalexin), Nafcillin, Clindamycin.\n보조 요법: 병변 부위를 심장보다 높게 거상(Elevation)하여 부종을 줄이는 것이 중요합니다. 치료 기간은 보통 5일이며 반응에 따라 연장합니다.\n재발성 연조직염: 부종, 백선(Tinea pedis) 등 유발 요인을 교정해야 하며, 잦은 재발 시 예방적 항생제(Benzathine Penicillin 등)를 고려할 수 있습니다.\n2.4 괴사성 근막염 (Necrotizing Fasciitis)\n임상적 특징: 진찰 소견에 비해 극심한 통증, 긴장성 부종(Tense edema), 수포(Bulla), 반상출혈, 마찰음(Crepitus), 전신 독성 소견을 보입니다.\n치료 원칙: 즉각적인 광범위한 괴사 조직 제거술(Debridement)과 광범위 항생제 투여가 필수적입니다.\n경험적 항생제: 그람양성균, 그람음성균, 혐기균을 모두 커버해야 합니다.\n기본 요법: Vancomycin (MRSA 커버) PLUS [Piperacillin-Tazobactam 또는 Carbapenem (Meropenem, Imipenem-Cilastatin) 또는 (Cefepime + Metronidazole)].\n독소 억제: Group A Streptococcus 감염 의심 시 단백 합성 억제를 통해 독소 생성을 줄이기 위해 Clindamycin을 병용합니다.\nVibrio vulnificus 의심 시 (간질환/해산물): 3세대 Cephalosporin (Ceftazidime, Cefotaxime, Ceftriaxone) PLUS [Doxycycline 또는 Tetracycline].\n2.5 동물 및 사람 교상 (Bite Wounds)\n주요 원인균: Pasteurella multocida(동물), Eikenella corrodens(사람), S. aureus, 혐기균 등 복합 감염.\n치료: 상처 세척이 중요하며, 손/얼굴 교상이나 깊은 상처는 예방적 항생제를 3~5일간 투여합니다.\n1차 권장 항생제: Amoxicillin-Clavulanate (호기균 및 혐기균 동시 커버).\n대체 약제(Penicillin 알레르기): (Fluoroquinolone 또는 TMP-SMX) PLUS (Metronidazole 또는 Clindamycin).\n3. 당뇨발 감염 (Diabetic Foot Infection, DFI)\n3.1 진단 및 평가 (IWGDF/IDSA 2023)\n진단: 국소적 또는 전신적 염증 징후(발적, 온열감, 압통, 부종, 농 등)가 있어야 감염으로 진단합니다. 임상적으로 감염 징후가 없는 궤양에는 항생제를 투여하지 않습니다.\n중증도 분류:\nMild: 국소 감염만 있고 홍반이 2cm 미만이며 심부 조직 침범 없음.\nModerate: 홍반이 2cm 이상이거나 심부 조직(근막, 근육 등) 침범했으나 전신 독성 없음.\nSevere: 전신 염증 반응 증후군(SIRS) 징후 동반.\n미생물 검사: 면봉(Swab) 배양보다는 세척 및 괴사 조직 제거 후 조직 생검(Tissue biopsy)이나 소파(Curettage)를 통해 얻은 검체 배양을 강력히 권장합니다.\n3.2 권장 항생제 요법\n경험적 항생제는 감염의 중증도와 최근 항생제 사용력을 고려하여 선택합니다.\nMild DFI:\n주로 호기성 그람양성알균(S. aureus, Streptococci)을 타겟으로 합니다.\n권장 약제: Cephalexin, Amoxicillin-Clavulanate, Clindamycin, Levofloxacin.\n최근 항생제를 사용하지 않은 온대 기후 거주 환자의 Mild 감염에서는 Pseudomonas aeruginosa를 경험적으로 커버할 필요가 없습니다.\nModerate/Severe DFI:\n다제내성균, 그람음성막대균, 혐기균을 포함한 광범위 커버리지가 필요할 수 있습니다.\n권장 약제: Ampicillin-Sulbactam, Cefoxitin, Ceftriaxone + Metronidazole, Piperacillin-Tazobactam, Carbapenem (Ertapenem 등).\nMRSA 위험 인자가 있는 경우 Vancomycin, Linezolid, Daptomycin 등을 추가합니다.\nP. aeruginosa는 물에 젖은 궤양(Macerated ulcer)이나 최근 배양력이 있는 경우, 또는 온난 습윤한 기후(Tropical climate)에서 고려합니다.\n3.3 골수염 (Osteomyelitis)\n진단: 궤양 바닥에서 뼈가 만져지거나(Probe-to-bone test 양성), 단순 방사선 사진, MRI 소견을 종합하여 진단합니다.\n치료 기간:\n감염된 뼈를 수술로 완전히 제거한 경우: 1-2주 (연조직 감염 치료 기간에 준함).\n수술하지 않고 항생제만으로 치료하거나 감염된 뼈가 남아있는 경우: 약 6주간 치료.\n4. 요약표\n약어: I&D (Incision and Drainage), FQ (Fluoroquinolone), TMP-SMX (Trimethoprim-Sulfamethoxazole)\nReferences\n1. 곽이경, 최성호, 김탁 등. 피부·연조직 감염 항생제 사용지침. Infect Chemother 2017;49(4):301-325.\n2. Senneville E, Albalawi Z, van Asten SA, et al. IWGDF/IDSA Guidelines on the Diagnosis and Treatment of Diabetes-related Foot Infections (IWGDF/IDSA 2023). Clin Infect Dis 2023.\n3. Stevens DL, Bisno AL, Chambers HF, et al. Practice guidelines for the diagnosis and management of skin and soft tissue infections: 2014 update by the Infectious Diseases Society of America. Clin Infect Dis 2014;59:e10-52.\n4. Sartelli M, Malangoni MA, May AK, et al. World Society of Emergency Surgery (WSES) guidelines for management of skin and soft tissue infections. World J Emerg Surg 2014;9:57.\n본 지침은 인천나은병원 항생제관리팀에서 승인하였으며,\n정기적으로 검토 및 업데이트됩니다.\n문의: 항생제관리팀", "paragraphs": [{"heading": "1. 개요 및 일반 원칙", "content": "본 지침은 성인에서 발생하는 지역사회 획득 피부·연조직 감염 및 당뇨발 감염의 적절한 진단과 치료를 위해 작성되었습니다. 감염의 심도와 임상 양상(화농성 vs 비화농성)에 따른 분류를 통해 적절한 진단 및 경험적 항생제 선택을 돕는 것을 목적으로 합니다."}, {"heading": "2.1 농가진(Impetigo) 및 농창(Ecthyma)", "content": "주요 원인균: Staphylococcus aureus, Streptococcus pyogenes.\n진단: 병변의 농이나 삼출물로 그람 염색과 배양검사를 추천하나, 전형적인 경우는 검사 없이 치료할 수 있습니다.\n치료:\n국소 요법: 병변이 국소적일 경우 Mupirocin이나 Fusidic acid 연고를 5일간 도포합니다.\n전신 요법: 병변이 많거나 전염 우려가 있을 경우 경구 항생제를 7일간 사용합니다.\n1차 선택약: Amoxicillin-Clavulanate, 1세대 Cephalosporin (Cephalexin 등), Clindamycin.\nMethicillin-Resistant S. aureus (MRSA) 의심 시: Doxycycline, Clindamycin, Trimethoprim-Sulfamethoxazole (TMP-SMX)."}, {"heading": "2.2 화농성 피부·연조직 감염 (Purulent SSTI)", "content": "정의: 피부농양(Cutaneous abscess), 종기(Furuncle), 큰 종기(Carbuncle)를 포함합니다.\n치료 원칙: 절개와 배농(Incision and Drainage, I&D)이 주된 치료입니다. 단순 농양은 배농만으로 치료될 수 있습니다.\n항생제 투여 적응증: 주위 연조직염(Cellulitis) 동반, 전신 증상(발열 등), 면역저하자, 배농이 어려운 부위(얼굴, 손 등)인 경우 항생제를 병용합니다.\n권장 항생제:\n경험적 치료: 1세대 Cephalosporin (Cefazolin, Cephalexin), Amoxicillin-Clavulanate.\nMRSA 위험군/치료 실패 시: Doxycycline, TMP-SMX, Clindamycin."}, {"heading": "2.3 단독(Erysipelas) 및 연조직염(Cellulitis)", "content": "특징: 비화농성 감염으로, 단독은 경계가 명확하고 진피 상층을 침범하며, 연조직염은 경계가 모호하고 피하조직까지 침범합니다.\n주요 원인균: Beta-hemolytic Streptococci (S. pyogenes 등)가 가장 흔하며, S. aureus도 원인이 됩니다.\n치료:\n단독: Penicillin, Amoxicillin이 1차 선택약입니다.\n연조직염: 1세대 Cephalosporin (Cefazolin, Cephalexin), Nafcillin, Clindamycin.\n보조 요법: 병변 부위를 심장보다 높게 거상(Elevation)하여 부종을 줄이는 것이 중요합니다. 치료 기간은 보통 5일이며 반응에 따라 연장합니다.\n재발성 연조직염: 부종, 백선(Tinea pedis) 등 유발 요인을 교정해야 하며, 잦은 재발 시 예방적 항생제(Benzathine Penicillin 등)를 고려할 수 있습니다."}, {"heading": "2.4 괴사성 근막염 (Necrotizing Fasciitis)", "content": "임상적 특징: 진찰 소견에 비해 극심한 통증, 긴장성 부종(Tense edema), 수포(Bulla), 반상출혈, 마찰음(Crepitus), 전신 독성 소견을 보입니다.\n치료 원칙: 즉각적인 광범위한 괴사 조직 제거술(Debridement)과 광범위 항생제 투여가 필수적입니다.\n경험적 항생제: 그람양성균, 그람음성균, 혐기균을 모두 커버해야 합니다.\n기본 요법: Vancomycin (MRSA 커버) PLUS [Piperacillin-Tazobactam 또는 Carbapenem (Meropenem, Imipenem-Cilastatin) 또는 (Cefepime + Metronidazole)].\n독소 억제: Group A Streptococcus 감염 의심 시 단백 합성 억제를 통해 독소 생성을 줄이기 위해 Clindamycin을 병용합니다.\nVibrio vulnificus 의심 시 (간질환/해산물): 3세대 Cephalosporin (Ceftazidime, Cefotaxime, Ceftriaxone) PLUS [Doxycycline 또는 Tetracycline]."}, {"heading": "2.5 동물 및 사람 교상 (Bite Wounds)", "content": "주요 원인균: Pasteurella multocida(동물), Eikenella corrodens(사람), S. aureus, 혐기균 등 복합 감염.\n치료: 상처 세척이 중요하며, 손/얼굴 교상이나 깊은 상처는 예방적 항생제를 3~5일간 투여합니다.\n1차 권장 항생제: Amoxicillin-Clavulanate (호기균 및 혐기균 동시 커버).\n대체 약제(Penicillin 알레르기): (Fluoroquinolone 또는 TMP-SMX) PLUS (Metronidazole 또는 Clindamycin)."}, {"heading": "3.1 진단 및 평가 (IWGDF/IDSA 2023)", "content": "진단: 국소적 또는 전신적 염증 징후(발적, 온열감, 압통, 부종, 농 등)가 있어야 감염으로 진단합니다. 임상적으로 감염 징후가 없는 궤양에는 항생제를 투여하지 않습니다.\n중증도 분류:\nMild: 국소 감염만 있고 홍반이 2cm 미만이며 심부 조직 침범 없음.\nModerate: 홍반이 2cm 이상이거나 심부 조직(근막, 근육 등) 침범했으나 전신 독성 없음.\nSevere: 전신 염증 반응 증후군(SIRS) 징후 동반.\n미생물 검사: 면봉(Swab) 배양보다는 세척 및 괴사 조직 제거 후 조직 생검(Tissue biopsy)이나 소파(Curettage)를 통해 얻은 검체 배양을 강력히 권장합니다."}, {"heading": "3.2 권장 항생제 요법", "content": "경험적 항생제는 감염의 중증도와 최근 항생제 사용력을 고려하여 선택합니다.\nMild DFI:\n주로 호기성 그람양성알균(S. aureus, Streptococci)을 타겟으로 합니다.\n권장 약제: Cephalexin, Amoxicillin-Clavulanate, Clindamycin, Levofloxacin.\n최근 항생제를 사용하지 않은 온대 기후 거주 환자의 Mild 감염에서는 Pseudomonas aeruginosa를 경험적으로 커버할 필요가 없습니다.\nModerate/Severe DFI:\n다제내성균, 그람음성막대균, 혐기균을 포함한 광범위 커버리지가 필요할 수 있습니다.\n권장 약제: Ampicillin-Sulbactam, Cefoxitin, Ceftriaxone + Metronidazole, Piperacillin-Tazobactam, Carbapenem (Ertapenem 등).\nMRSA 위험 인자가 있는 경우 Vancomycin, Linezolid, Daptomycin 등을 추가합니다.\nP. aeruginosa는 물에 젖은 궤양(Macerated ulcer)이나 최근 배양력이 있는 경우, 또는 온난 습윤한 기후(Tropical climate)에서 고려합니다."}, {"heading": "3.3 골수염 (Osteomyelitis)", "content": "진단: 궤양 바닥에서 뼈가 만져지거나(Probe-to-bone test 양성), 단순 방사선 사진, MRI 소견을 종합하여 진단합니다.\n치료 기간:\n감염된 뼈를 수술로 완전히 제거한 경우: 1-2주 (연조직 감염 치료 기간에 준함).\n수술하지 않고 항생제만으로 치료하거나 감염된 뼈가 남아있는 경우: 약 6주간 치료."}, {"heading": "4. 요약표", "content": "약어: I&D (Incision and Drainage), FQ (Fluoroquinolone), TMP-SMX (Trimethoprim-Sulfamethoxazole)\nReferences"}, {"heading": "1. 곽이경, 최성호, 김탁 등. 피부·연조직 감염 항생제 사용지침. Infect Chemother 2017;49(4):301-325.", "content": "2. Senneville E, Albalawi Z, van Asten SA, et al. IWGDF/IDSA Guidelines on the Diagnosis and Treatment of Diabetes-related Foot Infections (IWGDF/IDSA 2023). Clin Infect Dis 2023.\n3. Stevens DL, Bisno AL, Chambers HF, et al. Practice guidelines for the diagnosis and management of skin and soft tissue infections: 2014 update by the Infectious Diseases Society of America. Clin Infect Dis 2014;59:e10-52.\n4. Sartelli M, Malangoni MA, May AK, et al. World Society of Emergency Surgery (WSES) guidelines for management of skin and soft tissue infections. World J Emerg Surg 2014;9:57.\n본 지침은 인천나은병원 항생제관리팀에서 승인하였으며,\n정기적으로 검토 및 업데이트됩니다.\n문의: 항생제관리팀"}]}, {"id": "05_Tigecycline사용지침", "title": "Tigecycline 사용 지침", "icon": "💉", "tags": ["Tigecycline", "VRE", "MRSA", "ESBL", "CRAB", "고용량", "Glycylcycline", "균혈증금기"], "fullText": "Tigecycline 항생제 사용 지침\n인천나은병원 항생제관리팀\n26.2.20\n1. 개요 및 약제 특징\nTigecycline은 Minocycline의 구조를 변형하여 개발된 Glycylcycline 계열의 항생제입니다. 세균의 30S 리보솜에 결합하여 단백질 합성을 억제하는 정균제(Bacteriostatic agent)입니다.\n1.1 항균 범위 (Spectrum of Activity)\n광범위 항생제로서 다음과 같은 균주들에 항균력을 보입니다.\n그람양성균: Methicillin-Resistant Staphylococcus aureus (MRSA), Vancomycin-Resistant Enterococcus (VRE), Streptococcus spp.\n그람음성균: Extended-Spectrum Beta-Lactamase (ESBL) 생성 균주, Carbapenem-Resistant Enterobacterales (CRE), Acinetobacter baumannii (Carbapenem 내성 포함), Stenotrophomonas maltophilia.\n혐기성균: Bacteroides fragilis 그룹, Clostridium spp. (C. difficile 포함).\n비정형균: Mycoplasma, Chlamydia, Legionella spp.\n1.2 내성 및 제한점 (Limitations)\n자연 내성(Intrinsic Resistance): Pseudomonas aeruginosa, Proteus spp., Morganella spp., Providencia spp.에는 항균력이 떨어지므로 사용해서는 안 됩니다.\n약동학적 특성: 조직 투과율은 매우 높으나 혈중 농도와 요중 농도가 낮습니다. 따라서 균혈증(Bacteremia)이나 요로감염(UTI)의 일차 치료제로는 권장되지 않습니다.\n2. 임상 적응증 (Indications)\n2.1 승인 적응증 (FDA 및 국내 허가 사항)\n복잡성 피부 및 연조직 감염 (Complicated Skin and Soft Tissue Infections, cSSTI)\n복잡성 복강 내 감염 (Complicated Intra-abdominal Infections, cIAI)\n지역사회 획득 폐렴 (Community-Acquired Pneumonia, CAP)\n2.2 다제내성균에 대한 사용 (IDSA 2024 등 가이드라인 기반)\n다른 항생제 사용이 불가능하거나 치료에 실패한 경우, 다음 다제내성균 감염의 대체 요법으로 고려할 수 있습니다. (단, 균혈증 및 요로감염 제외)\nCarbapenem-Resistant Enterobacterales (CRE): 신약(Ceftazidime-Avibactam 등)을 사용할 수 없는 경우 대체 약제로 고려합니다.\nCarbapenem-Resistant Acinetobacter baumannii (CRAB): 단독 요법보다는 고용량 Ampicillin-Sulbactam 등과 병합 요법의 일환으로 사용을 권장합니다. (고용량 사용 고려).\nVancomycin-Resistant Enterococcus (VRE): VRE에 의한 복강 내 감염이나 피부 연조직 감염 시 사용 가능합니다.\nStenotrophomonas maltophilia: TMP-SMX나 Levofloxacin 등을 사용할 수 없는 경우 병합 요법으로 고려합니다.\n3. 용법 및 용량 (Dosage and Administration)\n신기능 저하 환자에서도 용량 조절이 필요하지 않으나, 중증 간부전 환자에서는 감량이 필요합니다.\n3.1 표준 용량 (Standard Dosing)\n부하 용량(Loading Dose): 100 mg 정맥 주사 (1회).\n유지 용량(Maintenance Dose): 50 mg 정맥 주사, 12시간 간격 (q12h).\n3.2 고용량 요법 (High-Dose Strategy)\n적응증: IDSA 가이드라인 등에서는 다제내성균(특히 CRAB, CRE, 또는 병원 획득 폐렴) 치료 시 표준 용량으로는 폐 조직 및 혈중 농도가 불충분할 수 있어 고용량 사용을 제안하기도 합니다.\n용량: 200 mg 부하 용량 후, 100 mg q12h.\n주의: 고용량 사용 시 오심, 구토 등의 위장관계 부작용 빈도가 증가할 수 있습니다.\n3.3 간기능 저하 시 용량 조절\nChild-Pugh Class A, B (경증~중등도): 용량 조절 불필요.\nChild-Pugh Class C (중증): 부하 용량 100 mg 투여 후, 유지 용량을 25 mg q12h로 감량합니다.\n4. 부작용 및 주의사항\n사망률 증가 경고 (Black Box Warning): 타 항생제 비교 임상시험들의 메타분석 결과, Tigecycline 투여군에서 사망 위험이 약간 증가하는 경향이 관찰되었습니다(원내 폐렴 등). 따라서 다른 적절한 치료 대안이 있는 경우 일차적으로 사용하지 않습니다.\n위장관계 부작용: 오심(20~30%)과 구토(15~20%)가 매우 흔하게 발생합니다. 식사 후 투여하거나 항구토제를 병용하면 증상을 완화할 수 있습니다.\n췌장염(Pancreatitis): 드물지만 급성 췌장염이 보고되었으므로 복통 등의 증상 발생 시 의심해야 합니다.\n금기: Tetracycline 계열 약물이므로 임신부(태아 독성, Category D)와 8세 미만 소아(치아 변색, 골성장 저해)에게는 사용을 피해야 합니다.\n5. 요약표\n약어: LD (Loading Dose), MDR (Multidrug-Resistant)\nReferences\n1. Tamma PD, Heil EL, Justo JA, et al. Infectious Diseases Society of America 2024 Guidance on the Treatment of Antimicrobial-Resistant Gram-Negative Infections. Clin Infect Dis. 2024.\n2. 윤영경, 문치숙, 김지은 등. 성인 복강 내 감염 항생제 사용지침. Infect Chemother 2022;54(4):812-853.\n3. 곽이경, 최성호, 김탁 등. 피부·연조직 감염 항생제 사용지침. Infect Chemother 2017;49(4):301-325.\n4. Solomkin JS, Mazuski JE, Bradley JS, et al. Diagnosis and
