management of complicated intra-abdominal infection in adults and children: guidelines by the Surgical Infection Society and the Infectious Diseases Society of America. Clin Infect Dis 2010;50:133-64.\n5. Yahav D, Lador A, Paul M, Leibovici L. Efficacy and safety of tigecycline: a systematic review and meta-analysis. J Antimicrob Chemother 2011;66(9):1963-71.\n본 지침은 인천나은병원 항생제관리팀에서 승인하였으며,\n정기적으로 검토 및 업데이트됩니다.\n문의: 항생제관리팀", "paragraphs": [{"heading": "1. 개요 및 약제 특징", "content": "Tigecycline은 Minocycline의 구조를 변형하여 개발된 Glycylcycline 계열의 항생제입니다. 세균의 30S 리보솜에 결합하여 단백질 합성을 억제하는 정균제(Bacteriostatic agent)입니다."}, {"heading": "1.1 항균 범위 (Spectrum of Activity)", "content": "광범위 항생제로서 다음과 같은 균주들에 항균력을 보입니다.\n그람양성균: Methicillin-Resistant Staphylococcus aureus (MRSA), Vancomycin-Resistant Enterococcus (VRE), Streptococcus spp.\n그람음성균: Extended-Spectrum Beta-Lactamase (ESBL) 생성 균주, Carbapenem-Resistant Enterobacterales (CRE), Acinetobacter baumannii (Carbapenem 내성 포함), Stenotrophomonas maltophilia.\n혐기성균: Bacteroides fragilis 그룹, Clostridium spp. (C. difficile 포함).\n비정형균: Mycoplasma, Chlamydia, Legionella spp."}, {"heading": "1.2 내성 및 제한점 (Limitations)", "content": "자연 내성(Intrinsic Resistance): Pseudomonas aeruginosa, Proteus spp., Morganella spp., Providencia spp.에는 항균력이 떨어지므로 사용해서는 안 됩니다.\n약동학적 특성: 조직 투과율은 매우 높으나 혈중 농도와 요중 농도가 낮습니다. 따라서 균혈증(Bacteremia)이나 요로감염(UTI)의 일차 치료제로는 권장되지 않습니다."}, {"heading": "2.1 승인 적응증 (FDA 및 국내 허가 사항)", "content": "복잡성 피부 및 연조직 감염 (Complicated Skin and Soft Tissue Infections, cSSTI)\n복잡성 복강 내 감염 (Complicated Intra-abdominal Infections, cIAI)\n지역사회 획득 폐렴 (Community-Acquired Pneumonia, CAP)"}, {"heading": "2.2 다제내성균에 대한 사용 (IDSA 2024 등 가이드라인 기반)", "content": "다른 항생제 사용이 불가능하거나 치료에 실패한 경우, 다음 다제내성균 감염의 대체 요법으로 고려할 수 있습니다. (단, 균혈증 및 요로감염 제외)\nCarbapenem-Resistant Enterobacterales (CRE): 신약(Ceftazidime-Avibactam 등)을 사용할 수 없는 경우 대체 약제로 고려합니다.\nCarbapenem-Resistant Acinetobacter baumannii (CRAB): 단독 요법보다는 고용량 Ampicillin-Sulbactam 등과 병합 요법의 일환으로 사용을 권장합니다. (고용량 사용 고려).\nVancomycin-Resistant Enterococcus (VRE): VRE에 의한 복강 내 감염이나 피부 연조직 감염 시 사용 가능합니다.\nStenotrophomonas maltophilia: TMP-SMX나 Levofloxacin 등을 사용할 수 없는 경우 병합 요법으로 고려합니다."}, {"heading": "3. 용법 및 용량 (Dosage and Administration)", "content": "신기능 저하 환자에서도 용량 조절이 필요하지 않으나, 중증 간부전 환자에서는 감량이 필요합니다."}, {"heading": "3.1 표준 용량 (Standard Dosing)", "content": "부하 용량(Loading Dose): 100 mg 정맥 주사 (1회).\n유지 용량(Maintenance Dose): 50 mg 정맥 주사, 12시간 간격 (q12h)."}, {"heading": "3.2 고용량 요법 (High-Dose Strategy)", "content": "적응증: IDSA 가이드라인 등에서는 다제내성균(특히 CRAB, CRE, 또는 병원 획득 폐렴) 치료 시 표준 용량으로는 폐 조직 및 혈중 농도가 불충분할 수 있어 고용량 사용을 제안하기도 합니다.\n용량: 200 mg 부하 용량 후, 100 mg q12h.\n주의: 고용량 사용 시 오심, 구토 등의 위장관계 부작용 빈도가 증가할 수 있습니다."}, {"heading": "3.3 간기능 저하 시 용량 조절", "content": "Child-Pugh Class A, B (경증~중등도): 용량 조절 불필요.\nChild-Pugh Class C (중증): 부하 용량 100 mg 투여 후, 유지 용량을 25 mg q12h로 감량합니다."}, {"heading": "4. 부작용 및 주의사항", "content": "사망률 증가 경고 (Black Box Warning): 타 항생제 비교 임상시험들의 메타분석 결과, Tigecycline 투여군에서 사망 위험이 약간 증가하는 경향이 관찰되었습니다(원내 폐렴 등). 따라서 다른 적절한 치료 대안이 있는 경우 일차적으로 사용하지 않습니다.\n위장관계 부작용: 오심(20~30%)과 구토(15~20%)가 매우 흔하게 발생합니다. 식사 후 투여하거나 항구토제를 병용하면 증상을 완화할 수 있습니다.\n췌장염(Pancreatitis): 드물지만 급성 췌장염이 보고되었으므로 복통 등의 증상 발생 시 의심해야 합니다.\n금기: Tetracycline 계열 약물이므로 임신부(태아 독성, Category D)와 8세 미만 소아(치아 변색, 골성장 저해)에게는 사용을 피해야 합니다."}, {"heading": "5. 요약표", "content": "약어: LD (Loading Dose), MDR (Multidrug-Resistant)\nReferences\n1. Tamma PD, Heil EL, Justo JA, et al. Infectious Diseases Society of America 2024 Guidance on the Treatment of Antimicrobial-Resistant Gram-Negative Infections. Clin Infect Dis. 2024."}, {"heading": "3. 곽이경, 최성호, 김탁 등. 피부·연조직 감염 항생제 사용지침. Infect Chemother 2017;49(4):301-325.", "content": "4. Solomkin JS, Mazuski JE, Bradley JS, et al. Diagnosis and management of complicated intra-abdominal infection in adults and children: guidelines by the Surgical Infection Society and the Infectious Diseases Society of America. Clin Infect Dis 2010;50:133-64.\n5. Yahav D, Lador A, Paul M, Leibovici L. Efficacy and safety of tigecycline: a systematic review and meta-analysis. J Antimicrob Chemother 2011;66(9):1963-71.\n본 지침은 인천나은병원 항생제관리팀에서 승인하였으며,\n정기적으로 검토 및 업데이트됩니다.\n문의: 항생제관리팀"}]}, {"id": "06_Glycopeptide및Linezolid사용지침", "title": "Glycopeptide 및 Linezolid / TDM", "icon": "📊", "tags": ["Vancomycin", "Teicoplanin", "Linezolid", "TDM", "AUC", "Trough", "MRSA", "VRE", "신독성", "혈소판감소"], "fullText": "Glycopeptide 및 Linezolid\n항생제 사용 및 TDM 지침\n인천나은병원 항생제관리팀\n26.2.20\n1. 개요\n본 지침은 다제내성 그람양성균(Multidrug-Resistant Gram-Positive Bacteria) 감염 치료에 주로 사용되는 Glycopeptide (Vancomycin, Teicoplanin) 계열과 Oxazolidinone (Linezolid) 계열 항생제의 적절한 선택, 투여 용량, 그리고 모니터링 기준(Therapeutic Drug Monitoring, TDM)을 제시합니다.\n2. Glycopeptide: Vancomycin & Teicoplanin\n2.1 약제 특징 및 항균 범위\n기전: 세포벽 생합성을 억제하여 작용하며, 그람양성균에만 효과가 있습니다.\n주요 타겟:\nMethicillin-Resistant Staphylococcus aureus (MRSA).\nMethicillin-Resistant Coagulase-negative Staphylococci (MRCNS).\nStreptococcus spp. (Penicillin 내성 S. pneumoniae 포함).\nEnterococcus spp. (Ampicillin 내성 장알균). 단, VRE에는 효과 없음.\nClostridioides difficile (Vancomycin 경구 투여 시).\n2.2 Vancomycin 투여 및 TDM\n중증 MRSA 감염 치료 시 치료 효과 극대화와 신독성(Nephrotoxicity) 최소화를 위해 약물 농도 모니터링이 필수적입니다.\nA. 치료 목표 (PK/PD Target)\n권장 목표: AUC/MIC ratio 400 ~ 600 (MRSA의 Vancomycin MIC가 1 mg/L라고 가정 시).\n배경: 2020년 개정된 가이드라인에 따르면, Trough 농도(15-20 mg/L) 단독 지표는 신독성 위험을 높일 수 있어, AUC(Area Under the Curve) 기반의 모니터링이 우선 권장됩니다. AUC 측정이 불가능한 환경에서만 Trough 농도를 대용 지표로 사용합니다.\nB. 투여 용법 및 용량 (신장 기능 정상 성인 기준)\n모든 용량은 실제 체중(Actual Body Weight)을 기준으로 계산합니다.\n부하 용량(Loading Dose): 패혈증, 수막염 등 중환자에서 신속한 치료 농도 도달을 위해 20~35 mg/kg (최대 3,000 mg) 투여를 고려합니다.\n유지 용량(Maintenance Dose): 15~20 mg/kg를 8~12시간 간격으로 투여합니다.\n주입 속도: Red Man Syndrome (히스타민 분비에 의한 홍조, 가려움, 저혈압) 예방을 위해 1,000 mg당 최소 1시간 이상(또는 500 mg/30min 속도) 천천히 주입해야 합니다.\nC. TDM 시행 방법\n대상: 중증 MRSA 감염(균혈증, 심내막염, 폐렴, 골수염, 수막염), 신기능 저하, 비만, 3~5일 이상 장기 투여 환자.\n채혈 시점: 항상 상태(Steady state) 도달 전이라도 24~48시간 이내에 조기 시행을 권장합니다.\nBayesian 방식(권장): 1~2회 채혈(Trough 포함)로 AUC 추정.\n선형 회귀 방식: 2회 채혈(Peak: 주입 종료 1~2시간 후, Trough: 다음 투여 직전)로 계산.\n2.3 Teicoplanin 투여 용법\n특징: Vancomycin과 동등한 항균력을 가지면서 신독성 및 Red Man Syndrome 등의 부작용 빈도가 낮습니다. 근육 주사(IM)가 가능합니다.\n주의: 중증 S. aureus 감염증(균혈증, 심내막염 등)에서는 충분한 부하 용량을 사용하지 않으면 치료 실패 위험이 있어 주의가 필요합니다.\n부하 용량(Loading Dose): 치료 첫 48시간 동안 12 mg/kg (또는 800 mg)를 12시간 간격으로 3~4회 투여하여 신속하게 치료 농도에 도달해야 합니다.\n유지 용량(Maintenance Dose): 이후 12 mg/kg (또는 800 mg)를 24시간 간격으로 투여합니다. (일반적인 연조직 감염 등 경증에서는 6 mg/kg 사용 가능).\nTDM: 일반적으로 필수적이지 않으나, 치료 반응이 없거나 골수염/심내막염 등 심부 감염에서는 Trough 농도 >20 mg/L 유지를 목표로 할 수 있습니다.\n3. Linezolid\n3.1 약제 특징 및 적응증\n기전: Oxazolidinone 계열로 단백질 합성을 억제합니다. 경구 생체 이용률이 100%여서 정주(IV)와 경구(PO) 용량이 동일합니다. 조직(폐, 피부, 뇌척수액) 투과력이 우수합니다.\n주요 적응증:\nVancomycin-Resistant Enterococcus (VRE) 감염 (균혈증, 수막염 등).\nMRSA 감염: Vancomycin/Teicoplanin 치료에 실패했거나 부작용으로 사용할 수 없는 경우.\nMRSA 폐렴 (폐 조직 농도가 높음).\n다제내성 결핵.\n3.2 용법 및 용량\n성인: 600 mg IV 또는 PO, 1일 2회 (q12h).\n신부전/간부전: 용량 조절이 필요하지 않습니다. (혈액투석 환자는 투석 후 투여).\n3.3 부작용 및 모니터링\n골수 억제(Myelosuppression): 가장 중요한 부작용으로, 특히 2주 이상 투여 시 혈소판 감소증(Thrombocytopenia) 위험이 증가합니다. 빈혈, 백혈구 감소증도 발생할 수 있습니다.\n모니터링: 주 1회 이상 전체혈구검사(CBC)를 반드시 시행해야 합니다.\n신경 독성: 장기 투여(보통 28일 이상) 시 비가역적인 말초 신경병증(Peripheral neuropathy) 및 시신경병증(Optic neuropathy)이 발생할 수 있습니다. 시력 저하 호소 시 즉시 안과 검진 및 약제 중단이 필요합니다.\nSerotonin Syndrome: 항우울제(SSRI)와 병용 시 주의해야 합니다.\n4. 요약표\nReferences\n1. Rybak MJ, Le J, Lodise TP, et al. Therapeutic monitoring of vancomycin for serious methicillin-resistant Staphylococcus aureus infections: A revised consensus guideline and review by the American Society of Health-System Pharmacists, the Infectious Diseases Society of America, the Pediatric Infectious Diseases Society, and the Society of Infectious Diseases Pharmacists. Am J Health-Syst Pharm. 2020;77(11):835-864.\n2. 이동건, 김성한, 김수영 등. 국내자료를 근거로 한 호중구감소성 발열 환자의 경험적 치료 지침. Infect Chemother 2011;43(4):285-321.\n3. 곽이경, 최성호, 김탁 등. 피부·연조직 감염 항생제 사용지침. Infect Chemother 2017;49(4):301-325.\n4. 대한감염학회, 대한화학요법학회, 대한신경과학회, 대한신경외과학회, 대한임상미생물학회. 국내 성인 세균성 수막염의 임상진료지침 권고안. Infect Chemother 2012;44(3):140-163.\n5. 대한감염학회, 대한화학요법학회, 대한정형외과학회. 국내 골관절감염 항균요법 권고안. Infect Chemother 2014;46(3):153-180.\n본 지침은 인천나은병원 항생제관리팀에서 승인하였으며,\n정기적으로 검토 및 업데이트됩니다.\n문의: 항생제관리팀", "paragraphs": [{"heading": "1. 개요", "content": "본 지침은 다제내성 그람양성균(Multidrug-Resistant Gram-Positive Bacteria) 감염 치료에 주로 사용되는 Glycopeptide (Vancomycin, Teicoplanin) 계열과 Oxazolidinone (Linezolid) 계열 항생제의 적절한 선택, 투여 용량, 그리고 모니터링 기준(Therapeutic Drug Monitoring, TDM)을 제시합니다."}, {"heading": "2.1 약제 특징 및 항균 범위", "content": "기전: 세포벽 생합성을 억제하여 작용하며, 그람양성균에만 효과가 있습니다.\n주요 타겟:\nMethicillin-Resistant Staphylococcus aureus (MRSA).\nMethicillin-Resistant Coagulase-negative Staphylococci (MRCNS).\nStreptococcus spp. (Penicillin 내성 S. pneumoniae 포함).\nEnterococcus spp. (Ampicillin 내성 장알균). 단, VRE에는 효과 없음.\nClostridioides difficile (Vancomycin 경구 투여 시)."}, {"heading": "2.2 Vancomycin 투여 및 TDM", "content": "중증 MRSA 감염 치료 시 치료 효과 극대화와 신독성(Nephrotoxicity) 최소화를 위해 약물 농도 모니터링이 필수적입니다.\nA. 치료 목표 (PK/PD Target)\n권장 목표: AUC/MIC ratio 400 ~ 600 (MRSA의 Vancomycin MIC가 1 mg/L라고 가정 시).\n배경: 2020년 개정된 가이드라인에 따르면, Trough 농도(15-20 mg/L) 단독 지표는 신독성 위험을 높일 수 있어, AUC(Area Under the Curve) 기반의 모니터링이 우선 권장됩니다. AUC 측정이 불가능한 환경에서만 Trough 농도를 대용 지표로 사용합니다.\nB. 투여 용법 및 용량 (신장 기능 정상 성인 기준)\n모든 용량은 실제 체중(Actual Body Weight)을 기준으로 계산합니다.\n부하 용량(Loading Dose): 패혈증, 수막염 등 중환자에서 신속한 치료 농도 도달을 위해 20~35 mg/kg (최대 3,000 mg) 투여를 고려합니다.\n유지 용량(Maintenance Dose): 15~20 mg/kg를 8~12시간 간격으로 투여합니다.\n주입 속도: Red Man Syndrome (히스타민 분비에 의한 홍조, 가려움, 저혈압) 예방을 위해 1,000 mg당 최소 1시간 이상(또는 500 mg/30min 속도) 천천히 주입해야 합니다.\nC. TDM 시행 방법\n대상: 중증 MRSA 감염(균혈증, 심내막염, 폐렴, 골수염, 수막염), 신기능 저하, 비만, 3~5일 이상 장기 투여 환자.\n채혈 시점: 항상 상태(Steady state) 도달 전이라도 24~48시간 이내에 조기 시행을 권장합니다.\nBayesian 방식(권장): 1~2회 채혈(Trough 포함)로 AUC 추정.\n선형 회귀 방식: 2회 채혈(Peak: 주입 종료 1~2시간 후, Trough: 다음 투여 직전)로 계산."}, {"heading": "2.3 Teicoplanin 투여 용법", "content": "특징: Vancomycin과 동등한 항균력을 가지면서 신독성 및 Red Man Syndrome 등의 부작용 빈도가 낮습니다. 근육 주사(IM)가 가능합니다.\n주의: 중증 S. aureus 감염증(균혈증, 심내막염 등)에서는 충분한 부하 용량을 사용하지 않으면 치료 실패 위험이 있어 주의가 필요합니다.\n부하 용량(Loading Dose): 치료 첫 48시간 동안 12 mg/kg (또는 800 mg)를 12시간 간격으로 3~4회 투여하여 신속하게 치료 농도에 도달해야 합니다.\n유지 용량(Maintenance Dose): 이후 12 mg/kg (또는 800 mg)를 24시간 간격으로 투여합니다. (일반적인 연조직 감염 등 경증에서는 6 mg/kg 사용 가능).\nTDM: 일반적으로 필수적이지 않으나, 치료 반응이 없거나 골수염/심내막염 등 심부 감염에서는 Trough 농도 >20 mg/L 유지를 목표로 할 수 있습니다."}, {"heading": "3.1 약제 특징 및 적응증", "content": "기전: Oxazolidinone 계열로 단백질 합성을 억제합니다. 경구 생체 이용률이 100%여서 정주(IV)와 경구(PO) 용량이 동일합니다. 조직(폐, 피부, 뇌척수액) 투과력이 우수합니다.\n주요 적응증:\nVancomycin-Resistant Enterococcus (VRE) 감염 (균혈증, 수막염 등).\nMRSA 감염: Vancomycin/Teicoplanin 치료에 실패했거나 부작용으로 사용할 수 없는 경우.\nMRSA 폐렴 (폐 조직 농도가 높음).\n다제내성 결핵."}, {"heading": "3.2 용법 및 용량", "content": "성인: 600 mg IV 또는 PO, 1일 2회 (q12h).\n신부전/간부전: 용량 조절이 필요하지 않습니다. (혈액투석 환자는 투석 후 투여)."}, {"heading": "3.3 부작용 및 모니터링", "content": "골수 억제(Myelosuppression): 가장 중요한 부작용으로, 특히 2주 이상 투여 시 혈소판 감소증(Thrombocytopenia) 위험이 증가합니다. 빈혈, 백혈구 감소증도 발생할 수 있습니다.\n모니터링: 주 1회 이상 전체혈구검사(CBC)를 반드시 시행해야 합니다.\n신경 독성: 장기 투여(보통 28일 이상) 시 비가역적인 말초 신경병증(Peripheral neuropathy) 및 시신경병증(Optic neuropathy)이 발생할 수 있습니다. 시력 저하 호소 시 즉시 안과 검진 및 약제 중단이 필요합니다.\nSerotonin Syndrome: 항우울제(SSRI)와 병용 시 주의해야 합니다."}, {"heading": "4. 요약표", "content": "References\n1. Rybak MJ, Le J, Lodise TP, et al. Therapeutic monitoring of vancomycin for serious methicillin-resistant Staphylococcus aureus infections: A revised consensus guideline and review by the American Society of Health-System Pharmacists, the Infectious Diseases Society of America, the Pediatric Infectious Diseases Society, and the Society of Infectious Diseases Pharmacists. Am J Health-Syst Pharm. 2020;77(11):835-864.\n2. 이동건, 김성한, 김수영 등. 국내자료를 근거로 한 호중구감소성 발열 환자의 경험적 치료 지침. Infect Chemother 2011;43(4):285-321."}, {"heading": "3. 곽이경, 최성호, 김탁 등. 피부·연조직 감염 항생제 사용지침. Infect Chemother 2017;49(4):301-325.", "content": "4. 대한감염학회, 대한화학요법학회, 대한신경과학회, 대한신경외과학회, 대한임상미생물학회. 국내 성인 세균성 수막염의 임상진료지침 권고안. Infect Chemother 2012;44(3):140-163.\n5. 대한감염학회, 대한화학요법학회, 대한정형외과학회. 국내 골관절감염 항균요법 권고안. Infect Chemother 2014;46(3):153-180.\n본 지침은 인천나은병원 항생제관리팀에서 승인하였으며,\n정기적으로 검토 및 업데이트됩니다.\n문의: 항생제관리팀"}]}, {"id": "07_심혈관계감염지침", "title": "심혈관계 감염 (심내막염·CLABSI)", "icon": "❤️", "tags": ["심내막염", "Endocarditis", "IE", "CLABSI", "Nafcillin", "Vancomycin", "Gentamicin", "Duke", "Enterococcus", "Streptococcus"], "fullText": "심혈관계 감염 항생제 치료 지침\n인천나은병원 항생제관리팀\n26.2.20\n1. 개요 및 일반 원칙\n심혈관계 감염, 특히 감염성 심내막염(Infective Endocarditis, IE)은 진단과 치료가 늦어질 경우 치명적인 합병증을 유발할 수 있습니다.\n1.1 진단 (Modified Duke Criteria)\n확진(Definite IE): 병리학적 기준을 만족하거나, 임상적으로 주 기준 2개, 또는 주 기준 1개 + 소 기준 3개, 또는 소 기준 5개를 만족하는 경우.\n주 기준(Major Criteria):\n1. 혈액 배양 양성: 전형적인 원인균(Staphylococcus aureus, Viridans streptococci, Enterococcus spp., HACEK군 등)이 2회 이상 분리.\n2. 심내막 침범의 증거: 심초음파(Echocardiography)상 증식(Vegetation), 농양(Abscess), 인공판막의 새로운 결손 또는 새로운 판막 폐쇄부전.\n혈액 배양: 항생제 투여 전 최소 3쌍의 혈액 배양을 1시간 간격으로(위급 시 2시간 내 모두) 채취해야 합니다.\n1.2 심초음파 검사\nIE가 의심되는 모든 환자에서 경흉부 심초음파(Transthoracic Echocardiography, TTE)를 권장하며, TTE가 음성이더라도 임상적 의심이 강하거나 인공판막(Prosthetic Valve) 환자인 경우 경식도 심초음파(Transesophageal Echocardiography, TEE)를 시행해야 합니다.\n2. 자연판막 심내막염 (Native Valve Endocarditis, NVE)\n2.1 경험적 항생제 치료 (Empirical Therapy)\n배양 결과 확인 전까지는 Staphylococcus, Streptococcus, Enterococcus 및 그람음성균을 포괄하는 치료가 필요합니다.\n기본 요법: Ampicillin-Sulbactam (또는 Amoxicillin-Clavulanate) + Gentamicin.\n대체 요법: Nafcillin + Ampicillin (또는 Penicillin G) + Gentamicin.\nBeta-lactam 알레르기 시: Vancomycin + Gentamicin + Ciprofloxacin.\n2.2 원인균별 확정적 치료 (Definitive Therapy)\nA. 사슬알균 (Streptococci)\nPenicillin 최소억제농도(Minimum Inhibitory Concentration, MIC)에 따라 결정\nPenicillin 감수성 (MIC ≤ 0.12 μg/mL):\nPenicillin G 또는 Ampicillin 또는 Ceftriaxone (4주).\n단기 요법(2주): 위 약제 + Gentamicin 병합 (합병증 없는 경우).\nPenicillin 중간 내성 (MIC 0.12 ~ 0.5 μg/mL):\nPenicillin G (또는 Ceftriaxone) 4주 + Gentamicin (초기 2주).\nPenicillin 알레르기: Vancomycin (4주).\nB. 포도알균 (Staphylococci)\nMethicillin-Susceptible S. aureus (MSSA):\nNafcillin 또는 Cefazolin (4-6주).\n초기 3-5일간 Gentamicin 병용을 고려할 수 있으나 신독성에 주의해야 합니다.\nMethicillin-Resistant S. aureus (MRSA):\nVancomycin (6주). (Trough 농도 15-20 μg/mL 유지 권장).\n대체 약제: Daptomycin, Linezolid.\nC. 장알균 (Enterococci)\n단독 요법은 정균 작용만 있으므로 살균 효과를 위해 병합 요법이 필수적입니다.\nPenicillin/Gentamicin 감수성:\nAmpicillin (또는 Penicillin G) + Gentamicin (4-6주).\nGentamicin 고도 내성 (High-level resistance):\nAmpicillin + Ceftriaxone (Double beta-lactam 요법) 또는 Streptomycin (감수성 시) 병합.\nPenicillin 내성/알레르기:\nVancomycin + Gentamicin.\nVRE (Vancomycin-Resistant Enterococci): Linezolid 또는 Daptomycin.\nD. HACEK 그룹\nHaemophilus, Aggregatibacter, Cardiobacterium, Eikenella, Kingella 등.\n권장: Ceftriaxone (또는 Ampicillin-Sulbactam) 4주.\n대체: Ciprofloxacin.\n3. 인공판막 심내막염 (Prosthetic Valve Endocarditis, PVE)\n인공판막 심내막염은 치료 기간이 더 길며(최소 6주), 바이오필름(Biofilm) 내 균 제거를 위해 Rifampin 병용이 중요합니다.\n3.1 경험적 치료 (Culture-negative PVE 포함)\n수술 후 1년 이내 (Early PVE): MRSA, 그람음성균, 진균 등을 고려.\nVancomycin + Gentamicin + Cefepime + Rifampin.\n수술 후 1년 이후 (Late PVE):\nAmpicillin-Sulbactam + Gentamicin + Rifampin.\n3.2 포도알균 PVE (Staphylococcal PVE)\nMSSA: Nafcillin + Rifampin (6주 이상) + Gentamicin (초기 2주).\nMRSA: Vancomycin + Rifampin (6주 이상) + Gentamicin (초기 2주).\n주의: Rifampin은 내성 발현 방지를 위해 단독 사용하지 않습니다.\n4. 감염성 동맥내막염 및 진균성 동맥류\n4.1 개요 및 원인균\n정의: 매독을 제외한 모든 미생물 감염으로 인해 동맥 혈관 벽에 염증이 생기고, 이로 인해 혈관이 확장되어 잠재적으로 파열을 유발할 수 있는 질환입니다.\n주요 원인균: Staphylococcus aureus가 28-71%로 가장 흔하며, Salmonella spp.도 15-24%를 차지합니다. 그 외 Streptococcus pneumoniae, Staphylococcus epidermidis, 그람음성 장내세균, 혐기균, 진균 등이 원인이 될 수 있습니다.\n4.2 진단 및 치료 원칙\n진단: 원인 불명의 지속적인 발열, 통증, 박동성 종괴가 있는 경우 의심하며, 전산화단층촬영(Computed Tomography, CT)이 진단 및 파열 여부 확인에 가장 유용합니다.\n치료 원칙: 항생제 치료와 함께 파열 방지를 위한 수술적 치료(절제 및 우회술 등)가 필수적입니다.\n4.3 경험적 항생제 치료\n1차 권고 (Primary Regimen): Nafcillin (2 g IV q4-6hr) PLUS Ciprofloxacin (400 mg IV q12hr). 이는 가장 흔한 S. aureus와 Salmonella spp.를 동시에 커버하기 위함입니다.\n대체 요법 (Alternative Regimen): 지역사회 획득 메티실린 내성 황색포도알균(CA-MRSA)이 의심되거나 페니실린 알레르기가 있는 경우.\nVancomycin (15 mg/kg IV q12hr) PLUS Ceftriaxone (2 g IV q12hr).\n또는 Teicoplanin (6 mg/kg IV q12hr, 3회 부하 용량 후 q24hr) PLUS Ceftriaxone (2 g IV q12hr).\n치료 기간: 수술 후 6-8주간의 장기 항생제 투여가 권장됩니다.\n5. 종격동염 (Mediastinitis)\n5.1 분류 및 원인\n수술 후 종격동염(Post-sternotomy Mediastinitis): 심장 수술 등 흉골 절개술 후 발생하며, 주로 S. aureus, Coagulase-negative Staphylococci (CoNS), Enterobacteriaceae, Pseudomonas aeruginosa 등 원내 감염 균주가 원인입니다.\n하행성 괴사성 종격동염(Descending Necrotizing Mediastinitis): 치아, 인두 등 두경부 감염이 파급된 경우로, 구강 내 혐기균(Bacteroides, Peptostreptococcus 등)과 Streptococcus spp.에 의한 복합 감염이 흔합니다.\n5.2 치료 원칙\n즉각적인 외과적 배농(Surgical drainage) 및 괴사 조직 제거가 필수적이며, 적절한 광범위 항생제를 투여해야 합니다.\n5.3 경험적 항생제 치료\n하행성 종격동염: Ampicillin-Sulbactam (3 g IV q6hr)을 권장합니다(구강 내 혐기균 및 호기성 균 커버).\n수술 후/병원 획득 종격동염: P. aeruginosa와 MRSA를 커버하기 위해 Piperacillin-Tazobactam 또는 Carbapenem (Meropenem 등)에 Vancomycin을 병합하는 것을 고려할 수 있습니다.\n6. 요약표\nReferences\n1. 대한감염학회, 대한화학요법학회, 대한임상미생물학회, 대한심장학회, 대한흉부외과학회. 심혈관계 감염 진료지침 권고안. Infect Chemother 2011;43(2):129-177. (Clinical Guideline for the Diagnosis and Treatment of Cardiovascular Infections).\n2. Habib G, Lancellotti P, Antunes MJ, et al. 2015 ESC Guidelines for the management of infective endocarditis. Eur Heart J 2015;36:3075-128.\n3. Baddour LM, Wilson WR, Bayer AS, et al. Infective Endocarditis in Adults: Diagnosis, Antimicrobial Therapy, and Management of Complications: A Scientific Statement for Healthcare Professionals From the American Heart Association. Circulation 2015;132:1435-86.\n본 지침은 인천나은병원 항생제관리팀에서 승인하였으며,\n정기적으로 검토 및 업데이트됩니다.\n문의: 항생제관리팀", "paragraphs": [{"heading": "1. 개요 및 일반 원칙", "content": "심혈관계 감염, 특히 감염성 심내막염(Infective Endocarditis, IE)은 진단과 치료가 늦어질 경우 치명적인 합병증을 유발할 수 있습니다."}, {"heading": "1.1 진단 (Modified Duke Criteria)", "content": "확진(Definite IE): 병리학적 기준을 만족하거나, 임상적으로 주 기준 2개, 또는 주 기준 1개 + 소 기준 3개, 또는 소 기준 5개를 만족하는 경우.\n주 기준(Major Criteria):\n1. 혈액 배양 양성: 전형적인 원인균(Staphylococcus aureus, Viridans streptococci, Enterococcus spp., HACEK군 등)이 2회 이상 분리.\n2. 심내막 침범의 증거: 심초음파(Echocardiography)상 증식(Vegetation), 농양(Abscess), 인공판막의 새로운 결손 또는 새로운 판막 폐쇄부전.\n혈액 배양: 항생제 투여 전 최소 3쌍의 혈액 배양을 1시간 간격으로(위급 시 2시간 내 모두) 채취해야 합니다."}, {"heading": "1.2 심초음파 검사", "content": "IE가 의심되는 모든 환자에서 경흉부 심초음파(Transthoracic Echocardiography, TTE)를 권장하며, TTE가 음성이더라도 임상적 의심이 강하거나 인공판막(Prosthetic Valve) 환자인 경우 경식도 심초음파(Transesophageal Echocardiography, TEE)를 시행해야 합니다."}, {"heading": "2.1 경험적 항생제 치료 (Empirical Therapy)", "content": "배양 결과 확인 전까지는 Staphylococcus, Streptococcus, Enterococcus 및 그람음성균을 포괄하는 치료가 필요합니다.\n기본 요법: Ampicillin-Sulbactam (또는 Amoxicillin-Clavulanate) + Gentamicin.\n대체 요법: Nafcillin + Ampicillin (또는 Penicillin G) + Gentamicin.\nBeta-lactam 알레르기 시: Vancomycin + Gentamicin + Ciprofloxacin."}, {"heading": "2.2 원인균별 확정적 치료 (Definitive Therapy)", "content": "A. 사슬알균 (Streptococci)\nPenicillin 최소억제농도(Minimum Inhibitory Concentration, MIC)에 따라 결정\nPenicillin 감수성 (MIC ≤ 0.12 μg/mL):\nPenicillin G 또는 Ampicillin 또는 Ceftriaxone (4주).\n단기 요법(2주): 위 약제 + Gentamicin 병합 (합병증 없는 경우).\nPenicillin 중간 내성 (MIC 0.12 ~ 0.5 μg/mL):\nPenicillin G (또는 Ceftriaxone) 4주 + Gentamicin (초기 2주).\nPenicillin 알레르기: Vancomycin (4주).\nB. 포도알균 (Staphylococci)\nMethicillin-Susceptible S. aureus (MSSA):\nNafcillin 또는 Cefazolin (4-6주).\n초기 3-5일간 Gentamicin 병용을 고려할 수 있으나 신독성에 주의해야 합니다.\nMethicillin-Resistant S. aureus (MRSA):\nVancomycin (6주). (Trough 농도 15-20 μg/mL 유지 권장).\n대체 약제: Daptomycin, Linezolid.\nC. 장알균 (Enterococci)\n단독 요법은 정균 작용만 있으므로 살균 효과를 위해 병합 요법이 필수적입니다.\nPenicillin/Gentamicin 감수성:\nAmpicillin (또는 Penicillin G) + Gentamicin (4-6주).\nGentamicin 고도 내성 (High-level resistance):\nAmpicillin + Ceftriaxone (Double beta-lactam 요법) 또는 Streptomycin (감수성 시) 병합.\nPenicillin 내성/알레르기:\nVancomycin + Gentamicin.\nVRE (Vancomycin-Resistant Enterococci): Linezolid 또는 Daptomycin.\nD. HACEK 그룹\nHaemophilus, Aggregatibacter, Cardiobacterium, Eikenella, Kingella 등.\n권장: Ceftriaxone (또는 Ampicillin-Sulbactam) 4주.\n대체: Ciprofloxacin."}, {"heading": "3. 인공판막 심내막염 (Prosthetic Valve Endocarditis, PVE)", "content": "인공판막 심내막염은 치료 기간이 더 길며(최소 6주), 바이오필름(Biofilm) 내 균 제거를 위해 Rifampin 병용이 중요합니다."}, {"heading": "3.1 경험적 치료 (Culture-negative PVE 포함)", "content": "수술 후 1년 이내 (Early PVE): MRSA, 그람음성균, 진균 등을 고려.\nVancomycin + Gentamicin + Cefepime + Rifampin.\n수술 후 1년 이후 (Late PVE):\nAmpicillin-Sulbactam + Gentamicin + Rifampin."}, {"heading": "3.2 포도알균 PVE (Staphylococcal PVE)", "content": "MSSA: Nafcillin + Rifampin (6주 이상) + Gentamicin (초기 2주).\nMRSA: Vancomycin + Rifampin (6주 이상) + Gentamicin (초기 2주).\n주의: Rifampin은 내성 발현 방지를 위해 단독 사용하지 않습니다."}, {"heading": "4.1 개요 및 원인균", "content": "정의: 매독을 제외한 모든 미생물 감염으로 인해 동맥 혈관 벽에 염증이 생기고, 이로 인해 혈관이 확장되어 잠재적으로 파열을 유발할 수 있는 질환입니다.\n주요 원인균: Staphylococcus aureus가 28-71%로 가장 흔하며, Salmonella spp.도 15-24%를 차지합니다. 그 외 Streptococcus pneumoniae, Staphylococcus epidermidis, 그람음성 장내세균, 혐기균, 진균 등이 원인이 될 수 있습니다."}, {"heading": "4.2 진단 및 치료 원칙", "content": "진단: 원인 불명의 지속적인 발열, 통증, 박동성 종괴가 있는 경우 의심하며, 전산화단층촬영(Computed Tomography, CT)이 진단 및 파열 여부 확인에 가장 유용합니다.\n치료 원칙: 항생제 치료와 함께 파열 방지를 위한 수술적 치료(절제 및 우회술 등)가 필수적입니다."}, {"heading": "4.3 경험적 항생제 치료", "content": "1차 권고 (Primary Regimen): Nafcillin (2 g IV q4-6hr) PLUS Ciprofloxacin (400 mg IV q12hr). 이는 가장 흔한 S. aureus와 Salmonella spp.를 동시에 커버하기 위함입니다.\n대체 요법 (Alternative Regimen): 지역사회 획득 메티실린 내성 황색포도알균(CA-MRSA)이 의심되거나 페니실린 알레르기가 있는 경우.\nVancomycin (15 mg/kg IV q12hr) PLUS Ceftriaxone (2 g IV q12hr).\n또는 Teicoplanin (6 mg/kg IV q12hr, 3회 부하 용량 후 q24hr) PLUS Ceftriaxone (2 g IV q12hr).\n치료 기간: 수술 후 6-8주간의 장기 항생제 투여가 권장됩니다."}, {"heading": "5.1 분류 및 원인", "content": "수술 후 종격동염(Post-sternotomy Mediastinitis): 심장 수술 등 흉골 절개술 후 발생하며, 주로 S. aureus, Coagulase-negative Staphylococci (CoNS), Enterobacteriaceae, Pseudomonas aeruginosa 등 원내 감염 균주가 원인입니다.\n하행성 괴사성 종격동염(Descending Necrotizing Mediastinitis): 치아, 인두 등 두경부 감염이 파급된 경우로, 구강 내 혐기균(Bacteroides, Peptostreptococcus 등)과 Streptococcus spp.에 의한 복합 감염이 흔합니다."}, {"heading": "5.2 치료 원칙", "content": "즉각적인 외과적 배농(Surgical drainage) 및 괴사 조직 제거가 필수적이며, 적절한 광범위 항생제를 투여해야 합니다."}, {"heading": "5.3 경험적 항생제 치료", "content": "하행성 종격동염: Ampicillin-Sulbactam (3 g IV q6hr)을 권장합니다(구강 내 혐기균 및 호기성 균 커버).\n수술 후/병원 획득 종격동염: P. aeruginosa와 MRSA를 커버하기 위해 Piperacillin-Tazobactam 또는 Carbapenem (Meropenem 등)에 Vancomycin을 병합하는 것을 고려할 수 있습니다."}, {"heading": "6. 요약표", "content": "References\n1. 대한감염학회, 대한화학요법학회, 대한임상미생물학회, 대한심장학회, 대한흉부외과학회. 심혈관계 감염 진료지침 권고안. Infect Chemother 2011;43(2):129-177. (Clinical Guideline for the Diagnosis and Treatment of Cardiovascular Infections).\n2. Habib G, Lancellotti P, Antunes MJ, et al. 2015 ESC Guidelines for the management of infective endocarditis. Eur Heart J 2015;36:3075-128.\n3. Baddour LM, Wilson WR, Bayer AS, et al. Infective Endocarditis in Adults: Diagnosis, Antimicrobial Therapy, and Management of Complications: A Scientific Statement for Healthcare Professionals From the American Heart Association. Circulation 2015;132:1435-86.\n본 지침은 인천나은병원 항생제관리팀에서 승인하였으며,\n정기적으로 검토 및 업데이트됩니다.\n문의: 항생제관리팀"}]}, {"id": "08_복강내감염지침", "title": "복강 내 감염", "icon": "🏥", "tags": ["복막염", "담낭염", "복강내감염", "IAI", "Piperacillin-Tazobactam", "Metronidazole", "Cefoxitin", "Candida", "감염원조절"], "fullText": "복강 내 감염\n항생제 사용 지침\n인천나은병원 항생제관리팀\n26.2.20\n1. 개요 및 일반 원칙\n복강 내 감염은 위장관 천공, 충수돌기염, 담낭염, 복막염 등을 포함하며, 치료의 핵심은 신속한 감염원 조절(Source Control)과 적절한 항생제 투여입니다.\n1.1 분류 및 위험 평가\n분류:\n지역사회 획득(Community-acquired IAI, CA-IAI): 일반적인 지역사회 환경에서 발생한 감염.\n의료관련(Healthcare-associated IAI, HA-IAI): 입원 48시간 이후 발생, 또는 과거 입원력/수술력이 있는 환자에서 발생. 다제내성균(Multidrug-Resistant Organism, MDRO) 위험이 높습니다.\n중증도 평가: 패혈증(Sepsis) 징후, 고령, 면역저하, 생리적 점수(APACHE II 등)를 고려하여 경증-중등도(Mild-to-moderate)와 중증(Severe/High-risk)으로 분류합니다.\n1.2 미생물학적 특징\nCA-IAI: Escherichia coli, Klebsiella pneumoniae, Streptococcus spp., 그리고 혐기균(Bacteroides fragilis 등)이 주 원인입니다.\nHA-IAI: Pseudomonas aeruginosa, Acinetobacter spp., Enterobacterales (ESBL 생성균, AmpC 생성균 등), Enterococcus spp., Candida spp. 등의 비중이 증가합니다.\n2. 경험적 항생제 치료 (Empirical Therapy)\n2.1 지역사회 획득 복강 내 감염 (CA-IAI)\nA. 경증 및 중등도 (Mild to Moderate)\n치료 목표: 대장균(E. coli) 등 장내세균과 혐기균(B. fragilis)을 커버해야 합니다.\n1차 권고:\nCefoxitin (단독 요법).\nCeftriaxone 또는 Cefotaxime PLUS Metronidazole.\n대체 요법 (Beta-lactam 알레르기 시): Ciprofloxacin 또는 Levofloxacin PLUS Metronidazole.\n주의: 국내 E. coli의 Fluoroquinolone 내성률이 높으므로(>30%), 1차 약제로 권장되지 않으며 Beta-lactam 알레르기가 있는 경우에만 제한적으로 사용합니다.\nB. 중증 또는 고위험군 (Severe or High-risk)\n정의: 중증 패혈증, 패혈성 쇼크, 또는 고령/면역저하 등 예후가 불량할 것으로 예상되는 경우.\n치료 목표: P. aeruginosa 및 내성 장내세균을 포함한 광범위 커버리지가 필요합니다.\n1차 권고:\nPiperacillin-Tazobactam.\nCarbapenem (Meropenem, Imipenem-Cilastatin, Doripenem).\nCeftazidime 또는 Cefepime PLUS Metronidazole.\n주의: Ertapenem은 P. aeruginosa 및 Acinetobacter spp.에 활성이 없으므로 중증 HA-IAI에서 경험적 사용 시 주의가 필요합니다(CA-IAI 중증에서는 사용 가능).\n2.2 의료관련 복강 내 감염 (HA-IAI)\n치료 원칙: 지역 내성 현황과 환자의 이전 배양 결과, 항생제 사용력을 고려하여 P. aeruginosa와 MDRO를 커버해야 합니다.\n권고 요법:\nPiperacillin-Tazobactam 또는 Carbapenem (Meropenem, Imipenem-Cilastatin).\nCephalosporin (Ceftazidime/Cefepime) PLUS Metronidazole.\nMDRO 위험이 매우 높거나 패혈성 쇼크 상태인 경우 Amikacin (Aminoglycoside) 병합을 고려합니다.\nVancomycin 추가 적응증:\n경험적으로 모든 환자에게 권장되지 않습니다.\n적응증: 수술 후 감염, Enterococcus spp. 또는 Methicillin-Resistant Staphylococcus aureus (MRSA) 보균자, 심장 판막 질환자, 패혈성 쇼크 상태인 경우 초기 투여하고 배양 결과에 따라 중단(De-escalation)합니다.\n2.3 담낭 및 담도 감염 (Biliary Tract Infections)\n특징: 담도계 감염은 장내세균이 주 원인이지만, 혐기균의 비중은 하부 위장관 감염보다 낮습니다.\n경증-중등도: Ceftriaxone, Cefotaxime, Cefuroxime, Ciprofloxacin(알레르기 시).\n중증/HA-IAI: Piperacillin-Tazobactam, Meropenem, Imipenem-Cilastatin, Cefepime (+ Metronidazole).\n혐기균 커버: 담관-장 문합(Biliary-enteric anastomosis)이 되어 있는 환자나 심한 농양이 있는 경우 Metronidazole을 병합하거나 혐기균 커버가 되는 Beta-lactam을 사용합니다.\n3. 원인균별 확정적 치료 및 특수 상황\n3.1 다제내성 그람음성균 (MDR-GNB)\nExtended-Spectrum Beta-Lactamase (ESBL) 생성균: Carbapenem (Ertapenem 포함)이 우선 권장됩니다.\nCarbapenem-Resistant Enterobacterales (CRE): Ceftazidime-Avibactam을 우선 고려하며, 대체제로 Tigecycline (혈류 감염 제외) 등을 고려합니다.\nDifficult-to-Treat Resistance (DTR) P. aeruginosa: Ceftolozane-Tazobactam, Ceftazidime-Avibactam 등을 권장합니다.\n3.2 Enterococcus spp.\n지역사회 감염에서는 경험적 치료가 필수는 아니나, 의료관련 감염이나 패혈성 쇼크 시에는 Enterococcus faecalis (Ampicillin 감수성)와 Enterococcus faecium (Ampicillin 내성, often VRE)을 고려해야 합니다.\n치료: Ampicillin 감수성 시 Ampicillin 또는 Piperacillin-Tazobactam 사용. Ampicillin 내성 시 Vancomycin. VRE인 경우 Linezolid 또는 Daptomycin.\n3.3 Candida spp. (진균)\n적응증: 상부 위장관 천공, 재발성/지속성 복막염, 수술적 치료를 받은 급성 췌장염, 최근 광범위 항생제 사용력, 패혈성 쇼크 등에서 항진균제 경험적 투여를 고려합니다.\n약제: Fluconazole (혈역학적 안정 시), Echinocandin (Caspofungin, Micafungin, Anidulafungin - 중증 또는 내성 의심 시).\n4. 치료 기간 (Duration of Therapy)\n감염원 조절(Source Control)이 적절히 이루어진 경우, 짧은 기간의 항생제 사용이 권장됩니다(STOP-IT trial 근거).\n위염, 비천공성 충수돌기염/담낭염 (수술 후): 24시간 이내 예방적 투여로 종료.\n적절한 소스 컨트롤이 된 복잡성 복강 내 감염: 4일 (96시간) 치료 권장.\n소스 컨트롤이 불완전하거나 어려운 경우: 임상적 호전(해열, 백혈구 정상화, 장운동 회복) 후 48시간 이상 투여하며, 통상 5-7일 이상 소요될 수 있습니다. 5-7일 후에도 임상 호전이 없으면 CT 촬영 등 재평가 및 추가 배농을 고려해야 합니다.\n5. 요약표 (경험적 항생제)\n약어: FQ (Fluoroquinolone), GNB (Gram-Negative Bacteria), MDRO (Multidrug-Resistant Organism)\nReferences\n1. Yoon YK, Kim J, Moon C, et al. Guidelines for the Antibiotic Use in Adults with Intra-abdominal Infections. Infect Chemother 2022;54(4):812-853.\n2. Solomkin JS, Mazuski JE, Bradley JS, et al. Diagnosis and management of complicated intra-abdominal infection in adults and children: guidelines by the Surgical Infection Society and the Infectious Diseases Society of America. Clin Infect Dis 2010;50:133-64.\n3. Mazuski JE, Tessier JM, May AK, et al. The Surgical Infection Society Revised Guidelines on the Management of Intra-Abdominal Infection. Surg Infect (Larchmt) 2017;18:1-76.\n4. Sartelli M, Chichom-Mefire A, Labricciosa FM, et al. The management of intra-abdominal infections from a global perspective: 2017 WSES guidelines for management of intra-abdominal infections. World J Emerg Surg 2017;12:29.\n5. Sawyer RG, Claridge JA, Nathens AB, et al. Trial of short-course antimicrobial therapy for intraabdominal infection. N Engl J Med 2015;372:1996-2005.\n6. Bonomo RA, Chow AW, Abrahamian FM, et al. 2024 Clinical Practice Guideline Update by the Infectious Diseases Society of America on Complicated Intra-abdominal Infections: Risk Assessment, Diagnostic Imaging, and Microbiological Evaluation. Clin Infect Dis 2024;79(S3):S81-S87.\n7. Tamma PD, Heil EL, Justo JA, et al. Infectious Diseases Society of America 2024 Guidance on the Treatment of Antimicrobial-Resistant Gram-Negative Infections. Clin Infect Dis 2024.\n본 지침은 인천나은병원 항생제관리팀에서 승인하였으며,\n정기적으로 검토 및 업데이트됩니다.\n문의: 항생제관리팀", "paragraphs": [{"heading": "1. 개요 및 일반 원칙", "content": "복강 내 감염은 위장관 천공, 충수돌기염, 담낭염, 복막염 등을 포함하며, 치료의 핵심은 신속한 감염원 조절(Source Control)과 적절한 항생제 투여입니다."}, {"heading": "1.1 분류 및 위험 평가", "content": "분류:\n지역사회 획득(Community-acquired IAI, CA-IAI): 일반적인 지역사회 환경에서 발생한 감염.\n의료관련(Healthcare-associated IAI, HA-IAI): 입원 48시간 이후 발생, 또는 과거 입원력/수술력이 있는 환자에서 발생. 다제내성균(Multidrug-Resistant Organism, MDRO) 위험이 높습니다.\n중증도 평가: 패혈증(Sepsis) 징후, 고령, 면역저하, 생리적 점수(APACHE II 등)를 고려하여 경증-중등도(Mild-to-moderate)와 중증(Severe/High-risk)으로 분류합니다."}, {"heading": "1.2 미생물학적 특징", "content": "CA-IAI: Escherichia coli, Klebsiella pneumoniae, Streptococcus spp., 그리고 혐기균(Bacteroides fragilis 등)이 주 원인입니다.\nHA-IAI: Pseudomonas aeruginosa, Acinetobacter spp., Enterobacterales (ESBL 생성균, AmpC 생성균 등), Enterococcus spp., Candida spp. 등의 비중이 증가합니다."}, {"heading": "2.1 지역사회 획득 복강 내 감염 (CA-IAI)", "content": "A. 경증 및 중등도 (Mild to Moderate)\n치료 목표: 대장균(E. coli) 등 장내세균과 혐기균(B. fragilis)을 커버해야 합니다.\n1차 권고:\nCefoxitin (단독 요법).\nCeftriaxone 또는 Cefotaxime PLUS Metronidazole.\n대체 요법 (Beta-lactam 알레르기 시): Ciprofloxacin 또는 Levofloxacin PLUS Metronidazole.\n주의: 국내 E. coli의 Fluoroquinolone 내성률이 높으므로(>30%), 1차 약제로 권장되지 않으며 Beta-lactam 알레르기가 있는 경우에만 제한적으로 사용합니다.\nB. 중증 또는 고위험군 (Severe or High-risk)\n정의: 중증 패혈증, 패혈성 쇼크, 또는 고령/면역저하 등 예후가 불량할 것으로 예상되는 경우.\n치료 목표: P. aeruginosa 및 내성 장내세균을 포함한 광범위 커버리지가 필요합니다.\n1차 권고:\nPiperacillin-Tazobactam.\nCarbapenem (Meropenem, Imipenem-Cilastatin, Doripenem).\nCeftazidime 또는 Cefepime PLUS Metronidazole.\n주의: Ertapenem은 P. aeruginosa 및 Acinetobacter spp.에 활성이 없으므로 중증 HA-IAI에서 경험적 사용 시 주의가 필요합니다(CA-IAI 중증에서는 사용 가능)."}, {"heading": "2.2 의료관련 복강 내 감염 (HA-IAI)", "content": "치료 원칙: 지역 내성 현황과 환자의 이전 배양 결과, 항생제 사용력을 고려하여 P. aeruginosa와 MDRO를 커버해야 합니다.\n권고 요법:\nPiperacillin-Tazobactam 또는 Carbapenem (Meropenem, Imipenem-Cilastatin).\nCephalosporin (Ceftazidime/Cefepime) PLUS Metronidazole.\nMDRO 위험이 매우 높거나 패혈성 쇼크 상태인 경우 Amikacin (Aminoglycoside) 병합을 고려합니다.\nVancomycin 추가 적응증:\n경험적으로 모든 환자에게 권장되지 않습니다.\n적응증: 수술 후 감염, Enterococcus spp. 또는 Methicillin-Resistant Staphylococcus aureus (MRSA) 보균자, 심장 판막 질환자, 패혈성 쇼크 상태인 경우 초기 투여하고 배양 결과에 따라 중단(De-escalation)합니다."}, {"heading": "2.3 담낭 및 담도 감염 (Biliary Tract Infections)", "content": "특징: 담도계 감염은 장내세균이 주 원인이지만, 혐기균의 비중은 하부 위장관 감염보다 낮습니다.\n경증-중등도: Ceftriaxone, Cefotaxime, Cefuroxime, Ciprofloxacin(알레르기 시).\n중증/HA-IAI: Piperacillin-Tazobactam, Meropenem, Imipenem-Cilastatin, Cefepime (+ Metronidazole).\n혐기균 커버: 담관-장 문합(Biliary-enteric anastomosis)이 되어 있는 환자나 심한 농양이 있는 경우 Metronidazole을 병합하거나 혐기균 커버가 되는 Beta-lactam을 사용합니다."}, {"heading": "3.1 다제내성 그람음성균 (MDR-GNB)", "content": "Extended-Spectrum Beta-Lactamase (ESBL) 생성균: Carbapenem (Ertapenem 포함)이 우선 권장됩니다.\nCarbapenem-Resistant Enterobacterales (CRE): Ceftazidime-Avibactam을 우선 고려하며, 대체제로 Tigecycline (혈류 감염 제외) 등을 고려합니다.\nDifficult-to-Treat Resistance (DTR) P. aeruginosa: Ceftolozane-Tazobactam, Ceftazidime-Avibactam 등을 권장합니다."}, {"heading": "3.2 Enterococcus spp.", "content": "지역사회 감염에서는 경험적 치료가 필수는 아니나, 의료관련 감염이나 패혈성 쇼크 시에는 Enterococcus faecalis (Ampicillin 감수성)와 Enterococcus faecium (Ampicillin 내성, often VRE)을 고려해야 합니다.\n치료: Ampicillin 감수성 시 Ampicillin 또는 Piperacillin-Tazobactam 사용. Ampicillin 내성 시 Vancomycin. VRE인 경우 Linezolid 또는 Daptomycin."}, {"heading": "3.3 Candida spp. (진균)", "content": "적응증: 상부 위장관 천공, 재발성/지속성 복막염, 수술적 치료를 받은 급성 췌장염, 최근 광범위 항생제 사용력, 패혈성 쇼크 등에서 항진균제 경험적 투여를 고려합니다.\n약제: Fluconazole (혈역학적 안정 시), Echinocandin (Caspofungin, Micafungin, Anidulafungin - 중증 또는 내성 의심 시)."}, {"heading": "4. 치료 기간 (Duration of Therapy)", "content": "감염원 조절(Source Control)이 적절히 이루어진 경우, 짧은 기간의 항생제 사용이 권장됩니다(STOP-IT trial 근거).\n위염, 비천공성 충수돌기염/담낭염 (수술 후): 24시간 이내 예방적 투여로 종료.\n적절한 소스 컨트롤이 된 복잡성 복강 내 감염: 4일 (96시간) 치료 권장.\n소스 컨트롤이 불완전하거나 어려운 경우: 임상적 호전(해열, 백혈구 정상화, 장운동 회복) 후 48시간 이상 투여하며, 통상 5-7일 이상 소요될 수 있습니다. 5-7일 후에도 임상 호전이 없으면 CT 촬영 등 재평가 및 추가 배농을 고려해야 합니다."}, {"heading": "5. 요약표 (경험적 항생제)", "content": "약어: FQ (Fluoroquinolone), GNB (Gram-Negative Bacteria), MDRO (Multidrug-Resistant Organism)\nReferences\n1. Yoon YK, Kim J, Moon C, et al. Guidelines for the Antibiotic Use in Adults with Intra-abdominal Infections. Infect Chemother 2022;54(4):812-853.\n2. Solomkin JS, Mazuski JE, Bradley JS, et al. Diagnosis and management of complicated intra-abdominal infection in adults and children: guidelines by the Surgical Infection Society and the Infectious Diseases Society of America. Clin Infect Dis 2010;50:133-64.\n3. Mazuski JE, Tessier JM, May AK, et al. The Surgical Infection Society Revised Guidelines on the Management of Intra-Abdominal Infection. Surg Infect (Larchmt) 2017;18:1-76.\n4. Sartelli M, Chichom-Mefire A, Labricciosa FM, et al. The management of intra-abdominal infections from a global perspective: 2017 WSES guidelines for management of intra-abdominal infections. World J Emerg Surg 2017;12:29.\n5. Sawyer RG, Claridge JA, Nathens AB, et al. Trial of short-course antimicrobial therapy for intraabdominal infection. N Engl J Med 2015;372:1996-2005.\n6. Bonomo RA, Chow AW, Abrahamian FM, et al. 2024 Clinical Practice Guideline Update by the Infectious Diseases Society of America on Complicated Intra-abdominal Infections: Risk Assessment, Diagnostic Imaging, and Microbiological Evaluation. Clin Infect Dis 2024;79(S3):S81-S87.\n7. Tamma PD, Heil EL, Justo JA, et al. Infectious Diseases Society of America 2024 Guidance on the Treatment of Antimicrobial-Resistant Gram-Negative Infections. Clin Infect Dis 2024.\n본 지침은 인천나은병원 항생제관리팀에서 승인하였으며,\n정기적으로 검토 및 업데이트됩니다.\n문의: 항생제관리팀"}]}, {"id": "09_골관절감염지침", "title": "골관절 감염", "icon": "🦴", "tags": ["골수염", "Osteomyelitis", "화농성관절염", "Nafcillin", "Cefazolin", "Rifampin", "MRSA", "바이오필름", "인공관절"], "fullText": "골관절 감염 항생제 사용 지침\n인천나은병원 항생제관리팀\n26.2.20\n1. 개요 및 일반 원칙\n골관절 감염은 치료가 어렵고 재발이 잦은 질환으로, 성공적인 치료를 위해서는 적절한 외과적 변연절제술(Debridement)과 항생제 치료가 필수적입니다.\n1.1 진단 및 배양 검사\n배양 우선 원칙: 혈역학적으로 불안정하지 않다면, 항생제 투여 전 반드시 혈액 배양과 함께 병변 부위의 흡인(Aspiration) 또는 조직 배양(Tissue culture)을 시행해야 합니다. 만성 골수염의 경우, 누공(Sinus tract) 배양은 심부 병원균과 일치하지 않을 수 있으므로 지양하고, 수술 중 얻은 심부 조직 배양을 권장합니다.\n영상 검사: 단순 방사선 사진은 기초 검사로 유용하며, Magnetic Resonance Imaging (MRI)는 골수염 및 주변 연조직 감염의 범위를 평가하는 데 가장 예민한 검사입니다.\n2. 골수염 (Osteomyelitis)\n2.1 원인균 및 역학\n가장 흔한 원인균: Staphylococcus aureus (가장 흔함), Coagulase-negative Staphylococci (CoNS).\n그람음성균: Enterobacteriaceae (예: Escherichia coli, Klebsiella pneumoniae), Pseudomonas aeruginosa (원내 감염, 개방 골절, 약물 남용자 등에서 고려).\n국내 현황: 척추 골수염 등에서 S. aureus가 가장 흔하며, Methicillin 내성률(Methicillin-Resistant S. aureus, MRSA)이 상당수 보고되고 있습니다.\n2.2 경험적 항생제 치료 (Empirical Therapy)\n배양 결과가 나오기 전, 감염 경로와 위험 인자에 따라 경험적 항생제를 선택합니다.\n지역사회 획득(Community-acquired):\n주로 Methicillin-Susceptible S. aureus (MSSA)를 타겟으로 합니다.\n권장: Nafcillin 또는 Cefazolin.\n참고: 그람음성균 감염을 배제할 수 없는 경우(노인, 요로감염 병력 등) Ceftriaxone을 병합할 수 있습니다.\n의료 관련(Nosocomial) 또는 MRSA 위험군:\n과거 입원력, 수술 후 감염, 인공 삽입물 보유, 또는 MRSA 감염력이 있는 경우.\n권장: Vancomycin 또는 Teicoplanin.\nP. aeruginosa 위험이 있는 경우(중증, 원내 감염): Ceftazidime, Cefepime, Piperacillin-Tazobactam, Meropenem 등을 병합합니다.\n2.3 원인균별 확정적 치료 (Definitive Therapy)\nA. Staphylococci (S. aureus, CoNS)\nMSSA:\n1차 권장: Nafcillin 또는 Cefazolin.\n주의: MSSA 골수염에서 Vancomycin은 Beta-lactam 제제보다 치료 실패율이 높으므로, Beta-lactam 알레르기가 없는 한 사용을 지양해야 합니다.\nMRSA:\n1차 권장: Vancomycin 또는 Teicoplanin.\n대체 약제: Linezolid. (Daptomycin은 국내 사용 가능 여부 및 보험 기준 확인 필요).\nVancomycin TDM: 골침투력을 고려하여 Trough 농도를 15-20 µg/mL로 유지하는 것을 권장합니다.\nB. Gram-negative Bacilli\nEnterobacteriaceae (E. coli 등): Ceftriaxone 또는 Ciprofloxacin, Levofloxacin. (단, 국내 E. coli의 Fluoroquinolone 내성률이 높으므로 감수성 확인 후 사용).\nP. aeruginosa: Cefepime, Ceftazidime, Piperacillin-Tazobactam, Meropenem, Imipenem-Cilastatin. (Ciprofloxacin은 고용량 장기 투여 시 내성 유발 가능성이 있으므로 초기에는 Beta-lactam + Aminoglycoside 병합 후 경구 전환 시 고려).\n2.4 경구 전환 및 Rifampin의 역할\n경구 전환: 초기 정주 치료 후 염증 수치(CRP 등)가 호전되고 환자가 안정적이면 경구 항생제로 전환(Step-down therapy)할 수 있습니다.\nRifampin: 인공 삽입물(Hardware)이 있거나 만성 골수염인 경우, S. aureus의 바이오필름(Biofilm) 침투를 위해 Rifampin을 다른 항생제(Ciprofloxacin, Levofloxacin, Trimethoprim-Sulfamethoxazole TMP-SMX 등)와 병합하여 사용할 수 있습니다. 단독 사용은 내성 발현으로 금기입니다.\n2.5 치료 기간\n급성 골수염: 통상 4-6주.\n만성 골수염: 수술적 제거 후 4-6주 이상. (병변 제거가 불완전하면 장기 억제 요법이 필요할 수 있음).\n척추 골수염: 일반적으로 6-12주를 권장하나 임상 반응에 따라 개별화합니다.\n3. 화농성 관절염 (Septic Arthritis)\n3.1 개요 및 진단\n응급 질환으로, 관절 파괴를 막기 위해 조기 배농(Drainage)과 항생제 투여가 필수적입니다.\n진단: 항생제 투여 전 관절천자(Arthrocentesis)를 통해 관절액의 백혈구 수, 그람 염색, 배양 검사를 시행해야 합니다.\n3.2 경험적 항생제 치료\n그람 염색 결과와 위험 인자에 따라 선택합니다.\n그람양성 알균(Gram-positive cocci) 확인 시:\n저위험군: Cefazolin, Nafcillin.\nMRSA 위험군: Vancomycin, Teicoplanin.\n그람음성 막대균(Gram-negative bacilli) 확인 시:\nCeftriaxone, Ceftazidime, Cefepime.\n배양 음성 또는 그람 염색 음성 시:\n성적으로 활발한 성인: N. gonorrhoeae 가능성을 고려하여 Ceftriaxone.\n일반 성인/노인: S. aureus 및 그람음성균 커버를 위해 Vancomycin + Ceftriaxone (또는 Ceftazidime).\n3.3 치료 기간\nN. gonorrhoeae: 7-10일.\nS. aureus 및 그람음성균: 4-6주 이상 (초기 2주 이상 정주 치료 권장).\n4. 요약표: 골관절 감염 경험적 항생제\nReferences\n1. 대한감염학회, 대한화학요법학회, 대한정형외과학회. 국내 골관절감염 항균요법 권고안. Infect Chemother 2014;46(3):153-180. (Clinical Guidelines for the Antimicrobial Treatment of Bone and Joint Infections in Korea).\n본 지침은 인천나은병원 항생제관리팀에서 승인하였으며,\n정기적으로 검토 및 업데이트됩니다.\n문의: 항생제관리팀", "paragraphs": [{"heading": "1. 개요 및 일반 원칙", "content": "골관절 감염은 치료가 어렵고 재발이 잦은 질환으로, 성공적인 치료를 위해서는 적절한 외과적 변연절제술(Debridement)과 항생제 치료가 필수적입니다."}, {"heading": "1.1 진단 및 배양 검사", "content": "배양 우선 원칙: 혈역학적으로 불안정하지 않다면, 항생제 투여 전 반드시 혈액 배양과 함께 병변 부위의 흡인(Aspiration) 또는 조직 배양(Tissue culture)을 시행해야 합니다. 만성 골수염의 경우, 누공(Sinus tract) 배양은 심부 병원균과 일치하지 않을 수 있으므로 지양하고, 수술 중 얻은 심부 조직 배양을 권장합니다.\n영상 검사: 단순 방사선 사진은 기초 검사로 유용하며, Magnetic Resonance Imaging (MRI)는 골수염 및 주변 연조직 감염의 범위를 평가하는 데 가장 예민한 검사입니다."}, {"heading": "2.1 원인균 및 역학", "content": "가장 흔한 원인균: Staphylococcus aureus (가장 흔함), Coagulase-negative Staphylococci (CoNS).\n그람음성균: Enterobacteriaceae (예: Escherichia coli, Klebsiella pneumoniae), Pseudomonas aeruginosa (원내 감염, 개방 골절, 약물 남용자 등에서 고려).\n국내 현황: 척추 골수염 등에서 S. aureus가 가장 흔하며, Methicillin 내성률(Methicillin-Resistant S. aureus, MRSA)이 상당수 보고되고 있습니다."}, {"heading": "2.2 경험적 항생제 치료 (Empirical Therapy)", "content": "배양 결과가 나오기 전, 감염 경로와 위험 인자에 따라 경험적 항생제를 선택합니다.\n지역사회 획득(Community-acquired):\n주로 Methicillin-Susceptible S. aureus (MSSA)를 타겟으로 합니다.\n권장: Nafcillin 또는 Cefazolin.\n참고: 그람음성균 감염을 배제할 수 없는 경우(노인, 요로감염 병력 등) Ceftriaxone을 병합할 수 있습니다.\n의료 관련(Nosocomial) 또는 MRSA 위험군:\n과거 입원력, 수술 후 감염, 인공 삽입물 보유, 또는 MRSA 감염력이 있는 경우.\n권장: Vancomycin 또는 Teicoplanin.\nP. aeruginosa 위험이 있는 경우(중증, 원내 감염): Ceftazidime, Cefepime, Piperacillin-Tazobactam, Meropenem 등을 병합합니다."}, {"heading": "2.3 원인균별 확정적 치료 (Definitive Therapy)", "content": "A. Staphylococci (S. aureus, CoNS)\nMSSA:\n1차 권장: Nafcillin 또는 Cefazolin.\n주의: MSSA 골수염에서 Vancomycin은 Beta-lactam 제제보다 치료 실패율이 높으므로, Beta-lactam 알레르기가 없는 한 사용을 지양해야 합니다.\nMRSA:\n1차 권장: Vancomycin 또는 Teicoplanin.\n대체 약제: Linezolid. (Daptomycin은 국내 사용 가능 여부 및 보험 기준 확인 필요).\nVancomycin TDM: 골침투력을 고려하여 Trough 농도를 15-20 µg/mL로 유지하는 것을 권장합니다.\nB. Gram-negative Bacilli\nEnterobacteriaceae (E. coli 등): Ceftriaxone 또는 Ciprofloxacin, Levofloxacin. (단, 국내 E. coli의 Fluoroquinolone 내성률이 높으므로 감수성 확인 후 사용).\nP. aeruginosa: Cefepime, Ceftazidime, Piperacillin-Tazobactam, Meropenem, Imipenem-Cilastatin. (Ciprofloxacin은 고용량 장기 투여 시 내성 유발 가능성이 있으므로 초기에는 Beta-lactam + Aminoglycoside 병합 후 경구 전환 시 고려)."}, {"heading": "2.4 경구 전환 및 Rifampin의 역할", "content": "경구 전환: 초기 정주 치료 후 염증 수치(CRP 등)가 호전되고 환자가 안정적이면 경구 항생제로 전환(Step-down therapy)할 수 있습니다.\nRifampin: 인공 삽입물(Hardware)이 있거나 만성 골수염인 경우, S. aureus의 바이오필름(Biofilm) 침투를 위해 Rifampin을 다른 항생제(Ciprofloxacin, Levofloxacin, Trimethoprim-Sulfamethoxazole TMP-SMX 등)와 병합하여 사용할 수 있습니다. 단독 사용은 내성 발현으로 금기입니다."}, {"heading": "2.5 치료 기간", "content": "급성 골수염: 통상 4-6주.\n만성 골수염: 수술적 제거 후 4-6주 이상. (병변 제거가 불완전하면 장기 억제 요법이 필요할 수 있음).\n척추 골수염: 일반적으로 6-12주를 권장하나 임상 반응에 따라 개별화합니다."}, {"heading": "3.1 개요 및 진단", "content": "응급 질환으로, 관절 파괴를 막기 위해 조기 배농(Drainage)과 항생제 투여가 필수적입니다.\n진단: 항생제 투여 전 관절천자(Arthrocentesis)를 통해 관절액의 백혈구 수, 그람 염색, 배양 검사를 시행해야 합니다."}, {"heading": "3.2 경험적 항생제 치료", "content": "그람 염색 결과와 위험 인자에 따라 선택합니다.\n그람양성 알균(Gram-positive cocci) 확인 시:\n저위험군: Cefazolin, Nafcillin.\nMRSA 위험군: Vancomycin, Teicoplanin.\n그람음성 막대균(Gram-negative bacilli) 확인 시:\nCeftriaxone, Ceftazidime, Cefepime.\n배양 음성 또는 그람 염색 음성 시:\n성적으로 활발한 성인: N. gonorrhoeae 가능성을 고려하여 Ceftriaxone.\n일반 성인/노인: S. aureus 및 그람음성균 커버를 위해 Vancomycin + Ceftriaxone (또는 Ceftazidime)."}, {"heading": "3.3 치료 기간", "content": "N. gonorrhoeae: 7-10일.\nS. aureus 및 그람음성균: 4-6주 이상 (초기 2주 이상 정주 치료 권장)."}, {"heading": "4. 요약표: 골관절 감염 경험적 항생제", "content": "References\n1. 대한감염학회, 대한화학요법학회, 대한정형외과학회. 국내 골관절감염 항균요법 권고안. Infect Chemother 2014;46(3):153-180. (Clinical Guidelines for the Antimicrobial Treatment of Bone and Joint Infections in Korea).\n본 지침은 인천나은병원 항생제관리팀에서 승인하였으며,\n정기적으로 검토 및 업데이트됩니다.\n문의: 항생제관리팀"}]}, {"id": "10_중추신경계감염지침", "title": "중추신경계 감염 (수막염)", "icon": "🧠", "tags": ["수막염", "Meningitis", "Listeria", "Ceftriaxone", "Vancomycin", "Ampicillin", "Dexamethasone", "뇌척수액", "BBB"], "fullText": "중추신경계 감염\n항생제 사용 지침\n인천나은병원 항생제관리팀\n26.2.20\n1. 개요 및 일반 원칙\n세균성 수막염(Bacterial Meningitis)은 응급 질환으로서, 의심되거나 진단된 경우 가능한 한 빨리 적절한 항균제 치료를 시작해야 예후를 개선할 수 있습니다.\n1.1 초기 평가 및 진단\n뇌척수액(Cerebrospinal Fluid, CSF) 검사: 금기증(뇌압 상승 징후 등)이 없다면 항생제 투여 전 혈액 배양과 함께 척수천자를 시행하여 원인균을 확인해야 합니다.\n뇌 영상 검사: 유두부종(Papilledema), 국소 신경학적 징후, 최근 경련, 의식 저하, 면역저하자 등의 경우 뇌 탈출(Herniation) 위험이 있으므로 척수천자 전 뇌 전산화단층촬영(CT) 또는 자기공명영상(MRI)을 시행합니다. 이 경우 검사 지연으로 항생제 투여가 늦어져서는 안 되며, 혈액 배양 후 즉시 항생제를 투여하고 영상 검사를 진행합니다.\n2. 경험적 항생제 치료 (Empirical Therapy)\n국내 성인 수막염의 원인균 분포와 내성 현황을 고려하여 환자의 연령, 기저질환, 감염 경로에 따라 항생제를 선택합니다.\n2.1 지역사회 획득 수막염 (Community-Acquired Meningitis)\n주요 원인균: Streptococcus pneumoniae (가장 흔함), Neisseria meningitidis, Haemophilus influenzae, Listeria monocytogenes (고령, 면역저하).\n18세 ~ 50세 (건강한 성인):\n권장: Vancomycin + 3세대 Cephalosporin (Ceftriaxone 또는 Cefotaxime). 국내 S. pneumoniae의 Penicillin 및 Cephalosporin 내성률이 높으므로 배양 결과 확인 전까지 Vancomycin을 병합해야 합니다.\n50세 이상 또는 면역저하자 (알코올 중독, 만성 질환 등):\n권장: Vancomycin + 3세대 Cephalosporin + Ampicillin. 세포성 면역 저하와 관련된 Listeria monocytogenes를 커버하기 위해 Ampicillin을 반드시 추가해야 합니다.\n2.2 병원 획득 또는 수술 후 수막염 (Nosocomial / Post-neurosurgical Meningitis)\n적응증: 두부 외상(두개저 골절 등), 신경외과 수술 후, 뇌실복강 션트(Ventriculoperitoneal shunt) 보유자.\n주요 원인균: Staphylococcus aureus (메티실린 내성균 포함), Coagulase-negative Staphylococci (CoNS), 그람음성 막대균(Pseudomonas aeruginosa, Escherichia coli, Klebsiella pneumoniae 등).\n권장: Vancomycin + Anti-pseudomonal Cephalosporin (Ceftazidime 또는 Cefepime).\n대체 약제로 Meropenem을 고려할 수 있습니다.\n2.3 경험적 항생제 용법 및 용량 (신장 기능 정상 성인 기준)\n수막염 치료 시에는 약물이 혈액-뇌 장벽(Blood-Brain Barrier, BBB)을 통과해야 하므로 일반적인 감염증보다 고용량을 사용합니다.\nCeftriaxone: 2 g 정맥주사(IV) q12h (일반 감염보다 증량/분할 투여 권장).\nCefotaxime: 2 g IV q4~6h.\nVancomycin: 15-20 mg/kg IV q8~12h (목표 Trough 농도 15-20 µg/mL 유지).\nAmpicillin: 2 g IV q4h.\nCeftazidime / Cefepime: 2 g IV q8h.\nMeropenem: 2 g IV q8h.\n3. 보조적 스테로이드 요법 (Adjunctive Dexamethasone Therapy)\n적응증: S. pneumoniae 수막염이 의심되거나 확진된 성인 환자.\n방법: Dexamethasone 10 mg (또는 0.15 mg/kg) IV q6h, 4일간 투여.\n주의사항: 반드시 첫 항생제 투여 직전 또는 투여와 동시에 시작해야 합니다. 이미 항생제가 투여된 이후에는 효과가 입증되지 않았으므로 투여를 권장하지 않습니다. 스테로이드 투여 시 Vancomycin의 뇌척수액 내 농도가 감소할 수 있으므로 임상 경과를 주의 깊게 관찰해야 합니다.\n4. 원인균별 확정적 치료 (Definitive Therapy)\n4.1 Streptococcus pneumoniae (폐렴구균)\nPenicillin 감수성 (MIC < 0.1 µg/mL): Penicillin G 또는 Ampicillin.\nPenicillin 내성 / Ceftriaxone 감수성: Ceftriaxone 또는 Cefotaxime.\nCeftriaxone 내성 (MIC ≥ 1.0 µg/mL): Vancomycin + Ceftriaxone (또는 Cefotaxime).\n임상적 반응이 없거나 뇌실염 등이 동반된 경우 Rifampin 추가를 고려할 수 있습니다.\n4.2 Neisseria meningitidis (수막구균)\nPenicillin 감수성: Penicillin G 또는 Ampicillin.\nPenicillin 내성: Ceftriaxone 또는 Cefotaxime.\n예방 요법: 밀접 접촉자에게는 Rifampin, Ciprofloxacin, 또는 Ceftriaxone을 이용한 예방 화학요법이 필요합니다.\n4.3 Listeria monocytogenes\n1차 약제: Ampicillin 또는 Penicillin G.\n대체 약제: 페니실린 알레르기 시 Trimethoprim-Sulfamethoxazole (TMP-SMX) 또는 Meropenem. (Cephalosporin은 Listeria에 효과가 없습니다.)\n4.4 Staphylococcus aureus\nMethicillin-Susceptible S. aureus (MSSA): Nafcillin 또는 Cefazolin.\nMethicillin-Resistant S. aureus (MRSA): Vancomycin (+/- Rifampin).\n4.5 그람음성 막대균 (Gram-Negative Bacilli)\nPseudomonas aeruginosa: Ceftazidime 또는 Cefepime. 대체제로 Meropenem.\nEnterobacterales (E. coli, Klebsiella 등): 감수성에 따라 Ceftriaxone, Cefotaxime, Cefepime, Meropenem 등 선택. (ESBL 생성균인 경우 Meropenem 우선 고려).\n5. 치료 기간 (Duration of Therapy)\n치료 기간은 환자의 임상 반응에 따라 개별화되어야 하나, 일반적인 권장 기간은 다음과 같습니다.\nN. meningitidis, H. influenzae: 7일.\nS. pneumoniae: 10~14일.\nS. agalactiae (Group B Strep): 14~21일.\n그람음성 막대균: 21일 (또는 배양 음전 후 14일 이상).\nL. monocytogenes: 21일 이상.\n6. 요약표\nReferences\n1. 대한감염학회, 대한화학요법학회, 대한신경과학회, 대한신경외과학회, 대한임상미생물학회. 국내 성인 세균성 수막염의 임상진료지침 권고안. Infect Chemother 2012;44(3):140-163. (Clinical Practice Guidelines for the Management of Bacterial Meningitis in Adults in Korea).\n본 지침은 인천나은병원 항생제관리팀에서 승인하였으며,\n정기적으로 검토 및 업데이트됩니다.\n문의: 항생제관리팀", "paragraphs": [{"heading": "1. 개요 및 일반 원칙", "content": "세균성 수막염(Bacterial Meningitis)은 응급 질환으로서, 의심되거나 진단된 경우 가능한 한 빨리 적절한 항균제 치료를 시작해야 예후를 개선할 수 있습니다."}, {"heading": "1.1 초기 평가 및 진단", "content": "뇌척수액(Cerebrospinal Fluid, CSF) 검사: 금기증(뇌압 상승 징후 등)이 없다면 항생제 투여 전 혈액 배양과 함께 척수천자를 시행하여 원인균을 확인해야 합니다.\n뇌 영상 검사: 유두부종(Papilledema), 국소 신경학적 징후, 최근 경련, 의식 저하, 면역저하자 등의 경우 뇌 탈출(Herniation) 위험이 있으므로 척수천자 전 뇌 전산화단층촬영(CT) 또는 자기공명영상(MRI)을 시행합니다. 이 경우 검사 지연으로 항생제 투여가 늦어져서는 안 되며, 혈액 배양 후 즉시 항생제를 투여하고 영상 검사를 진행합니다."}, {"heading": "2. 경험적 항생제 치료 (Empirical Therapy)", "content": "국내 성인 수막염의 원인균 분포와 내성 현황을 고려하여 환자의 연령, 기저질환, 감염 경로에 따라 항생제를 선택합니다."}, {"heading": "2.1 지역사회 획득 수막염 (Community-Acquired Meningitis)", "content": "주요 원인균: Streptococcus pneumoniae (가장 흔함), Neisseria meningitidis, Haemophilus influenzae, Listeria monocytogenes (고령, 면역저하).\n18세 ~ 50세 (건강한 성인):\n권장: Vancomycin + 3세대 Cephalosporin (Ceftriaxone 또는 Cefotaxime). 국내 S. pneumoniae의 Penicillin 및 Cephalosporin 내성률이 높으므로 배양 결과 확인 전까지 Vancomycin을 병합해야 합니다.\n50세 이상 또는 면역저하자 (알코올 중독, 만성 질환 등):\n권장: Vancomycin + 3세대 Cephalosporin + Ampicillin. 세포성 면역 저하와 관련된 Listeria monocytogenes를 커버하기 위해 Ampicillin을 반드시 추가해야 합니다."}, {"heading": "2.2 병원 획득 또는 수술 후 수막염 (Nosocomial / Post-neurosurgical Meningitis)", "content": "적응증: 두부 외상(두개저 골절 등), 신경외과 수술 후, 뇌실복강 션트(Ventriculoperitoneal shunt) 보유자.\n주요 원인균: Staphylococcus aureus (메티실린 내성균 포함), Coagulase-negative Staphylococci (CoNS), 그람음성 막대균(Pseudomonas aeruginosa, Escherichia coli, Klebsiella pneumoniae 등).\n권장: Vancomycin + Anti-pseudomonal Cephalosporin (Ceftazidime 또는 Cefepime).\n대체 약제로 Meropenem을 고려할 수 있습니다."}, {"heading": "2.3 경험적 항생제 용법 및 용량 (신장 기능 정상 성인 기준)", "content": "수막염 치료 시에는 약물이 혈액-뇌 장벽(Blood-Brain Barrier, BBB)을 통과해야 하므로 일반적인 감염증보다 고용량을 사용합니다.\nCeftriaxone: 2 g 정맥주사(IV) q12h (일반 감염보다 증량/분할 투여 권장).\nCefotaxime: 2 g IV q4~6h.\nVancomycin: 15-20 mg/kg IV q8~12h (목표 Trough 농도 15-20 µg/mL 유지).\nAmpicillin: 2 g IV q4h.\nCeftazidime / Cefepime: 2 g IV q8h.\nMeropenem: 2 g IV q8h."}, {"heading": "3. 보조적 스테로이드 요법 (Adjunctive Dexamethasone Therapy)", "content": "적응증: S. pneumoniae 수막염이 의심되거나 확진된 성인 환자.\n방법: Dexamethasone 10 mg (또는 0.15 mg/kg) IV q6h, 4일간 투여.\n주의사항: 반드시 첫 항생제 투여 직전 또는 투여와 동시에 시작해야 합니다. 이미 항생제가 투여된 이후에는 효과가 입증되지 않았으므로 투여를 권장하지 않습니다. 스테로이드 투여 시 Vancomycin의 뇌척수액 내 농도가 감소할 수 있으므로 임상 경과를 주의 깊게 관찰해야 합니다."}, {"heading": "4.1 Streptococcus pneumoniae (폐렴구균)", "content": "Penicillin 감수성 (MIC < 0.1 µg/mL): Penicillin G 또는 Ampicillin.\nPenicillin 내성 / Ceftriaxone 감수성: Ceftriaxone 또는 Cefotaxime.\nCeftriaxone 내성 (MIC ≥ 1.0 µg/mL): Vancomycin + Ceftriaxone (또는 Cefotaxime).\n임상적 반응이 없거나 뇌실염 등이 동반된 경우 Rifampin 추가를 고려할 수 있습니다."}, {"heading": "4.2 Neisseria meningitidis (수막구균)", "content": "Penicillin 감수성: Penicillin G 또는 Ampicillin.\nPenicillin 내성: Ceftriaxone 또는 Cefotaxime.\n예방 요법: 밀접 접촉자에게는 Rifampin, Ciprofloxacin, 또는 Ceftriaxone을 이용한 예방 화학요법이 필요합니다."}, {"heading": "4.3 Listeria monocytogenes", "content": "1차 약제: Ampicillin 또는 Penicillin G.\n대체 약제: 페니실린 알레르기 시 Trimethoprim-Sulfamethoxazole (TMP-SMX) 또는 Meropenem. (Cephalosporin은 Listeria에 효과가 없습니다.)"}, {"heading": "4.4 Staphylococcus aureus", "content": "Methicillin-Susceptible S. aureus (MSSA): Nafcillin 또는 Cefazolin.\nMethicillin-Resistant S. aureus (MRSA): Vancomycin (+/- Rifampin)."}, {"heading": "4.5 그람음성 막대균 (Gram-Negative Bacilli)", "content": "Pseudomonas aeruginosa: Ceftazidime 또는 Cefepime. 대체제로 Meropenem.\nEnterobacterales (E. coli, Klebsiella 등): 감수성에 따라 Ceftriaxone, Cefotaxime, Cefepime, Meropenem 등 선택. (ESBL 생성균인 경우 Meropenem 우선 고려)."}, {"heading": "5. 치료 기간 (Duration of Therapy)", "content": "치료 기간은 환자의 임상 반응에 따라 개별화되어야 하나, 일반적인 권장 기간은 다음과 같습니다.\nN. meningitidis, H. influenzae: 7일.\nS. pneumoniae: 10~14일.\nS. agalactiae (Group B Strep): 14~21일.\n그람음성 막대균: 21일 (또는 배양 음전 후 14일 이상).\nL. monocytogenes: 21일 이상."}, {"heading": "6. 요약표", "content": "References\n1. 대한감염학회, 대한화학요법학회, 대한신경과학회, 대한신경외과학회, 대한임상미생물학회. 국내 성인 세균성 수막염의 임상진료지침 권고안. Infect Chemother 2012;44(3):140-163. (Clinical Practice Guidelines for the Management of Bacterial Meningitis in Adults in Korea).\n본 지침은 인천나은병원 항생제관리팀에서 승인하였으며,\n정기적으로 검토 및 업데이트됩니다.\n문의: 항생제관리팀"}]}, {"id": "11_Carbapenem사용적응증", "title": "Carbapenem 사용 적응증", "icon": "💊", "tags": ["Carbapenem", "Meropenem", "Imipenem", "Ertapenem", "ESBL", "AmpC", "경험적치료", "중증감염"], "fullText": "Carbapenem 사용 지침\n약제 특징 및 작용 범위 (spectrum of activity)\nβ–lactam 항생제의 일종으로 광범위 β–lactamase (extended spectrum β–lactamase, ESBL)나 AmpC β–lactamase를 포함한 β–lactamase에 분해되지 않기 때문에 다른 β–lactam 항균제에 내성을 보이는 그람음성균에 대하여 우수한 항균력이 있다. 또한, methicillin 감수성 Staphylococcus aureus (MSSA) 와 Streptococcus spp. 등 대부분의 호기성 그람양성균, 혐기균에 대해서 매우 광범위한 항균력이 있다. 현재 국내에서 투약 가능한 carbapenem 계열 약제는 Meropenem, Imipenem/cilastatin, Ertapenem, Doripenem이다.\n임상적응증\n원인균이 분리되기 전 경험적 치료 (Empirical therapy)\n3개월 이내 입원력이 있는 경우\n3개월 이내 ESBL이나 AmpC producing 그람음성균이 분리된 경우\n3개월 이내 3rd cephalosporin, 4th cephalosporin, quinolone, broad-spectrum penicillin (piperacillin/tazobactam) 투약력이 있는 경우\n중증 감염증의 경험적 치료\n* 중증 감염증 (severe infection)\nA. Systolic BP 90 mmHg 미만 또는 mean arterial pressure 65 mmHg 미만의 hypotension\nB. Acute respiratory failure\nC. Acute mental change\nD. NEWS score 5점 이상 또는 qSOFA 2점 이상의 septic shock 배제 하기 어려운 경우\n원인균이 분리된 후 확정적 치료 (Definitive therapy)\nBlood culture 또는 감염으로 생각되는 병소에서 시행한 배양 검체에서 ESBL이나 AmpC producing pathogen 등 non-carbapenem 항생제에 내성인 균주가 분리된 경우\n부작용과 금기\nCarbapenem의 흔한 부작용은 주사 부위의 정맥염, 설사, 피부발진, 구역, 구토, 가려움증이며 대부분 경미하고 약을 중단하여야 하는 경우는 1.2~1.8% 정도이다. 다른 β–lactam 항생제와 마찬가지로 간효소 수치의 상승이 나타날 수 있으나 대부분 경미하다.\nCarbapenem이 γ–aminobutyric acid (GABA) 구조와 비슷하여 수용체에 길항 작용을 일으키기 때문에 모든 carbapenem이 간질발작을 일으킬 수 있으며, 그 빈도는 Imipenem 1~2%, Ertapenem, Meropenem, Doripenem의 경우 0.1~0.3% 보고되었다. 특히, 신기능 저하, 기저 중추신경계질환, 중추신경계감염, 뇌졸중 및 과거 간질발작의 병력 등이 있을 경우 간질발작이 발생한 위험성이 증가한다.\nCarbapenem 대한 과민 반응은 3% 이내이고 penicillin 알레르기와 교차 반응을 보일 수 있다. Penicillin 알레르기 있는 경우 carbapenem 과민반응을 보이는 경우는 0~11% 정도이며, 피부발진이 가장 흔하다. Penicillin에 즉시형 과민반응이 있는 경우라도 carbapenem 피부 반응 검사에서 음성이라면 carbapenem을 낮은 용량부터 올려서 단계적으로 투여 고려할 수 있다.\n각 carbapenem 특징\nImipenem/cilastatin\nImipenem은 신장의 DHP-1 의해 분해되어 농도가 떨어지고 인체에 독성이 있는 대사산물을 형성하기 때문에 이 효소의 억제제인 cilastatin과 1:1로 병합한 형태로 사용한다\nImipenem/cilastatin의 간질발작 유발 위험은 다른 carbapenem 비교하여 다소 높으나 위험인자가 없는 경우나 신기능에 맞추어서 용량을 조절한 경우 간질발작 발생률은 1% 미만이다\nTheophylline, quinolone, metronidazole, ganciclovir, cyclosporin 등의 약제와 함께 투약하는 경우 간질발작의 역치를 낮출 수 있어서 주의 필요하다\nMeropenem 비교하여 MSSA, S. pneumoniae 등 그람양성균에 상대적으로 우수한 항균력 있다\nMeropenem\nImipenem 비교하여 그람음성균에 대한 항균력이 우수하다\nPseudomonas aeruginosa 대한 항균력은 Imipenem 보다 우수하다\nErtapenem\nP. aeruginosa, Acinetobacter spp.대한 감수성이 매우 낮다\nErtapenem은 92~95%가 혈장 단백과 결합하며, 높은 단백 결합률로 반감기가 길기 때문에 1일 1회 투여가 가능하다\n용법 및 용량 (신기능 장애가 있는 경우 용량 감량이 필요, eGFR 따른 용량은 항생제 투약 지침에 추가 업데이트 예정)\nMeropenem 1 g iv q8hr (중추신경계감염증: 2 g iv q8hr) (eGFR > 50)\nImipenem/cilastatin 1 g iv q8hr (eGFR > 60)\nErtapenem 1 g iv q24hr (eGFR > 30)", "paragraphs": [{"heading": "Carbapenem 사용 지침", "content": ""}, {"heading": "약제 특징 및 작용 범위 (spectrum of activity)", "content": "β–lactam 항생제의 일종으로 광범위 β–lactamase (extended spectrum β–lactamase, ESBL)나 AmpC β–lactamase를 포함한 β–lactamase에 분해되지 않기 때문에 다른 β–lactam 항균제에 내성을 보이는 그람음성균에 대하여 우수한 항균력이 있다. 또한, methicillin 감수성 Staphylococcus aureus (MSSA) 와 Streptococcus spp. 등 대부분의 호기성 그람양성균, 혐기균에 대해서 매우 광범위한 항균력이 있다. 현재 국내에서 투약 가능한 carbapenem 계열 약제는 Meropenem, Imipenem/cilastatin, Ertapenem, Doripenem이다."}, {"heading": "임상적응증", "content": "원인균이 분리되기 전 경험적 치료 (Empirical therapy)\n3개월 이내 입원력이 있는 경우\n3개월 이내 ESBL이나 AmpC producing 그람음성균이 분리된 경우\n3개월 이내 3rd cephalosporin, 4th cephalosporin, quinolone, broad-spectrum penicillin (piperacillin/tazobactam) 투약력이 있는 경우\n중증 감염증의 경험적 치료\n* 중증 감염증 (severe infection)\nA. Systolic BP 90 mmHg 미만 또는 mean arterial pressure 65 mmHg 미만의 hypotension\nB. Acute respiratory failure\nC. Acute mental change\nD. NEWS score 5점 이상 또는 qSOFA 2점 이상의 septic shock 배제 하기 어려운 경우\n원인균이 분리된 후 확정적 치료 (Definitive therapy)\nBlood culture 또는 감염으로 생각되는 병소에서 시행한 배양 검체에서 ESBL이나 AmpC producing pathogen 등 non-carbapenem 항생제에 내성인 균주가 분리된 경우"}, {"heading": "부작용과 금기", "content": "Carbapenem의 흔한 부작용은 주사 부위의 정맥염, 설사, 피부발진, 구역, 구토, 가려움증이며 대부분 경미하고 약을 중단하여야 하는 경우는 1.2~1.8% 정도이다. 다른 β–lactam 항생제와 마찬가지로 간효소 수치의 상승이 나타날 수 있으나 대부분 경미하다.\nCarbapenem이 γ–aminobutyric acid (GABA) 구조와 비슷하여 수용체에 길항 작용을 일으키기 때문에 모든 carbapenem이 간질발작을 일으킬 수 있으며, 그 빈도는 Imipenem 1~2%, Ertapenem, Meropenem, Doripenem의 경우 0.1~0.3% 보고되었다. 특히, 신기능 저하, 기저 중추신경계질환, 중추신경계감염, 뇌졸중 및 과거 간질발작의 병력 등이 있을 경우 간질발작이 발생한 위험성이 증가한다.\nCarbapenem 대한 과민 반응은 3% 이내이고 penicillin 알레르기와 교차 반응을 보일 수 있다. Penicillin 알레르기 있는 경우 carbapenem 과민반응을 보이는 경우는 0~11% 정도이며, 피부발진이 가장 흔하다. Penicillin에 즉시형 과민반응이 있는 경우라도 carbapenem 피부 반응 검사에서 음성이라면 carbapenem을 낮은 용량부터 올려서 단계적으로 투여 고려할 수 있다."}, {"heading": "각 carbapenem 특징", "content": "Imipenem/cilastatin\nImipenem은 신장의 DHP-1 의해 분해되어 농도가 떨어지고 인체에 독성이 있는 대사산물을 형성하기 때문에 이 효소의 억제제인 cilastatin과 1:1로 병합한 형태로 사용한다\nImipenem/cilastatin의 간질발작 유발 위험은 다른 carbapenem 비교하여 다소 높으나 위험인자가 없는 경우나 신기능에 맞추어서 용량을 조절한 경우 간질발작 발생률은 1% 미만이다\nTheophylline, quinolone, metronidazole, ganciclovir, cyclosporin 등의 약제와 함께 투약하는 경우 간질발작의 역치를 낮출 수 있어서 주의 필요하다\nMeropenem 비교하여 MSSA, S. pneumoniae 등 그람양성균에 상대적으로 우수한 항균력 있다\nMeropenem\nImipenem 비교하여 그람음성균에 대한 항균력이 우수하다\nPseudomonas aeruginosa 대한 항균력은 Imipenem 보다 우수하다\nErtapenem\nP. aeruginosa, Acinetobacter spp.대한 감수성이 매우 낮다\nErtapenem은 92~95%가 혈장 단백과 결합하며, 높은 단백 결합률로 반감기가 길기 때문에 1일 1회 투여가 가능하다"}, {"heading": "용법 및 용량 (신기능 장애가 있는 경우 용량 감량이 필요, eGFR 따른 용량은 항생제 투약 지침에 추가 업데이트 예정)", "content": "Meropenem 1 g iv q8hr (중추신경계감염증: 2 g iv q8hr) (eGFR > 50)\nImipenem/cilastatin 1 g iv q8hr (eGFR > 60)\nErtapenem 1 g iv q24hr (eGFR > 30)"}]}, {"id": "12_Linezolid사용적응증", "title": "Linezolid 사용 적응증", "icon": "🔴", "tags": ["Linezolid", "VRE", "MRSA", "그람양성균", "폐렴", "골수억제", "혈소판감소"], "fullText": "Linezolid 사용 지침\n약제 특징 및 작용 범위 (spectrum of activity)\nLinezolid는 oxazolidinone계열의 정균 항생제로 50S ribosome subunit과 결합하여 단백질 합성의 초기단계를 방해하며 이러한 작용기전 덕분에 기존의 항생제와 교차내성을 갖지 않는다. Methicillin-resistant Staphylococcus aureus (MRSA), vancomycin 고도내성 S. aureus, vancomycin-resistant Enterococcus spp. (VRE) 등 다제내성 그람양성균에 항균력이 우수하나 그람음성균, 혐기균에 항균력이 낮다.\nLinezolid는 VRE 감염, MRSA에 의한 복잡성 피부연조직감염 및 원내 폐렴의 치료에 사용되며, multi-drug resistant Mycobacterium tuberculosis 치료약제이다. 정맥 및 경구 투여가 가능하며 경구 흡수율이 100%이고, 조직 (피부 및 연조직, 폐, 신장, 간, 뇌척수액, 근육, 뼈) 투과성이 우수하다. MRSA 균혈증에서 vancomycin과 유사한 치료효과를, 폐렴에서는 대등하거나 우월한 효과를 보였다.\n임상적응증 및 국내보험기준\n원인균이 분리되기 전 경험적 치료 (Empirical therapy)\nVRE로 인한 감염증이 의심되는 sepsis, septic shock 경우\nVRE colonizer에서 sepsis, septic shock 발생한 경우\n원인균이 분리된 후 확정적 치료 (Definitive therapy)\n혈액배양검사 (blood culture) 또는 무균적체액 (CSF, ascites, pleural effusion 등)에서 VRE 분리된 경우\nMRSA 감염증에서 vancomycin이나 teicoplanin 치료 실패한 경우\nMRSA 감염증에서 vancomycin이나 teicoplanin 약제 부작용으로 투여할 수 없는 경우\n리팜핀 내성/다제내성 결핵 환자에서 WHO 지침의 권고내역 및 약제구성원칙에 따라 투여하는 경우\nMRSA 감염증에서 경구 약제로 전환할 경우 (현재 국내에서는 비보험)\n* 요양급여 청구 시 투여소견서 첨부해야 함\n부작용과 금기\n가장 흔한 부작용은 설사, 두통, 오심, 구토이며, 이외에 두통, 고혈압, 수면장애, 변비, 발진 등이 발생할 수 있다.\n2주 이상 장기간 투약했을 때, 투여기간 및 용량에 비례하여 골수억제 (주로 혈소판 감소증)가 발생할 수 있으며 가역적이다.\n장기간 투여한 환자에서 비가역적인 말초신경병증이 발생할 수 있으며, 시신경병증은 조기에 발견하여 linezolid 중단하면 회복될 수 있으나 지속 투약시 영구적 시력 소실도 가능하다.\n장기간 투여한 환자에서 젖산혈증이 발생할 수 있으며, 세로토닌성 약물과 병용할 때 세로토닌 증후군이 발생할 수 있다.\n용법 및 용량 (신기능 장애 있어도 용량 감량 불필요함)\nPneumonia, complicated SSTI, MRSA bacteremia, VRE bacteremia: 600 mg iv/po q12hr\nUncomplicated SSTI: 400 mg iv/po q12hr", "paragraphs": [{"heading": "Linezolid 사용 지침", "content": ""}, {"heading": "약제 특징 및 작용 범위 (spectrum of activity)", "content": "Linezolid는 oxazolidinone계열의 정균 항생제로 50S ribosome subunit과 결합하여 단백질 합성의 초기단계를 방해하며 이러한 작용기전 덕분에 기존의 항생제와 교차내성을 갖지 않는다. Methicillin-resistant Staphylococcus aureus (MRSA), vancomycin 고도내성 S. aureus, vancomycin-resistant Enterococcus spp. (VRE) 등 다제내성 그람양성균에 항균력이 우수하나 그람음성균, 혐기균에 항균력이 낮다.\nLinezolid는 VRE 감염, MRSA에 의한 복잡성 피부연조직감염 및 원내 폐렴의 치료에 사용되며, multi-drug resistant Mycobacterium tuberculosis 치료약제이다. 정맥 및 경구 투여가 가능하며 경구 흡수율이 100%이고, 조직 (피부 및 연조직, 폐, 신장, 간, 뇌척수액, 근육, 뼈) 투과성이 우수하다. MRSA 균혈증에서 vancomycin과 유사한 치료효과를, 폐렴에서는 대등하거나 우월한 효과를 보였다."}, {"heading": "임상적응증 및 국내보험기준", "content": "원인균이 분리되기 전 경험적 치료 (Empirical therapy)\nVRE로 인한 감염증이 의심되는 sepsis, septic shock 경우\nVRE colonizer에서 sepsis, septic shock 발생한 경우\n원인균이 분리된 후 확정적 치료 (Definitive therapy)\n혈액배양검사 (blood culture) 또는 무균적체액 (CSF, ascites, pleural effusion 등)에서 VRE 분리된 경우\nMRSA 감염증에서 vancomycin이나 teicoplanin 치료 실패한 경우\nMRSA 감염증에서 vancomycin이나 teicoplanin 약제 부작용으로 투여할 수 없는 경우\n리팜핀 내성/다제내성 결핵 환자에서 WHO 지침의 권고내역 및 약제구성원칙에 따라 투여하는 경우\nMRSA 감염증에서 경구 약제로 전환할 경우 (현재 국내에서는 비보험)\n* 요양급여 청구 시 투여소견서 첨부해야 함"}, {"heading": "부작용과 금기", "content": "가장 흔한 부작용은 설사, 두통, 오심, 구토이며, 이외에 두통, 고혈압, 수면장애, 변비, 발진 등이 발생할 수 있다.\n2주 이상 장기간 투약했을 때, 투여기간 및 용량에 비례하여 골수억제 (주로 혈소판 감소증)가 발생할 수 있으며 가역적이다.\n장기간 투여한 환자에서 비가역적인 말초신경병증이 발생할 수 있으며, 시신경병증은 조기에 발견하여 linezolid 중단하면 회복될 수 있으나 지속 투약시 영구적 시력 소실도 가능하다.\n장기간 투여한 환자에서 젖산혈증이 발생할 수 있으며, 세로토닌성 약물과 병용할 때 세로토닌 증후군이 발생할 수 있다."}, {"heading": "용법 및 용량 (신기능 장애 있어도 용량 감량 불필요함)", "content": "Pneumonia, complicated SSTI, MRSA bacteremia, VRE bacteremia: 600 mg iv/po q12hr\nUncomplicated SSTI: 400 mg iv/po q12hr"}]}, {"id": "13_Colistin사용적응증", "title": "Colistin / Polymyxin B 사용 적응증", "icon": "⚗️", "tags": ["Colistin", "Polymyxin", "CRE", "CRAB", "신독성", "carbapenem내성"], "fullText": "Polymyxin B 및 Colistin (polymyxin E) 사용 지침\n약제 특징 및 작용 범위 (spectrum of activity)\nPolymyxin은 1947년 개발된 오래된 약제로 세포막의 인지질에 작용해 빠르게 세포막을 파괴시키는 농도 의존형 살균 항생제이다. 과거 nephrotoxicity 발생 등의 안전성의 문제로 거의 사용되지 않았으나 최근 다제내성 그람음성균의 증가로 사용할 수 있는 약제가 줄어들면서 다시 사용되고 있다.\n특히 Pseudomonas aeruginosa, Acinetobacter baumannii, carbapenem 내성 Enterobacteriaceae (CRE) 등 포함한 호기성 그람음성균에 항균효과가 있으며, 혐기균, 그람양성균, Serratia, Moraxella 등의 균주에 대해서는 항균력이 좋지 않다.\n임상적응증\n원인균이 분리되기 전 경험적 치료 (Empirical therapy)\nCarbapenem 투약에 치료 반응이 없는 sepsis, septic shock 경우\nCarbapenem 내성 균주로 인한 감염증이 의심되는 sepsis, septic shock 경우\nCarbapenem 내성 균주 colonizer에서 sepsis, septic shock 발생한 경우\n원인균이 분리된 후 확정적 치료 (Definitive therapy)\n기존의 모든 항생제에 내성을 보이는 A. baumannii 또는 P. aeruginosa에 의한 감염증\nCarbapenem 내성 Enterobacteriaceae (CRE)에 의한 감염증\n부작용과 금기\n용량의존적 신독성 발생할 수 있으며, 기존의 신질환이 있는 환자에서 신기능 장애 발생 빈도가 높다\n투여량에 비례한 가역적인 신경독성이 발생할 수 있으며, 입술주변, 혀, 팔다리의 이상감각, 말초신경이상증, 전신가려움증 등이 발생할 수 있다.\n흡입 요법 시 bronchospasm 유발할 수 있다.\n용법 및 용량 (신기능 장애가 있는 경우 용량 감량이 필요, eGFR 따른 용량은 항생제 투약 지침에 추가 업데이트 예정)\n용량 기준: Colistin base activity (CBA)\n체중 기준: 실제 체중 (비만일 경우 이상 체중)\nLoading dose: 4 mg/kg (최대용량 300 mg)\nMaintenance dose: Loading dose 투약 후 12시간 뒤 투약 시작\n70 < eGFR: 150 mg q12hr", "paragraphs": [{"heading": "Polymyxin B 및 Colistin (polymyxin E) 사용 지침", "content": ""}, {"heading": "약제 특징 및 작용 범위 (spectrum of activity)", "content": "Polymyxin은 1947년 개발된 오래된 약제로 세포막의 인지질에 작용해 빠르게 세포막을 파괴시키는 농도 의존형 살균 항생제이다. 과거 nephrotoxicity 발생 등의 안전성의 문제로 거의 사용되지 않았으나 최근 다제내성 그람음성균의 증가로 사용할 수 있는 약제가 줄어들면서 다시 사용되고 있다.\n특히 Pseudomonas aeruginosa, Acinetobacter baumannii, carbapenem 내성 Enterobacteriaceae (CRE) 등 포함한 호기성 그람음성균에 항균효과가 있으며, 혐기균, 그람양성균, Serratia, Moraxella 등의 균주에 대해서는 항균력이 좋지 않다."}, {"heading": "임상적응증", "content": "원인균이 분리되기 전 경험적 치료 (Empirical therapy)\nCarbapenem 투약에 치료 반응이 없는 sepsis, septic shock 경우\nCarbapenem 내성 균주로 인한 감염증이 의심되는 sepsis, septic shock 경우\nCarbapenem 내성 균주 colonizer에서 sepsis, septic shock 발생한 경우\n원인균이 분리된 후 확정적 치료 (Definitive therapy)\n기존의 모든 항생제에 내성을 보이는 A. baumannii 또는 P. aeruginosa에 의한 감염증\nCarbapenem 내성 Enterobacteriaceae (CRE)에 의한 감염증"}, {"heading": "부작용과 금기", "content": "용량의존적 신독성 발생할 수 있으며, 기존의 신질환이 있는 환자에서 신기능 장애 발생 빈도가 높다\n투여량에 비례한 가역적인 신경독성이 발생할 수 있으며, 입술주변, 혀, 팔다리의 이상감각, 말초신경이상증, 전신가려움증 등이 발생할 수 있다.\n흡입 요법 시 bronchospasm 유발할 수 있다."}, {"heading": "용법 및 용량 (신기능 장애가 있는 경우 용량 감량이 필요, eGFR 따른 용량은 항생제 투약 지침에 추가 업데이트 예정)", "content": "용량 기준: Colistin base activity (CBA)\n체중 기준: 실제 체중 (비만일 경우 이상 체중)\nLoading dose: 4 mg/kg (최대용량 300 mg)\nMaintenance dose: Loading dose 투약 후 12시간 뒤 투약 시작\n70 < eGFR: 150 mg q12hr"}]}, {"id": "14_Ceftolozane사용적응증", "title": "Ceftolozane-Tazobactam 사용 적응증", "icon": "🧬", "tags": ["Ceftolozane", "Tazobactam", "Pseudomonas", "CRPA", "원내폐렴", "복강내감염", "요로감염"], "fullText": "Ceftolozane/tazobactam 사용 지침\n약제 특징 및 작용 범위 (spectrum of activity)\nCeftolozane은 새로 개발된 cephalosporin계열 항생제로 ceftazidime 비해 AmpC β−lactamase에 더 안정적인 항생제이다. Ceftazidime 비교하여 Pseudomonas aeruginosa에 대한 항균력이 우수하고, tazobactam 추가하여 ESBL-producing pathogen 대한 항균력이 향상되었다. 그러나 Streptococci에 대한 항균력이 떨어지고, Enterococci, Staphylococcus spp.에 대한 항균력이 거의 없으며, metalo−β−lactamase이나 KPC와 같은 carbapenemase에는 내성을 보인다. 현재 원내폐렴, 복잡성 복강내감염, 복잡성 요로감염의 치료제로 승인받았으며, 국내에서 분리된 carbapenem 내성, non-carbapenemase-producing P. aeruginosa (CRPA)에 대한 ceftolozane/tazobactam의 감수성은 95%정도로 보고되어서 carbapenemase를 분비하지 않는 CRPA에 의한 감염증에서 치료약제로 고려할 수 있다.\n임상적응증\n원인균이 분리되기 전 경험적 치료 (Empirical therapy)\n이전에 carbapenem 내성 P. aeruginosa로 인한 감염증으로 치료받은 적이 있는 환자에서 sepsis, septic shock 발생한 경우\nCarbapenem 내성 P. aeruginosa colonizer에서 sepsis, septic shock 발생한 경우\n원인균이 분리된 후 확정적 치료 (Definitive therapy): 보험급여 투약 가능\n* 복잡성 복강내감염, 복잡성 요로감염과 원내 폐렴 (Hospital-acquired and ventilator-acquired pneumonia)에서\nCarbapenem 투약에 치료 실패한 경우\n다제내성 P. aeruginosa 증명된 경우\n* 투여소견서 첨부 필요함\n부작용과 금기\n설사, 오심, 구토 등의 소화기계 부작용이 발생할 수 있다. (5% 이상)\n신기능 장애 (0.5%)가 발생할 수 있으나 드물다.\n다른 β−lactam과 교차 반응이 나타날 수 있다.\n용법 및 용량 (신기능 장애가 있는 경우 용량 감량이 필요, eGFR 따른 용량은 항생제 투약 지침에 추가 업데이트 예정)\n* Ceftolozane 1 g + tazobactam 0.5 g = Total 1.5 g (over 1 hour infusion)\n복잡성 요로감염 (신우신염 포함): ceftolozane/tazobactam 1.5 g iv q8hr (eGFR > 50)\n복잡성 복강내감염: ceftolozane/tazobactam 1.5 g iv q8hr (+ metronidazole 500 mg iv q8hr) (eGFR > 50)\n원내폐렴, 균혈증: ceftolozane/tazobactam 3 g iv q8hr (over 3 hours infusion) (eGFR > 50)", "paragraphs": [{"heading": "Ceftolozane/tazobactam 사용 지침", "content": ""}, {"heading": "약제 특징 및 작용 범위 (spectrum of activity)", "content": "Ceftolozane은 새로 개발된 cephalosporin계열 항생제로 ceftazidime 비해 AmpC β−lactamase에 더 안정적인 항생제이다. Ceftazidime 비교하여 Pseudomonas aeruginosa에 대한 항균력이 우수하고, tazobactam 추가하여 ESBL-producing pathogen 대한 항균력이 향상되었다. 그러나 Streptococci에 대한 항균력이 떨어지고, Enterococci, Staphylococcus spp.에 대한 항균력이 거의 없으며, metalo−β−lactamase이나 KPC와 같은 carbapenemase에는 내성을 보인다. 현재 원내폐렴, 복잡성 복강내감염, 복잡성 요로감염의 치료제로 승인받았으며, 국내에서 분리된 carbapenem 내성, non-carbapenemase-producing P. aeruginosa (CRPA)에 대한 ceftolozane/tazobactam의 감수성은 95%정도로 보고되어서 carbapenemase를 분비하지 않는 CRPA에 의한 감염증에서 치료약제로 고려할 수 있다."}, {"heading": "임상적응증", "content": "원인균이 분리되기 전 경험적 치료 (Empirical therapy)\n이전에 carbapenem 내성 P. aeruginosa로 인한 감염증으로 치료받은 적이 있는 환자에서 sepsis, septic shock 발생한 경우\nCarbapenem 내성 P. aeruginosa colonizer에서 sepsis, septic shock 발생한 경우\n원인균이 분리된 후 확정적 치료 (Definitive therapy): 보험급여 투약 가능\n* 복잡성 복강내감염, 복잡성 요로감염과 원내 폐렴 (Hospital-acquired and ventilator-acquired pneumonia)에서\nCarbapenem 투약에 치료 실패한 경우\n다제내성 P. aeruginosa 증명된 경우\n* 투여소견서 첨부 필요함"}, {"heading": "부작용과 금기", "content": "설사, 오심, 구토 등의 소화기계 부작용이 발생할 수 있다. (5% 이상)\n신기능 장애 (0.5%)가 발생할 수 있으나 드물다.\n다른 β−lactam과 교차 반응이 나타날 수 있다."}, {"heading": "용법 및 용량 eGFR > 50)", "paragraphs": [{"heading": "Ceftazidime/avibactam 사용 지침", "content": ""}, {"heading": "약제 특징 및 작용 범위 (spectrum of activity)", "content": "Ceftazidime은 3세대 cephalosporin계 항생제 중에 Pseudomonas spp. 대한 항균 효과가 가장 뛰어나고, avibactam은 tazobactam 이후 새로 개발된 β−lactamase inhibitor로서 ceftazidime과 결합하여 그람음성균에 대한 새로운 항생제로 개발되었다.\nAvibactam은 ESBL, AmpC β−lactamase 뿐만 아니라, carbapenemases 중 KPC, OXA-48 억제 가능하므로 ceftazidime/avibactam은 ESBL, AmpC producing pathogen, CRE, Pseudomonas aeruginosa 대한 항균력이 우수하다. 그러나 Acinetobacter spp.와 metallo−β−lactamase (MBL) 생성균 (NDM, VIM, IMP carbapenemase), Enterococcus spp.에 대한 항균력은 거의 없다. 현재 원내폐렴, 복잡성 복강내 감염, 복잡성 요로감염의 치료제로 승인받았다. 복강내감염에서 투약을 할 때에는 anaerobe coverage 높이기 위해 metronidazole 함께 투약이 필요하다."}, {"heading": "임상적응증", "content": "원인균이 분리되기 전 경험적 치료 (Empirical therapy)\n이전에 carbapenem 내성 균주로 인한 감염증으로 치료받은 적이 있는 환자에서 sepsis, septic shock 발생한 경우\nCarbapenem 내성 균주 colonizer (CRE, KPC, OXA-48)에서 sepsis, septic shock 발생한 경우\n원인균이 분리된 후 확정적 치료 (Definitive therapy): 보험급여 투약 가능\n* 복잡성 복강내감염, 복잡성 요로감염과 원내 폐렴 (Hospital-acquired and ventilator-acquired pneumonia)에서\nCarbapenem 투약에 치료 반응이 없는 경우\nCarbapenem 내성 Enterobacteriaceae (CRE, KPC, OXA-48)에 의한 감염증\n기존의 모든 항생제에 내성을 보이는 P. aeruginosa에 의한 감염증\n* 투여소견서 첨부 필요함"}, {"heading": "부작용과 금기", "content": "설사, 오심, 구토 등의 소화기계 부작용이 발생할 수 있다.\nCeftazidime과 유사한 부작용이 나타날 수 있으며, 발진, 호중구감소증, 신독성이 발생할 수 있으나 드물다.\nPenicillin과 교차 반응이 나타날 수 있다."}, {"heading": "용법 및 용량 (신기능 장애가 있는 경우 용량 감량이 필요, eGFR 따른 용량은 항생제 투약 지침에 추가 업데이트 예정)", "content": "Ceftazidime 2 g + avibactam 0.5 g (Total 2.5 g) iv q8hr (eGFR > 50)"}]}];

  'Carbapenem 적응증', 'Colistin 적응증'
];

function getIconHTML(icon) {
  if (icon === '__LUNG__') {
    return '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="1em" height="1em" fill="currentColor" style="vertical-align:middle"><path d="M12 2C10.9 2 10 2.9 10 4v6.5c-.8-.3-1.6-.5-2.5-.5C5.6 10 4 11.6 4 13.5c0 2.5 1.5 4.5 3.5 5.3V20c0 .6.4 1 1 1s1-.4 1-1v-1.1c.6.1 1.3.1 2 .1s1.4 0 2-.1V20c0 .6.4 1 1 1s1-.4 1-1v-1.2c2-.8 3.5-2.8 3.5-5.3 0-1.9-1.6-3.5-3.5-3.5-.9 0-1.7.2-2.5.5V4c0-1.1-.9-2-2-2z"/></svg>';
  }
  return icon;
}

let currentDocId = null;

function init() {
  buildSidebar();
  buildHome();
}

function buildSidebar() {
  const nav = document.getElementById('sidebarNav');
  nav.innerHTML = '<div class="nav-item active" onclick="showHome(this)" style="margin-bottom:8px"><span class="nav-icon">🏠</span><span class="nav-title">전체 지침서</span></div>';
  DOCS.forEach(doc => {
    const el = document.createElement('div');
    el.className = 'nav-item';
    el.innerHTML = `<span class="nav-icon">${getIconHTML(doc.icon)}</span><span class="nav-title">${doc.title}</span>`;
    el.onclick = () => showDoc(doc.id, el);
    el.dataset.docId = doc.id;
    nav.appendChild(el);
  });
}

function buildHome() {
  // Quick searches
  const qs = document.getElementById('quickSearches');
  qs.innerHTML = QUICK_SEARCHES.map(q => {
    const label = typeof q === 'string' ? q : q.label;
    const query = typeof q === 'string' ? q : q.query;
    return `<button class="qchip" onclick="doSearch('${query}')">${label}</button>`;
  }).join('');

  // Grid
  const grid = document.getElementById('homeGrid');
  grid.innerHTML = DOCS.map(doc => `
    <div class="quick-card" onclick="showDoc('${doc.id}')">
      <div class="qc-icon">${getIconHTML(doc.icon)}</div>
      <div class="qc-title">${doc.title}</div>
      <div class="qc-desc">${doc.tags.slice(0,4).join(' · ')}</div>
    </div>
  `).join('');
}

function showHome(el) {
  setView('homeView');
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  el.classList.add('active');
  currentDocId = null;
}

function showDoc(id, navEl) {
  const doc = DOCS.find(d => d.id === id);
  if (!doc) return;
  currentDocId = id;

  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  if (navEl) navEl.classList.add('active');
  else {
    const found = document.querySelector(`[data-doc-id="${id}"]`);
    if (found) found.classList.add('active');
  }

  const view = document.getElementById('docView');
  view.innerHTML = renderDocFull(doc, '');
  setView('docView');
  // auto-expand first card
  const card = view.querySelector('.doc-card');
  if (card) card.classList.add('expanded');
}

function renderDocFull(doc, query) {
  const tagsHtml = doc.tags.map(t => `<span class="tag">${highlight(t, query)}</span>`).join('');
  const sectionsHtml = doc.paragraphs.map(p => {
    const hasMatch = query && (p.heading.toLowerCase().includes(query.toLowerCase()) || p.content.toLowerCase().includes(query.toLowerCase()));
    return `
      <div class="section-block ${hasMatch ? 'has-match' : ''}">
        <div class="section-heading">${highlight(p.heading, query)}</div>
        <div class="section-content">${highlight(escHtml(p.content), query)}</div>
      </div>`;
  }).join('');

  return `
    <div class="doc-card expanded" id="card-${doc.id}">
      <div class="doc-header" onclick="toggleCard('card-${doc.id}')">
        <div class="doc-header-icon">${getIconHTML(doc.icon)}</div>
        <div class="doc-header-text">
          <div class="doc-title">${doc.title}</div>
          <div class="doc-tags">${tagsHtml}</div>
        </div>
        <div class="doc-toggle">▾</div>
      </div>
      <div class="doc-body">${sectionsHtml}</div>
    </div>`;
}

function toggleCard(id) {
  document.getElementById(id).classList.toggle('expanded');
}

function escHtml(t) {
  return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function highlight(text, query) {
  if (!query || query.length < 2) return text;
  const escaped = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  return text.replace(new RegExp(`(${escaped})`, 'gi'), '<mark>$1</mark>');
}

function setView(viewId) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById(viewId).classList.add('active');
}

let searchTimer = null;
function onSearch(val) {
  const clearBtn = document.getElementById('clearBtn');
  clearBtn.style.display = val ? 'block' : 'none';
  clearTimeout(searchTimer);
  if (!val.trim()) {
    document.getElementById('resultCount').textContent = '';
    if (currentDocId) showDoc(currentDocId);
    else showHome(document.querySelector('.nav-item'));
    return;
  }
  searchTimer = setTimeout(() => doSearch(val), 200);
}

function doSearch(query) {
  document.getElementById('searchInput').value = query;
  document.getElementById('clearBtn').style.display = 'block';

  const q = query.toLowerCase();
  const results = [];

  DOCS.forEach(doc => {
    doc.paragraphs.forEach(p => {
      const headMatch = p.heading.toLowerCase().includes(q);
      const bodyMatch = p.content.toLowerCase().includes(q);
      if (headMatch || bodyMatch) {
        // extract snippet around match
        const idx = p.content.toLowerCase().indexOf(q);
        let snippet = '';
        if (idx >= 0) {
          const start = Math.max(0, idx - 60);
          const end = Math.min(p.content.length, idx + 160);
          snippet = (start > 0 ? '...' : '') + p.content.slice(start, end) + (end < p.content.length ? '...' : '');
        } else {
          snippet = p.content.slice(0, 200);
        }
        results.push({ doc, section: p.heading, snippet });
      }
    });
    // also search in tags/title
    if (doc.title.toLowerCase().includes(q) || doc.tags.some(t => t.toLowerCase().includes(q))) {
      if (!results.find(r => r.doc.id === doc.id && !r.section)) {
        results.unshift({ doc, section: null, snippet: doc.tags.join(', ') });
      }
    }
  });

  document.getElementById('resultCount').textContent = results.length > 0 ? `${results.length}개 결과` : '';

  const view = document.getElementById('searchView');
  if (results.length === 0) {
    view.innerHTML = `<div class="no-result"><div class="no-icon">🔍</div><p><strong>"${escHtml(query)}"</strong>에 대한 결과가 없습니다.<br>다른 키워드로 검색해보세요.</p></div>`;
  } else {
    view.innerHTML = results.map(r => `
      <div class="result-item" onclick="showDoc('${r.doc.id}')">
        <div class="result-source">
          <span>${getIconHTML(r.doc.icon)}</span>
          <span class="result-source-badge">${r.doc.title}</span>
          ${r.section ? `<span>${highlight(escHtml(r.section), query)}</span>` : ''}
        </div>
        <div class="result-snippet">${highlight(escHtml(r.snippet), query)}</div>
      </div>
    `).join('');
  }

  setView('searchView');
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
}

function clearSearch() {
  document.getElementById('searchInput').value = '';
  document.getElementById('clearBtn').style.display = 'none';
  document.getElementById('resultCount').textContent = '';
  const homeNav = document.querySelector('.nav-item');
  showHome(homeNav);
}

init();
</script>
</body>
</html>
